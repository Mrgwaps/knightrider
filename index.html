<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KITT Pursuit — Knight Rider</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:#000; overflow:hidden; font-family:'Courier New',monospace; }
#gameCanvas { display:block; width:100%; height:100%; image-rendering:pixelated; }
#ui {
  position:fixed; top:0; left:0; width:100%; height:100%;
  pointer-events:none; z-index:10;
}
/* ── TITLE SCREEN ── */
#titleScreen {
  position:fixed; inset:0; background:radial-gradient(ellipse at center, #1a0000 0%, #000 70%);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:100; pointer-events:all;
}
#titleScreen h1 {
  font-size:clamp(2.5rem,7vw,5rem); letter-spacing:0.3em;
  color:#ff4400; text-shadow:0 0 30px #ff4400, 0 0 60px #ff2200;
  font-weight:900; margin-bottom:0.2em;
}
#titleScreen h2 {
  font-size:clamp(0.9rem,2.5vw,1.4rem); letter-spacing:0.5em;
  color:#00ff88; text-shadow:0 0 15px #00ff88; margin-bottom:3em;
}
.title-scanner {
  width:200px; height:4px; background:#111; border-radius:2px;
  margin-bottom:3em; overflow:hidden; position:relative;
}
.title-scanner::after {
  content:''; position:absolute; top:0; left:-40px; width:40px; height:100%;
  background:linear-gradient(90deg,transparent,#ff4400,transparent);
  animation:scan 1.5s ease-in-out infinite;
}
@keyframes scan { 0%{left:-40px} 100%{left:240px} }
.menu-btn {
  display:block; width:280px; padding:14px 0; margin:8px 0;
  background:transparent; border:2px solid #ff4400; color:#ff4400;
  font-family:'Courier New',monospace; font-size:1rem; letter-spacing:0.2em;
  cursor:pointer; text-transform:uppercase; transition:all 0.2s;
  pointer-events:all;
}
.menu-btn:hover { background:#ff4400; color:#000; box-shadow:0 0 20px #ff4400; }
.title-footer { position:absolute; bottom:20px; color:#333; font-size:0.7rem; letter-spacing:0.2em; }
/* ── VIEW BUTTONS ── */
#viewBar {
  position:fixed; bottom:12px; left:50%; transform:translateX(-50%);
  display:flex; gap:6px; z-index:20; pointer-events:all;
}
.vbtn {
  padding:6px 14px; background:rgba(0,0,0,0.7); border:1px solid #00ff88;
  color:#00ff88; font-family:'Courier New',monospace; font-size:0.7rem;
  letter-spacing:0.1em; cursor:pointer; text-transform:uppercase;
  transition:all 0.15s;
}
.vbtn:hover, .vbtn.active { background:#00ff88; color:#000; }
/* ── OVERLAY ── */
#overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.85);
  display:none; align-items:center; justify-content:center;
  flex-direction:column; z-index:90; pointer-events:all;
}
#overlay h2 { font-size:3rem; letter-spacing:0.3em; margin-bottom:1em; }
#overlay.fail h2 { color:#ff2200; text-shadow:0 0 30px #ff2200; }
#overlay.win h2  { color:#00ff88; text-shadow:0 0 30px #00ff88; }
#overlay p { color:#aaa; letter-spacing:0.1em; margin-bottom:2em; font-size:1.1rem; }
/* ── CONTROLS MODAL ── */
#controlsModal {
  position:fixed; inset:0; background:rgba(0,0,0,0.92);
  display:none; align-items:center; justify-content:center;
  z-index:95; pointer-events:all;
}
#controlsModal .box {
  border:2px solid #00ff88; padding:40px; max-width:500px; width:90%;
  color:#00ff88;
}
#controlsModal h3 { font-size:1.5rem; letter-spacing:0.3em; margin-bottom:1.5em; text-align:center; }
#controlsModal table { width:100%; border-collapse:collapse; }
#controlsModal td { padding:8px 12px; border-bottom:1px solid #1a3a2a; font-size:0.9rem; }
#controlsModal td:first-child { color:#ff8800; }
#controlsModal .close-btn { margin-top:1.5em; width:100%; }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="viewBar" style="display:none">
  <button class="vbtn active" id="btnTopDown"  onclick="setView('topdown')">&#9635; Top-Down</button>
  <button class="vbtn"        id="btnStreet"   onclick="setView('street')">&#9670; Street View</button>
  <button class="vbtn"        id="btnCockpit"  onclick="setView('cockpit')">&#9673; Cockpit</button>
  <button class="vbtn"        id="btnFront"    onclick="setView('front')">&#9650; Front View</button>
</div>
<div id="titleScreen">
  <h1>KITT PURSUIT</h1>
  <h2>Knight Rider</h2>
  <div class="title-scanner"></div>
  <button class="menu-btn" id="btnStart">&#9654; Start Mission</button>
  <button class="menu-btn" id="btnControls">&#9776; Controls</button>
  <div class="title-footer">v2.0 &nbsp;·&nbsp; Production Build &nbsp;·&nbsp; Foundation Industries</div>
</div>
<div id="overlay">
  <h2 id="overlayTitle">MISSION FAILED</h2>
  <p id="overlayScore">Score: 0</p>
  <button class="menu-btn" id="btnRestart">&#9654; Try Again</button>
  <button class="menu-btn" id="btnMenu" style="margin-top:8px">&#8592; Main Menu</button>
</div>
<div id="controlsModal">
  <div class="box">
    <h3>CONTROLS</h3>
    <table>
      <tr><td>W / &uarr;</td><td>Accelerate</td></tr>
      <tr><td>S / &darr;</td><td>Brake / Reverse</td></tr>
      <tr><td>A / &larr;</td><td>Steer Left</td></tr>
      <tr><td>D / &rarr;</td><td>Steer Right</td></tr>
      <tr><td>SPACE</td><td>Fire Weapon</td></tr>
      <tr><td>B</td><td>Turbo Boost</td></tr>
      <tr><td>V</td><td>Cycle View</td></tr>
      <tr><td>M</td><td>Super Pursuit Mode</td></tr>
    </table>
    <button class="menu-btn close-btn" onclick="document.getElementById('controlsModal').style.display='none'">Close</button>
  </div>
</div>

<script>
'use strict';
// ═══════════════════════════════════════════════════════════════════════════════
//  KITT PURSUIT v2.0 — Complete Rewrite
//  Pseudo-3D perspective driving · Canyon environment · 4 camera views
// ═══════════════════════════════════════════════════════════════════════════════

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// ── RESIZE ────────────────────────────────────────────────────────────────────
function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// ── CONSTANTS ─────────────────────────────────────────────────────────────────
const ROAD_WIDTH   = 420;   // world units
const ROAD_LANES   = 3;
const SEGMENT_LEN  = 200;   // length of each road segment
const DRAW_DIST    = 200;   // segments to draw ahead
const CAM_HEIGHT   = 1000;  // camera height above road
const CAM_DEPTH    = 0.84;  // field of view depth
const FIELD_W      = 2400;  // world width for top-down
const FIELD_H      = 50000; // world height (infinite scroll)
const GRAVITY      = 0;
const MAX_SPEED    = 280;   // mph
const ACCEL        = 3.2;
const BRAKE        = 5.0;
const FRICTION     = 0.94;
const TURN_SPEED   = 0.045;
const TURBO_MULT   = 1.7;
const TURBO_MAX    = 100;
const TURBO_DRAIN  = 18;
const TURBO_REGEN  = 6;
const KITT_MAX_HP  = 300;
const DAMAGE_COOL  = 90;    // frames between damage hits

// ── VIEWS ─────────────────────────────────────────────────────────────────────
const VIEWS = ['topdown','street','cockpit','front'];
let currentView = 'street'; // default to street view

// ── INPUT ─────────────────────────────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'KeyV') cycleView();
  if (e.code === 'KeyB' && STATE.running) activateTurbo();
  if (e.code === 'KeyM' && STATE.running) toggleSPM();
  if (e.code === 'Space' && STATE.running) { e.preventDefault(); fireWeapon(); }
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// ── GAME STATE ────────────────────────────────────────────────────────────────
const STATE = {
  running: false,
  score: 0,
  time: 0,
  level: 1,
  view: 'street',
  paused: false,
  weaponMode: 0,    // 0=laser, 1=missile, 2=oil
  spm: 0,           // super pursuit mode charge
};

// ── KITT ──────────────────────────────────────────────────────────────────────
const kitt = {
  x: FIELD_W / 2,       // world X
  z: 0,                 // world Z (distance traveled)
  speed: 0,             // current speed mph
  angle: 0,             // steering angle (-1..1)
  steer: 0,             // visual steer lean
  health: KITT_MAX_HP,
  turbo: TURBO_MAX,
  spm: 0,               // super pursuit mode charge
  weapon: null,
  boosting: false,
  spmActive: false,
  damageCooldown: 0,
  invincible: 180,      // frames of spawn invincibility
  trail: [],
  enginePitch: 1.0,
  rpm: 800,           // engine RPM (idle ~800, max ~9000)
  gear: 1,            // current gear (1-6)
  gearShiftTimer: 0,  // timer for gear shift animation
  fuelGals: 12.11,    // fuel gallons
  oilPsi: 45,         // oil pressure
  tempF: 195,         // engine temp
  ampere: 14.2,       // alternator amps
  boostPsi: 0,        // turbo boost psi
  inletTemp: 72,      // inlet air temp
};

// ── ROAD SEGMENTS ─────────────────────────────────────────────────────────────
// Each segment: { index, curve, hill, color, scenery[] }
let segments = [];
let segmentOffset = 0; // how many segments have scrolled past

function buildRoad() {
  segments = [];
  const N = 2000; // pre-build 2000 segments
  let curve = 0;
  let curveDelta = 0;
  for (let i = 0; i < N; i++) {
    // Vary curve every ~80 segments
    if (i % 80 === 0) curveDelta = (Math.random() - 0.5) * 0.008;
    curve += curveDelta;
    curve = Math.max(-0.006, Math.min(0.006, curve));
    const seg = {
      index: i,
      curve: curve,
      hill: Math.sin(i * 0.05) * 0.002,
      colorIdx: Math.floor(i / 2) % 2,
      scenery: [],
    };
    // Add scenery
    if (i % 12 === 0) {
      const side = Math.random() > 0.5 ? 1 : -1;
      seg.scenery.push({ type: pickScenery(i), side, offset: 1.2 + Math.random() * 0.8 });
    }
    if (i % 18 === 0) {
      seg.scenery.push({ type: pickScenery(i), side: -1, offset: 1.4 + Math.random() * 1.2 });
    }
    segments.push(seg);
  }
}

function pickScenery(i) {
  const level = Math.floor(i / 500) % 4;
  if (level === 0) return ['rock_small','rock_large','cactus','dead_tree'][Math.floor(Math.random()*4)];
  if (level === 1) return ['rock_large','mesa','cactus','tumbleweed'][Math.floor(Math.random()*4)];
  if (level === 2) return ['building','pole','tree','rock_large'][Math.floor(Math.random()*4)];
  return ['building','tree','pole','mesa'][Math.floor(Math.random()*4)];
}

// ── ENEMIES ───────────────────────────────────────────────────────────────────
let enemies = [];
let pickups = [];
let particles = [];
let explosions = [];

const ENEMY_TYPES = {
  car:        { w:36, h:60, speed:140, hp:30,  score:100, color:'#cc2200', type:'car' },
  muscle:     { w:40, h:65, speed:160, hp:50,  score:200, color:'#884400', type:'car' },
  helicopter: { w:70, h:55, speed:120, hp:60,  score:300, color:'#334455', type:'heli' },
  shadow:     { w:38, h:62, speed:200, hp:80,  score:500, color:'#1a1a2e', type:'car' },
  truck:      { w:55, h:90, speed:100, hp:120, score:400, color:'#556633', type:'truck' },
};

// ── BOSS ──────────────────────────────────────────────────────────────────────
const boss = {
  active: false, x: FIELD_W/2, z: 0, speed: 0,
  health: 500, maxHealth: 500, phase: 0,
  damageCooldown: 0,
};

// ── AUDIO ─────────────────────────────────────────────────────────────────────
let audioCtx = null;
let currentMusic = null;
let musicGain = null;
let sfxGain = null;
const audioBuffers = {};
const AUDIO_FILES = {
  music_main:   'audio/music_main_theme.mp3',
  music_level1: 'audio/music_level1.mp3',
  music_level2: 'audio/music_level2.mp3',
  music_level3: 'audio/music_level3.mp3',
  music_level4: 'audio/music_level4.mp3',
  music_boss:   'audio/music_boss.mp3',
  sfx_boost:    'audio/sfx_boost.wav',
  sfx_hit:      'audio/sfx_hit.wav',
  sfx_explosion:'audio/sfx_explosion.wav',
  sfx_gun:      'audio/sfx_gunfire.wav',
};

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  musicGain = audioCtx.createGain(); musicGain.gain.value = 0.55;
  sfxGain   = audioCtx.createGain(); sfxGain.gain.value   = 0.75;
  musicGain.connect(audioCtx.destination);
  sfxGain.connect(audioCtx.destination);
  // Load all files
  Object.entries(AUDIO_FILES).forEach(([key, url]) => {
    fetch(url).then(r => r.arrayBuffer()).then(buf =>
      audioCtx.decodeAudioData(buf, decoded => { audioBuffers[key] = decoded; })
    ).catch(() => {});
  });
}

function playMusic(key) {
  if (!audioCtx || !audioBuffers[key]) return;
  if (currentMusic) { try { currentMusic.stop(); } catch(e){} }
  const src = audioCtx.createBufferSource();
  src.buffer = audioBuffers[key];
  src.loop = true;
  src.connect(musicGain);
  src.start(0);
  currentMusic = src;
}

function playSFX(key, vol=1) {
  if (!audioCtx || !audioBuffers[key]) return;
  const src = audioCtx.createBufferSource();
  src.buffer = audioBuffers[key];
  const g = audioCtx.createGain(); g.gain.value = vol;
  src.connect(g); g.connect(sfxGain);
  src.start(0);
}

function stopMusic() {
  if (currentMusic) { try { currentMusic.stop(); } catch(e){} currentMusic = null; }
}

// ── DIALOGUE SYSTEM ───────────────────────────────────────────────────────────
const DIALOGUES = [
  { speaker:'KITT',    text:'All systems nominal. Turbo boost ready.' },
  { speaker:'MICHAEL', text:'KITT, watch out for that helicopter!' },
  { speaker:'KITT',    text:'Molecular bonded shell at full integrity.' },
  { speaker:'MICHAEL', text:'KITT, is there anyone still around?' },
  { speaker:'KITT',    text:'Scanning for hostiles. Three vehicles detected.' },
  { speaker:'MICHAEL', text:'What happened here?' },
  { speaker:'KITT',    text:'Turbo boost engaged. Hold on, Michael.' },
  { speaker:'MICHAEL', text:'KITT, we need to stop that truck!' },
  { speaker:'KITT',    text:'Super Pursuit Mode activated. Maximum velocity.' },
  { speaker:'MICHAEL', text:'Nice driving, KITT. Now let\'s finish this.' },
  { speaker:'KITT',    text:'Warning: enemy vehicle approaching at high speed.' },
  { speaker:'MICHAEL', text:'Devon is going to hear about this one.' },
];
let dialogue = { active: false, text: '', speaker: '', timer: 0, alpha: 0 };
let dialogueQueue = [];
let lastDialogueTime = -30;

function showDialogue(idx) {
  const d = DIALOGUES[idx % DIALOGUES.length];
  dialogueQueue.push({ ...d, duration: 220 });
}

function updateDialogue(dt) {
  if (dialogue.active) {
    dialogue.timer -= dt * 60;
    if (dialogue.timer < 60) dialogue.alpha = dialogue.timer / 60;
    else if (dialogue.timer > dialogue.duration - 30) dialogue.alpha = (dialogue.duration - dialogue.timer) / 30;
    else dialogue.alpha = 1;
    if (dialogue.timer <= 0) { dialogue.active = false; }
  }
  if (!dialogue.active && dialogueQueue.length > 0) {
    const next = dialogueQueue.shift();
    dialogue = { active: true, ...next, timer: next.duration, alpha: 0 };
  }
  // Auto-trigger dialogues
  if (STATE.time - lastDialogueTime > 35 && STATE.running) {
    lastDialogueTime = STATE.time;
    showDialogue(Math.floor(STATE.time / 35) % DIALOGUES.length);
  }
}

// ── WEAPON SYSTEM ─────────────────────────────────────────────────────────────
let bullets = [];
let gunCooldown = 0;

function fireWeapon() {
  if (!kitt.weapon || kitt.weapon.ammo <= 0) return;
  if (gunCooldown > 0) return;
  const w = kitt.weapon;
  if (w.type === 'laser') {
    bullets.push({ x: kitt.x, z: kitt.z + 50, vx: 0, vz: 1200, damage: 40, owner:'kitt', color:'#00ffff', r:6 });
    gunCooldown = 8;
  } else if (w.type === 'machineGun') {
    bullets.push({ x: kitt.x - 10, z: kitt.z + 50, vx: -30, vz: 1000, damage: 15, owner:'kitt', color:'#ffff00', r:4 });
    bullets.push({ x: kitt.x + 10, z: kitt.z + 50, vx:  30, vz: 1000, damage: 15, owner:'kitt', color:'#ffff00', r:4 });
    gunCooldown = 4;
  } else if (w.type === 'missile') {
    bullets.push({ x: kitt.x, z: kitt.z + 60, vx: 0, vz: 900, damage: 80, owner:'kitt', color:'#ff8800', r:8, homing:true });
    gunCooldown = 30;
  }
  w.ammo--;
  if (w.ammo <= 0) kitt.weapon = null;
  playSFX('sfx_gun', 0.6);
}

// ── PICKUPS ───────────────────────────────────────────────────────────────────
const PICKUP_TYPES = ['health','turbo','laser','machineGun','missile','shield'];

function spawnPickup(z) {
  const lane = (Math.random() - 0.5) * ROAD_WIDTH * 0.7;
  pickups.push({
    x: FIELD_W/2 + lane,
    z: z,
    type: PICKUP_TYPES[Math.floor(Math.random() * PICKUP_TYPES.length)],
    bob: Math.random() * Math.PI * 2,
    collected: false,
  });
}

// ── SPAWN ENEMY ───────────────────────────────────────────────────────────────
let enemySpawnTimer = 0;
let enemySpawnInterval = 280;
const MAX_ENEMIES = 5;

function spawnEnemy() {
  if (enemies.length >= MAX_ENEMIES) return;
  const types = Object.keys(ENEMY_TYPES);
  // Bias toward cars early, helicopters and shadows later
  let pool = ['car','car','car','muscle'];
  if (STATE.level >= 2) pool.push('helicopter','truck');
  if (STATE.level >= 3) pool.push('shadow','helicopter');
  if (STATE.level >= 4) pool.push('shadow','shadow');
  const typeName = pool[Math.floor(Math.random() * pool.length)];
  const def = ENEMY_TYPES[typeName];
  const lane = (Math.random() - 0.5) * ROAD_WIDTH * 0.75;
  enemies.push({
    x: FIELD_W/2 + lane,
    z: kitt.z - (400 + Math.random() * 600), // behind KITT, chasing
    speed: def.speed * (0.8 + Math.random() * 0.4),
    hp: def.hp,
    maxHp: def.hp,
    score: def.score,
    color: def.color,
    type: def.type,
    typeName,
    w: def.w, h: def.h,
    damageCooldown: 0,
    shootTimer: 60 + Math.random() * 120,
    angle: 0,
    hoverPhase: Math.random() * Math.PI * 2,
    active: true,
  });
}

// ── PARTICLES ─────────────────────────────────────────────────────────────────
function spawnParticles(x, z, count, color, speed=80) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = speed * (0.3 + Math.random() * 0.7);
    particles.push({
      x, z, vx: Math.cos(a)*s, vz: Math.sin(a)*s,
      life: 1, decay: 0.02 + Math.random()*0.03,
      r: 3 + Math.random()*5, color,
    });
  }
}

function spawnExplosion(x, z) {
  explosions.push({ x, z, r: 0, maxR: 80 + Math.random()*40, life: 1, decay: 0.025 });
  spawnParticles(x, z, 20, '#ff8800', 150);
  spawnParticles(x, z, 15, '#ffff00', 100);
  spawnParticles(x, z, 10, '#ff4400', 200);
  playSFX('sfx_explosion', 0.8);
}

// ── VOICE LINES ───────────────────────────────────────────────────────────────
let voiceLine = { text:'', timer:0, alpha:0 };
function showVoiceLine(text, duration=180) {
  voiceLine = { text, timer: duration, alpha: 0 };
}

// ── LEVEL NAMES ───────────────────────────────────────────────────────────────
const LEVEL_NAMES = ['','HIGHWAY PURSUIT','DESERT STORM','URBAN WARFARE','FINAL PURSUIT'];
const LEVEL_MUSIC = ['','music_level1','music_level2','music_level3','music_level4'];

// ── SCORE POPUP ───────────────────────────────────────────────────────────────
let scorePopups = [];
function addScorePopup(x, z, val) {
  scorePopups.push({ x, z, val, life: 1, vy: -60 });
}

// ═══════════════════════════════════════════════════════════════════════════════
//  PSEUDO-3D ROAD RENDERER
// ═══════════════════════════════════════════════════════════════════════════════

// Road color palettes per level
const ROAD_PALETTES = [
  { road:'#3A3A3A', rumble1:'#D4B896', rumble2:'#C4A886', lane:'#E8E8E8', grass1:'#C8A870', grass2:'#B8986A', sky1:'#4a6fa5', sky2:'#c4956a' },
  { road:'#3A3A3A', rumble1:'#C8A060', rumble2:'#B89050', lane:'#FFFF88', grass1:'#C8A060', grass2:'#B89060', sky1:'#7a5a3a', sky2:'#e8a060' },
  { road:'#444444', rumble1:'#9aaa8a', rumble2:'#8a9a7a', lane:'#E8E8E8', grass1:'#8a9a7a', grass2:'#7a8a6a', sky1:'#6a7a9a', sky2:'#c0c8d8' },
  { road:'#3a3a4a', rumble1:'#5a6a7a', rumble2:'#4a5a6a', lane:'#E8E8E8', grass1:'#5a6a7a', grass2:'#4a5a6a', sky1:'#1a2a4a', sky2:'#3a4a6a' },
];

// Project a world point to screen coordinates (pseudo-3D)
function project(worldX, worldY, worldZ, camX, camZ, camH, camDepth, W, H) {
  const dz = worldZ - camZ;
  if (dz <= 0) return null;
  const scale = camDepth / dz;
  const screenX = W/2 + scale * (worldX - camX) * W/2;
  const screenY = H/2 - scale * (worldY - camH) * H/2;
  const screenW = scale * ROAD_WIDTH * W/2;
  return { x: screenX, y: screenY, w: screenW, scale };
}

// Draw the pseudo-3D road
function drawPseudo3DRoad(camX, camZ, camH, W, H, palette) {
  const horizon = H * 0.48;

  // ── SKY ──
  const skyGrad = ctx.createLinearGradient(0, 0, 0, horizon);
  skyGrad.addColorStop(0, palette.sky1);
  skyGrad.addColorStop(1, palette.sky2);
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, horizon);

  // ── CANYON WALLS / MOUNTAINS ──
  drawCanyonEnvironment(W, H, horizon, palette, camZ);

  // ── GROUND ──
  const groundGrad = ctx.createLinearGradient(0, horizon, 0, H);
  groundGrad.addColorStop(0, palette.grass1);
  groundGrad.addColorStop(1, palette.grass2);
  ctx.fillStyle = groundGrad;
  ctx.fillRect(0, horizon, W, H - horizon);

  // ── ROAD SEGMENTS ──
  const startSeg = Math.floor(camZ / SEGMENT_LEN) % segments.length;
  let x = 0, dx = 0;
  let prevY = H;

  // Draw from back to front
  for (let n = 0; n < DRAW_DIST; n++) {
    const segIdx = (startSeg + n) % segments.length;
    const seg = segments[segIdx];
    const segZ = (Math.floor(camZ / SEGMENT_LEN) + n) * SEGMENT_LEN;

    const p1 = project(FIELD_W/2 + x, 0, segZ,     camX, camZ, camH, CAM_DEPTH, W, H);
    const p2 = project(FIELD_W/2 + x + dx, 0, segZ + SEGMENT_LEN, camX, camZ, camH, CAM_DEPTH, W, H);

    if (!p1 || !p2) { x += dx; dx += seg.curve * SEGMENT_LEN; continue; }
    if (p1.y >= prevY) { x += dx; dx += seg.curve * SEGMENT_LEN; continue; }

    const isAlternate = seg.colorIdx === 1;
    const roadColor  = palette.road;
    const rumbleColor = isAlternate ? palette.rumble1 : palette.rumble2;
    const grassColor  = isAlternate ? palette.grass1  : palette.grass2;
    const laneColor   = isAlternate ? palette.lane    : 'transparent';

    // Grass
    ctx.fillStyle = grassColor;
    ctx.fillRect(0, p2.y, W, p1.y - p2.y);

    // Rumble strips
    const rumbleW = p1.w * 0.15;
    ctx.fillStyle = rumbleColor;
    // Left rumble
    ctx.beginPath();
    ctx.moveTo(p1.x - p1.w - rumbleW, p1.y);
    ctx.lineTo(p1.x - p1.w, p1.y);
    ctx.lineTo(p2.x - p2.w, p2.y);
    ctx.lineTo(p2.x - p2.w - rumbleW*p2.w/p1.w, p2.y);
    ctx.closePath(); ctx.fill();
    // Right rumble
    ctx.beginPath();
    ctx.moveTo(p1.x + p1.w, p1.y);
    ctx.lineTo(p1.x + p1.w + rumbleW, p1.y);
    ctx.lineTo(p2.x + p2.w + rumbleW*p2.w/p1.w, p2.y);
    ctx.lineTo(p2.x + p2.w, p2.y);
    ctx.closePath(); ctx.fill();

    // Road surface
    ctx.fillStyle = roadColor;
    ctx.beginPath();
    ctx.moveTo(p1.x - p1.w, p1.y);
    ctx.lineTo(p1.x + p1.w, p1.y);
    ctx.lineTo(p2.x + p2.w, p2.y);
    ctx.lineTo(p2.x - p2.w, p2.y);
    ctx.closePath(); ctx.fill();

    // Lane markings
    if (isAlternate) {
      ctx.strokeStyle = '#FFDD00';
      ctx.lineWidth = Math.max(1, p1.scale * 8);
      // Center double yellow line
      ctx.beginPath();
      ctx.moveTo(p1.x - p1.w*0.04, p1.y);
      ctx.lineTo(p2.x - p2.w*0.04, p2.y);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(p1.x + p1.w*0.04, p1.y);
      ctx.lineTo(p2.x + p2.w*0.04, p2.y);
      ctx.stroke();
      // White lane dividers
      ctx.strokeStyle = '#FFFFFF';
      ctx.lineWidth = Math.max(1, p1.scale * 4);
      const lanePositions = [-0.5, 0.5];
      lanePositions.forEach(lp => {
        ctx.beginPath();
        ctx.moveTo(p1.x + p1.w * lp * 0.65, p1.y);
        ctx.lineTo(p2.x + p2.w * lp * 0.65, p2.y);
        ctx.stroke();
      });
    }

    // Draw scenery objects
    seg.scenery.forEach(sc => {
      const scX = FIELD_W/2 + sc.side * ROAD_WIDTH * sc.offset;
      const sp = project(scX, 0, segZ, camX, camZ, camH, CAM_DEPTH, W, H);
      if (sp && sp.y < p1.y && sp.y > 0) {
        drawSceneryObject(sc.type, sp.x, sp.y, sp.scale, sc.side);
      }
    });

    prevY = p1.y;
    x += dx;
    dx += seg.curve * SEGMENT_LEN;
  }
}

// ── CANYON ENVIRONMENT ────────────────────────────────────────────────────────
function drawCanyonEnvironment(W, H, horizon, palette, camZ) {
  const level = STATE.level - 1;
  const scroll = camZ * 0.00015;

  if (level <= 1) {
    // Desert canyon walls
    drawCanyonWalls(W, H, horizon, scroll);
  } else if (level === 2) {
    // Urban skyline
    drawUrbanSkyline(W, H, horizon, scroll);
  } else {
    // Night canyon
    drawNightCanyon(W, H, horizon, scroll);
  }

  // Horizon glow
  const hg = ctx.createLinearGradient(0, horizon - 30, 0, horizon + 20);
  hg.addColorStop(0, 'transparent');
  hg.addColorStop(0.5, 'rgba(255,160,60,0.25)');
  hg.addColorStop(1, 'transparent');
  ctx.fillStyle = hg;
  ctx.fillRect(0, horizon - 30, W, 50);
}

function drawCanyonWalls(W, H, horizon, scroll) {
  ctx.save();
  const lx = (scroll * 60) % W;
  const rx = (scroll * 45) % W;

  // DISTANT MOUNTAINS (far back, multiple layers)
  const mColors = ['#9a8878','#8a7060','#7a6050'];
  mColors.forEach((mc, mi) => {
    ctx.fillStyle = mc;
    ctx.beginPath();
    ctx.moveTo(0, horizon);
    const pts = 16;
    for (let i = 0; i <= pts; i++) {
      const px = (i / pts) * W + (scroll * (8 + mi*4)) % W - W * 0.1;
      const noise = Math.sin(i * 0.7 + mi * 2.3 + scroll * 0.1) * 0.12 +
                    Math.sin(i * 1.4 + mi * 1.1) * 0.08;
      const ph = (0.08 + mi * 0.04 + noise) * horizon;
      ctx.lineTo(px, horizon - ph);
    }
    ctx.lineTo(W, horizon);
    ctx.closePath(); ctx.fill();
  });

  // LEFT CANYON WALL (close, dramatic)
  const leftX = -W * 0.05 + (lx % (W * 0.3)) - W * 0.15;
  const lwPts = [
    [leftX - 20, horizon],
    [leftX - 20, horizon - H * 0.55],
    [leftX + 30, horizon - H * 0.72],
    [leftX + 80, horizon - H * 0.68],
    [leftX + 140, horizon - H * 0.58],
    [leftX + 180, horizon - H * 0.62],
    [leftX + 240, horizon - H * 0.48],
    [leftX + 300, horizon - H * 0.52],
    [leftX + 340, horizon - H * 0.42],
    [leftX + 380, horizon],
  ];
  // Shadow layer
  ctx.fillStyle = '#3a2510';
  ctx.beginPath(); ctx.moveTo(lwPts[0][0], lwPts[0][1]);
  lwPts.forEach(p => ctx.lineTo(p[0], p[1]));
  ctx.closePath(); ctx.fill();
  // Main rock face gradient
  const lwGrad = ctx.createLinearGradient(leftX, horizon - H*0.7, leftX + 380, horizon);
  lwGrad.addColorStop(0, '#7a5535'); lwGrad.addColorStop(0.3, '#9a6a40');
  lwGrad.addColorStop(0.6, '#8a5f38'); lwGrad.addColorStop(1, '#6a4a28');
  ctx.fillStyle = lwGrad;
  ctx.beginPath(); ctx.moveTo(lwPts[0][0], lwPts[0][1]);
  lwPts.forEach(p => ctx.lineTo(p[0], p[1]));
  ctx.closePath(); ctx.fill();
  // Rock strata lines
  ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.lineWidth = 1.5;
  for (let s = 0; s < 5; s++) {
    const sy = horizon - H * (0.15 + s * 0.1);
    ctx.beginPath();
    ctx.moveTo(leftX - 20, sy);
    ctx.lineTo(leftX + 380, sy + (s%2===0?8:-5));
    ctx.stroke();
  }
  // Highlight edge
  ctx.strokeStyle = 'rgba(200,160,100,0.4)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(lwPts[1][0], lwPts[1][1]);
  lwPts.slice(1, -1).forEach(p => ctx.lineTo(p[0], p[1]));
  ctx.stroke();

  // Second left wall layer (closer, darker)
  const lw2X = -W * 0.1 + ((lx * 1.3) % (W * 0.2));
  ctx.fillStyle = '#2a1a0a';
  ctx.beginPath();
  ctx.moveTo(lw2X, horizon);
  ctx.lineTo(lw2X, horizon - H * 0.38);
  ctx.lineTo(lw2X + 60, horizon - H * 0.52);
  ctx.lineTo(lw2X + 120, horizon - H * 0.44);
  ctx.lineTo(lw2X + 160, horizon - H * 0.35);
  ctx.lineTo(lw2X + 200, horizon);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#4a3018';
  ctx.beginPath();
  ctx.moveTo(lw2X + 20, horizon);
  ctx.lineTo(lw2X + 20, horizon - H * 0.35);
  ctx.lineTo(lw2X + 80, horizon - H * 0.48);
  ctx.lineTo(lw2X + 140, horizon - H * 0.38);
  ctx.lineTo(lw2X + 180, horizon);
  ctx.closePath(); ctx.fill();

  // RIGHT CANYON WALL (close, dramatic)
  const rightX = W * 1.05 - (rx % (W * 0.3));
  const rwPts = [
    [rightX + 20, horizon],
    [rightX + 20, horizon - H * 0.52],
    [rightX - 30, horizon - H * 0.70],
    [rightX - 90, horizon - H * 0.65],
    [rightX - 150, horizon - H * 0.55],
    [rightX - 200, horizon - H * 0.60],
    [rightX - 260, horizon - H * 0.45],
    [rightX - 320, horizon - H * 0.50],
    [rightX - 360, horizon - H * 0.38],
    [rightX - 400, horizon],
  ];
  ctx.fillStyle = '#3a2510';
  ctx.beginPath(); ctx.moveTo(rwPts[0][0], rwPts[0][1]);
  rwPts.forEach(p => ctx.lineTo(p[0], p[1]));
  ctx.closePath(); ctx.fill();
  const rwGrad = ctx.createLinearGradient(rightX - 400, horizon - H*0.7, rightX, horizon);
  rwGrad.addColorStop(0, '#6a4a28'); rwGrad.addColorStop(0.4, '#8a5f38');
  rwGrad.addColorStop(0.7, '#9a6a40'); rwGrad.addColorStop(1, '#7a5535');
  ctx.fillStyle = rwGrad;
  ctx.beginPath(); ctx.moveTo(rwPts[0][0], rwPts[0][1]);
  rwPts.forEach(p => ctx.lineTo(p[0], p[1]));
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.lineWidth = 1.5;
  for (let s = 0; s < 5; s++) {
    const sy = horizon - H * (0.12 + s * 0.09);
    ctx.beginPath();
    ctx.moveTo(rightX - 400, sy + (s%2===0?-5:8));
    ctx.lineTo(rightX + 20, sy);
    ctx.stroke();
  }
  ctx.strokeStyle = 'rgba(200,160,100,0.4)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(rwPts[1][0], rwPts[1][1]);
  rwPts.slice(1, -1).forEach(p => ctx.lineTo(p[0], p[1]));
  ctx.stroke();

  // Second right wall layer
  const rw2X = W * 1.1 - ((rx * 1.2) % (W * 0.2));
  ctx.fillStyle = '#2a1a0a';
  ctx.beginPath();
  ctx.moveTo(rw2X, horizon);
  ctx.lineTo(rw2X, horizon - H * 0.36);
  ctx.lineTo(rw2X - 70, horizon - H * 0.50);
  ctx.lineTo(rw2X - 140, horizon - H * 0.42);
  ctx.lineTo(rw2X - 180, horizon - H * 0.32);
  ctx.lineTo(rw2X - 220, horizon);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#4a3018';
  ctx.beginPath();
  ctx.moveTo(rw2X - 20, horizon);
  ctx.lineTo(rw2X - 20, horizon - H * 0.32);
  ctx.lineTo(rw2X - 100, horizon - H * 0.46);
  ctx.lineTo(rw2X - 160, horizon - H * 0.36);
  ctx.lineTo(rw2X - 200, horizon);
  ctx.closePath(); ctx.fill();

  // SPARSE DESERT TREES NEAR HORIZON
  for (let t = 0; t < 5; t++) {
    const tx = ((t * 200 + scroll * 60) % (W + 300)) - 150;
    const ty = horizon - 12 - Math.sin(t * 2.1) * 15;
    const ts = 0.35 + Math.sin(t * 1.9) * 0.15;
    drawDesertTree(tx, ty, ts);
  }

  ctx.restore();
}
function drawUrbanSkyline(W, H, horizon, scroll) {
  ctx.save();
  // Overcast sky
  const sg = ctx.createLinearGradient(0, 0, 0, horizon);
  sg.addColorStop(0, '#6a7a9a'); sg.addColorStop(1, '#c0c8d8');
  ctx.fillStyle = sg; ctx.fillRect(0, 0, W, horizon);

  // Buildings
  const buildings = [
    {x:0.05,w:0.08,h:0.35,c:'#8a8a8a'},{x:0.12,w:0.06,h:0.45,c:'#7a7a7a'},
    {x:0.17,w:0.1,h:0.3,c:'#9a9a9a'},{x:0.25,w:0.07,h:0.5,c:'#6a6a6a'},
    {x:0.7,w:0.08,h:0.4,c:'#8a8a8a'},{x:0.77,w:0.06,h:0.35,c:'#7a7a7a'},
    {x:0.82,w:0.1,h:0.55,c:'#6a6a6a'},{x:0.9,w:0.07,h:0.3,c:'#9a9a9a'},
  ];
  buildings.forEach(b => {
    const bx = ((b.x * W + scroll * 40) % (W + 200)) - 100;
    const bh = b.h * (horizon - 20);
    ctx.fillStyle = b.c;
    ctx.fillRect(bx, horizon - bh, b.w * W, bh);
    // Windows
    ctx.fillStyle = 'rgba(255,255,150,0.6)';
    for (let wy = 0; wy < bh - 10; wy += 18) {
      for (let wx = 4; wx < b.w * W - 4; wx += 12) {
        if (Math.random() > 0.4) ctx.fillRect(bx + wx, horizon - bh + wy + 5, 6, 8);
      }
    }
  });
  // Hills behind buildings
  ctx.fillStyle = '#a0b0a0';
  ctx.beginPath(); ctx.moveTo(0, horizon);
  for (let x = 0; x <= W; x += 20) {
    ctx.lineTo(x, horizon - 60 - Math.sin(x*0.01 + scroll*0.1)*40 - Math.sin(x*0.023)*30);
  }
  ctx.lineTo(W, horizon); ctx.closePath(); ctx.fill();
  ctx.restore();
}

function drawNightCanyon(W, H, horizon, scroll) {
  ctx.save();
  const sg = ctx.createLinearGradient(0, 0, 0, horizon);
  sg.addColorStop(0, '#050510'); sg.addColorStop(1, '#1a1a3a');
  ctx.fillStyle = sg; ctx.fillRect(0, 0, W, horizon);
  // Stars
  for (let s = 0; s < 80; s++) {
    const sx = (s * 137.5 + scroll * 5) % W;
    const sy = (s * 73.1) % (horizon * 0.8);
    const sa = 0.5 + Math.sin(s + STATE.time * 3) * 0.3;
    ctx.globalAlpha = sa;
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(sx, sy, 1.5, 1.5);
  }
  ctx.globalAlpha = 1;
  // Dark canyon silhouettes
  ctx.fillStyle = '#0a0a15';
  ctx.beginPath(); ctx.moveTo(0, horizon);
  ctx.lineTo(0, horizon - 200); ctx.lineTo(80, horizon - 280);
  ctx.lineTo(180, horizon - 250); ctx.lineTo(220, horizon);
  ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(W, horizon);
  ctx.lineTo(W, horizon - 220); ctx.lineTo(W-80, horizon - 300);
  ctx.lineTo(W-200, horizon - 260); ctx.lineTo(W-240, horizon);
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

function drawDesertTree(x, y, scale) {
  const h = 40 * scale;
  // Trunk
  ctx.fillStyle = '#5a3a1a';
  ctx.fillRect(x - 3*scale, y - h*0.4, 6*scale, h*0.4);
  // Canopy
  ctx.fillStyle = '#4a6a2a';
  ctx.beginPath();
  ctx.arc(x, y - h*0.5, 18*scale, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#3a5a1a';
  ctx.beginPath();
  ctx.arc(x - 8*scale, y - h*0.6, 12*scale, 0, Math.PI*2);
  ctx.fill();
}

// ── SCENERY OBJECT DRAWING ────────────────────────────────────────────────────
function drawSceneryObject(type, sx, sy, scale, side) {
  const s = Math.max(0.3, scale * 800);
  ctx.save();
  ctx.translate(sx, sy);
  switch(type) {
    case 'rock_small':
      ctx.fillStyle = '#8B7355';
      ctx.beginPath(); ctx.ellipse(0, 0, 20*s, 12*s, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#6B5335';
      ctx.beginPath(); ctx.ellipse(-5*s, -3*s, 12*s, 8*s, 0, 0, Math.PI*2); ctx.fill();
      break;
    case 'rock_large':
      ctx.fillStyle = '#7A6045';
      ctx.beginPath();
      ctx.moveTo(-30*s, 0); ctx.lineTo(-20*s, -35*s);
      ctx.lineTo(5*s, -45*s); ctx.lineTo(30*s, -30*s);
      ctx.lineTo(35*s, 0); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#9A8060';
      ctx.beginPath();
      ctx.moveTo(-20*s, 0); ctx.lineTo(-10*s, -30*s);
      ctx.lineTo(10*s, -40*s); ctx.lineTo(5*s, 0); ctx.closePath(); ctx.fill();
      break;
    case 'cactus':
      ctx.fillStyle = '#4a7a3a';
      ctx.fillRect(-5*s, -50*s, 10*s, 50*s);
      ctx.fillRect(-20*s, -35*s, 15*s, 8*s);
      ctx.fillRect(5*s, -28*s, 15*s, 8*s);
      ctx.fillRect(-20*s, -50*s, 8*s, 20*s);
      ctx.fillRect(12*s, -43*s, 8*s, 20*s);
      break;
    case 'dead_tree':
      ctx.strokeStyle = '#5a3a1a'; ctx.lineWidth = 6*s;
      ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -55*s); ctx.stroke();
      ctx.lineWidth = 3*s;
      ctx.beginPath(); ctx.moveTo(0, -35*s); ctx.lineTo(-20*s, -55*s); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, -40*s); ctx.lineTo(18*s, -58*s); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, -25*s); ctx.lineTo(-14*s, -38*s); ctx.stroke();
      break;
    case 'mesa':
      ctx.fillStyle = '#8B6040';
      ctx.beginPath();
      ctx.moveTo(-40*s, 0); ctx.lineTo(-35*s, -60*s);
      ctx.lineTo(-20*s, -70*s); ctx.lineTo(20*s, -70*s);
      ctx.lineTo(35*s, -60*s); ctx.lineTo(40*s, 0);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#A07050';
      ctx.fillRect(-20*s, -70*s, 40*s, 8*s);
      break;
    case 'tumbleweed':
      ctx.strokeStyle = '#8B6040'; ctx.lineWidth = 2*s;
      ctx.beginPath(); ctx.arc(0, -10*s, 12*s, 0, Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(-12*s, -10*s); ctx.lineTo(12*s, -10*s); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, -22*s); ctx.lineTo(0, 2*s); ctx.stroke();
      break;
    case 'building':
      ctx.fillStyle = '#7a7a7a';
      ctx.fillRect(-25*s, -80*s, 50*s, 80*s);
      ctx.fillStyle = '#5a5a5a';
      ctx.fillRect(-25*s, -80*s, 50*s, 8*s);
      ctx.fillStyle = 'rgba(255,255,150,0.7)';
      for (let wy = -70*s; wy < -10*s; wy += 18*s) {
        for (let wx = -18*s; wx < 18*s; wx += 14*s) {
          ctx.fillRect(wx, wy, 8*s, 10*s);
        }
      }
      break;
    case 'pole':
      ctx.strokeStyle = '#888'; ctx.lineWidth = 4*s;
      ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -70*s); ctx.stroke();
      ctx.strokeStyle = '#666'; ctx.lineWidth = 2*s;
      ctx.beginPath(); ctx.moveTo(-15*s, -65*s); ctx.lineTo(15*s, -65*s); ctx.stroke();
      break;
    case 'tree':
      ctx.fillStyle = '#4a3a1a';
      ctx.fillRect(-4*s, -50*s, 8*s, 50*s);
      ctx.fillStyle = '#2a5a1a';
      ctx.beginPath(); ctx.arc(0, -55*s, 22*s, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#1a4a0a';
      ctx.beginPath(); ctx.arc(-8*s, -65*s, 16*s, 0, Math.PI*2); ctx.fill();
      break;
  }
  ctx.restore();
}

// ═══════════════════════════════════════════════════════════════════════════════
//  KITT SPRITE DRAWING (all views)
// ═══════════════════════════════════════════════════════════════════════════════

// ── KITT TOP-DOWN (detailed Trans Am silhouette) ──────────────────────────────
function drawKITTTopDown(cx, cy, scale=1) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(scale, scale);

  const w = 22, h = 48;
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath(); ctx.ellipse(3, 4, w*0.9, h*0.45, 0, 0, Math.PI*2); ctx.fill();

  // Body — glossy black Trans Am
  const bodyGrad = ctx.createLinearGradient(-w, 0, w, 0);
  bodyGrad.addColorStop(0, '#111');
  bodyGrad.addColorStop(0.3, '#2a2a2a');
  bodyGrad.addColorStop(0.5, '#3a3a3a');
  bodyGrad.addColorStop(0.7, '#2a2a2a');
  bodyGrad.addColorStop(1, '#111');
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.moveTo(-w*0.55, h*0.5);   // rear left
  ctx.lineTo(-w*0.6,  h*0.2);   // mid left
  ctx.lineTo(-w*0.55, -h*0.1);  // front-mid left
  ctx.lineTo(-w*0.4,  -h*0.45); // front left
  ctx.lineTo( w*0.4,  -h*0.45); // front right
  ctx.lineTo( w*0.55, -h*0.1);  // front-mid right
  ctx.lineTo( w*0.6,   h*0.2);  // mid right
  ctx.lineTo( w*0.55,  h*0.5);  // rear right
  ctx.closePath(); ctx.fill();

  // Roof (lighter)
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.moveTo(-w*0.35, h*0.15);
  ctx.lineTo(-w*0.38, -h*0.08);
  ctx.lineTo( w*0.38, -h*0.08);
  ctx.lineTo( w*0.35,  h*0.15);
  ctx.closePath(); ctx.fill();

  // Windshield
  ctx.fillStyle = 'rgba(100,180,255,0.5)';
  ctx.beginPath();
  ctx.moveTo(-w*0.32, -h*0.08);
  ctx.lineTo(-w*0.28, -h*0.28);
  ctx.lineTo( w*0.28, -h*0.28);
  ctx.lineTo( w*0.32, -h*0.08);
  ctx.closePath(); ctx.fill();

  // Rear window
  ctx.fillStyle = 'rgba(80,140,200,0.4)';
  ctx.beginPath();
  ctx.moveTo(-w*0.3, h*0.15);
  ctx.lineTo(-w*0.25, h*0.0);
  ctx.lineTo( w*0.25, h*0.0);
  ctx.lineTo( w*0.3,  h*0.15);
  ctx.closePath(); ctx.fill();

  // Headlights
  ctx.fillStyle = '#ffffaa';
  ctx.fillRect(-w*0.38, -h*0.47, w*0.18, 5);
  ctx.fillRect( w*0.2,  -h*0.47, w*0.18, 5);

  // Tail lights
  ctx.fillStyle = '#ff2200';
  ctx.fillRect(-w*0.5, h*0.44, w*0.2, 5);
  ctx.fillRect( w*0.3, h*0.44, w*0.2, 5);

  // KNIGHT license plate
  ctx.fillStyle = '#cccccc';
  ctx.fillRect(-w*0.2, h*0.42, w*0.4, 8);
  ctx.fillStyle = '#000';
  ctx.font = `bold ${4}px monospace`;
  ctx.textAlign = 'center';
  ctx.fillText('KNIGHT', 0, h*0.42 + 6);

  // Red scanner bar (animated)
  const scanX = Math.sin(STATE.time * 8) * (w * 0.25);
  const scanGrad = ctx.createLinearGradient(scanX - 8, 0, scanX + 8, 0);
  scanGrad.addColorStop(0, 'transparent');
  scanGrad.addColorStop(0.5, '#ff2200');
  scanGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = scanGrad;
  ctx.fillRect(-w*0.35, -h*0.43, w*0.7, 3);

  // Wheels
  ctx.fillStyle = '#1a1a1a';
  [[-w*0.55, -h*0.25], [w*0.55, -h*0.25], [-w*0.55, h*0.3], [w*0.55, h*0.3]].forEach(([wx,wy]) => {
    ctx.beginPath(); ctx.ellipse(wx, wy, 6, 8, 0, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#444'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.ellipse(wx, wy, 4, 6, 0, 0, Math.PI*2); ctx.stroke();
  });

  ctx.restore();
}

// ── KITT REAR VIEW (3rd-person street view) ───────────────────────────────────
function drawKITTRear(cx, cy, steer=0, speed=0) {
  ctx.save();
  ctx.translate(cx, cy);

  const w = 90, h = 55;
  const lean = steer * 4;
  ctx.translate(lean, 0);

  // Shadow on ground
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath(); ctx.ellipse(0, h*0.15, w*0.7, 12, 0, 0, Math.PI*2); ctx.fill();

  // Exhaust particles at speed
  if (speed > 60) {
    for (let i = 0; i < 3; i++) {
      const ex = (Math.random()-0.5)*20;
      const ey = h*0.1 + Math.random()*15;
      ctx.globalAlpha = 0.3 + Math.random()*0.3;
      ctx.fillStyle = '#888';
      ctx.beginPath(); ctx.arc(ex, ey, 3+Math.random()*4, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // Main body
  const bodyG = ctx.createLinearGradient(-w, -h*0.5, w, -h*0.5);
  bodyG.addColorStop(0, '#0a0a0a');
  bodyG.addColorStop(0.25, '#1e1e1e');
  bodyG.addColorStop(0.5, '#2a2a2a');
  bodyG.addColorStop(0.75, '#1e1e1e');
  bodyG.addColorStop(1, '#0a0a0a');
  ctx.fillStyle = bodyG;
  ctx.beginPath();
  ctx.moveTo(-w, h*0.1);         // rear bottom left
  ctx.lineTo(-w*0.95, -h*0.15);  // rear mid left
  ctx.lineTo(-w*0.7,  -h*0.55);  // roof left
  ctx.lineTo(-w*0.35, -h*0.75);  // roof top left
  ctx.lineTo( w*0.35, -h*0.75);  // roof top right
  ctx.lineTo( w*0.7,  -h*0.55);  // roof right
  ctx.lineTo( w*0.95, -h*0.15);  // rear mid right
  ctx.lineTo( w,       h*0.1);   // rear bottom right
  ctx.closePath(); ctx.fill();

  // Roof highlight
  const roofG = ctx.createLinearGradient(-w*0.4, -h*0.8, w*0.4, -h*0.5);
  roofG.addColorStop(0, 'rgba(80,80,80,0.3)');
  roofG.addColorStop(0.5, 'rgba(120,120,120,0.4)');
  roofG.addColorStop(1, 'rgba(40,40,40,0.1)');
  ctx.fillStyle = roofG;
  ctx.beginPath();
  ctx.moveTo(-w*0.7, -h*0.55);
  ctx.lineTo(-w*0.35, -h*0.75);
  ctx.lineTo( w*0.35, -h*0.75);
  ctx.lineTo( w*0.7,  -h*0.55);
  ctx.closePath(); ctx.fill();

  // Rear window
  const rwG = ctx.createLinearGradient(-w*0.5, -h*0.6, w*0.5, -h*0.2);
  rwG.addColorStop(0, 'rgba(60,120,200,0.6)');
  rwG.addColorStop(1, 'rgba(20,60,120,0.4)');
  ctx.fillStyle = rwG;
  ctx.beginPath();
  ctx.moveTo(-w*0.62, -h*0.5);
  ctx.lineTo(-w*0.35, -h*0.72);
  ctx.lineTo( w*0.35, -h*0.72);
  ctx.lineTo( w*0.62, -h*0.5);
  ctx.lineTo( w*0.55, -h*0.2);
  ctx.lineTo(-w*0.55, -h*0.2);
  ctx.closePath(); ctx.fill();
  // Window reflection
  ctx.fillStyle = 'rgba(200,220,255,0.15)';
  ctx.beginPath();
  ctx.moveTo(-w*0.55, -h*0.5);
  ctx.lineTo(-w*0.3,  -h*0.68);
  ctx.lineTo(-w*0.1,  -h*0.65);
  ctx.lineTo(-w*0.15, -h*0.45);
  ctx.closePath(); ctx.fill();

  // Tail lights — iconic KITT red bars
  const tlG = ctx.createLinearGradient(-w, 0, -w*0.6, 0);
  tlG.addColorStop(0, '#ff0000');
  tlG.addColorStop(0.5, '#ff4400');
  tlG.addColorStop(1, '#cc0000');
  ctx.fillStyle = tlG;
  ctx.fillRect(-w*0.98, -h*0.08, w*0.32, 8);
  ctx.fillRect(-w*0.98, h*0.0,   w*0.32, 5);
  // Right tail lights
  const trG = ctx.createLinearGradient(w*0.6, 0, w, 0);
  trG.addColorStop(0, '#cc0000');
  trG.addColorStop(0.5, '#ff4400');
  trG.addColorStop(1, '#ff0000');
  ctx.fillStyle = trG;
  ctx.fillRect(w*0.66, -h*0.08, w*0.32, 8);
  ctx.fillRect(w*0.66, h*0.0,   w*0.32, 5);
  // Tail light glow
  ctx.shadowColor = '#ff2200'; ctx.shadowBlur = 15;
  ctx.fillStyle = '#ff3300';
  ctx.fillRect(-w*0.98, -h*0.08, w*0.32, 8);
  ctx.fillRect(w*0.66, -h*0.08, w*0.32, 8);
  ctx.shadowBlur = 0;

  // KNIGHT license plate
  ctx.fillStyle = '#dddddd';
  ctx.fillRect(-w*0.15, h*0.0, w*0.3, 14);
  ctx.fillStyle = '#003399';
  ctx.font = 'bold 9px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('KNIGHT', 0, h*0.0 + 10);

  // Bumper
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath();
  ctx.moveTo(-w*0.9, h*0.1);
  ctx.lineTo( w*0.9, h*0.1);
  ctx.lineTo( w*0.85, h*0.2);
  ctx.lineTo(-w*0.85, h*0.2);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#333'; ctx.lineWidth = 1;
  ctx.stroke();

  // Rear diffuser vents
  for (let i = -3; i <= 3; i++) {
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(i*12 - 4, h*0.12, 7, 6);
  }

  // Wheels
  const wheelY = h*0.15;
  [[-w*0.82, wheelY], [w*0.82, wheelY]].forEach(([wx, wy]) => {
    // Tire
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.ellipse(wx, wy, 18, 14, 0, 0, Math.PI*2); ctx.fill();
    // Rim
    const rimG = ctx.createRadialGradient(wx, wy, 2, wx, wy, 12);
    rimG.addColorStop(0, '#888');
    rimG.addColorStop(0.5, '#555');
    rimG.addColorStop(1, '#222');
    ctx.fillStyle = rimG;
    ctx.beginPath(); ctx.ellipse(wx, wy, 12, 9, 0, 0, Math.PI*2); ctx.fill();
    // Spokes
    ctx.strokeStyle = '#777'; ctx.lineWidth = 2;
    for (let s = 0; s < 5; s++) {
      const a = (s / 5) * Math.PI * 2 + STATE.time * speed * 0.01;
      ctx.beginPath();
      ctx.moveTo(wx, wy);
      ctx.lineTo(wx + Math.cos(a)*10, wy + Math.sin(a)*7);
      ctx.stroke();
    }
  });

  ctx.restore();
}

// ── KITT FRONT VIEW ───────────────────────────────────────────────────────────
function drawKITTFront(cx, cy, steer=0) {
  ctx.save();
  ctx.translate(cx, cy);
  const lean = steer * 5;
  ctx.translate(lean, 0);

  const w = 88, h = 52;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath(); ctx.ellipse(0, h*0.2, w*0.7, 12, 0, 0, Math.PI*2); ctx.fill();

  // Body
  const bodyG = ctx.createLinearGradient(-w, -h*0.5, w, -h*0.5);
  bodyG.addColorStop(0, '#080808'); bodyG.addColorStop(0.3, '#1c1c1c');
  bodyG.addColorStop(0.5, '#282828'); bodyG.addColorStop(0.7, '#1c1c1c');
  bodyG.addColorStop(1, '#080808');
  ctx.fillStyle = bodyG;
  ctx.beginPath();
  ctx.moveTo(-w, h*0.15);
  ctx.lineTo(-w*0.95, -h*0.1);
  ctx.lineTo(-w*0.75, -h*0.55);
  ctx.lineTo(-w*0.4,  -h*0.78);
  ctx.lineTo( w*0.4,  -h*0.78);
  ctx.lineTo( w*0.75, -h*0.55);
  ctx.lineTo( w*0.95, -h*0.1);
  ctx.lineTo( w,       h*0.15);
  ctx.closePath(); ctx.fill();

  // Windshield (front)
  const wg = ctx.createLinearGradient(-w*0.5, -h*0.7, w*0.5, -h*0.3);
  wg.addColorStop(0, 'rgba(80,160,255,0.55)');
  wg.addColorStop(1, 'rgba(30,80,160,0.4)');
  ctx.fillStyle = wg;
  ctx.beginPath();
  ctx.moveTo(-w*0.68, -h*0.5);
  ctx.lineTo(-w*0.38, -h*0.75);
  ctx.lineTo( w*0.38, -h*0.75);
  ctx.lineTo( w*0.68, -h*0.5);
  ctx.lineTo( w*0.55, -h*0.2);
  ctx.lineTo(-w*0.55, -h*0.2);
  ctx.closePath(); ctx.fill();
  // Wiper
  ctx.strokeStyle = '#333'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(-w*0.1, -h*0.25); ctx.lineTo(-w*0.45, -h*0.55); ctx.stroke();
  ctx.beginPath(); ctx.moveTo( w*0.1, -h*0.25); ctx.lineTo( w*0.45, -h*0.55); ctx.stroke();

  // Headlights — iconic KITT style
  // Left headlight
  ctx.fillStyle = '#ffffcc';
  ctx.beginPath(); ctx.ellipse(-w*0.62, -h*0.05, 16, 9, 0, 0, Math.PI*2); ctx.fill();
  ctx.shadowColor = '#ffffaa'; ctx.shadowBlur = 20;
  ctx.fillStyle = '#ffffff';
  ctx.beginPath(); ctx.ellipse(-w*0.62, -h*0.05, 10, 6, 0, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;
  // Right headlight
  ctx.fillStyle = '#ffffcc';
  ctx.beginPath(); ctx.ellipse(w*0.62, -h*0.05, 16, 9, 0, 0, Math.PI*2); ctx.fill();
  ctx.shadowColor = '#ffffaa'; ctx.shadowBlur = 20;
  ctx.fillStyle = '#ffffff';
  ctx.beginPath(); ctx.ellipse(w*0.62, -h*0.05, 10, 6, 0, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;

  // Red scanner bar
  const scanX = Math.sin(STATE.time * 8) * (w * 0.35);
  const scanG = ctx.createLinearGradient(scanX-12, 0, scanX+12, 0);
  scanG.addColorStop(0, 'transparent');
  scanG.addColorStop(0.5, '#ff2200');
  scanG.addColorStop(1, 'transparent');
  ctx.fillStyle = scanG;
  ctx.shadowColor = '#ff2200'; ctx.shadowBlur = 12;
  ctx.fillRect(-w*0.4, h*0.0, w*0.8, 5);
  ctx.shadowBlur = 0;

  // Front bumper / air dam
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.moveTo(-w*0.85, h*0.1);
  ctx.lineTo( w*0.85, h*0.1);
  ctx.lineTo( w*0.8,  h*0.2);
  ctx.lineTo(-w*0.8,  h*0.2);
  ctx.closePath(); ctx.fill();
  // Grille
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(-w*0.3, h*0.05, w*0.6, 10);
  for (let g = -5; g <= 5; g++) {
    ctx.strokeStyle = '#222'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(g*10, h*0.05); ctx.lineTo(g*10, h*0.05+10); ctx.stroke();
  }

  // Wheels
  [[-w*0.82, h*0.15], [w*0.82, h*0.15]].forEach(([wx, wy]) => {
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.ellipse(wx, wy, 18, 14, 0, 0, Math.PI*2); ctx.fill();
    const rimG = ctx.createRadialGradient(wx, wy, 2, wx, wy, 12);
    rimG.addColorStop(0, '#888'); rimG.addColorStop(0.5, '#555'); rimG.addColorStop(1, '#222');
    ctx.fillStyle = rimG;
    ctx.beginPath(); ctx.ellipse(wx, wy, 12, 9, 0, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#777'; ctx.lineWidth = 2;
    for (let s = 0; s < 5; s++) {
      const a = (s/5)*Math.PI*2;
      ctx.beginPath(); ctx.moveTo(wx, wy); ctx.lineTo(wx+Math.cos(a)*10, wy+Math.sin(a)*7); ctx.stroke();
    }
  });

  ctx.restore();
}

// ── ENEMY DRAWING ─────────────────────────────────────────────────────────────
function drawEnemyTopDown(e, sx, sy, scale) {
  ctx.save();
  ctx.translate(sx, sy);
  ctx.scale(scale, scale);

  if (e.type === 'heli') {
    // Helicopter top-down
    ctx.fillStyle = e.color;
    ctx.beginPath(); ctx.ellipse(0, 0, 28, 18, 0, 0, Math.PI*2); ctx.fill();
    // Rotor
    ctx.strokeStyle = '#aaa'; ctx.lineWidth = 3;
    const ra = STATE.time * 15;
    ctx.beginPath(); ctx.moveTo(Math.cos(ra)*30, Math.sin(ra)*30);
    ctx.lineTo(Math.cos(ra+Math.PI)*30, Math.sin(ra+Math.PI)*30); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(Math.cos(ra+Math.PI/2)*30, Math.sin(ra+Math.PI/2)*30);
    ctx.lineTo(Math.cos(ra+Math.PI*1.5)*30, Math.sin(ra+Math.PI*1.5)*30); ctx.stroke();
    // Cockpit
    ctx.fillStyle = 'rgba(100,180,255,0.6)';
    ctx.beginPath(); ctx.ellipse(0, -5, 12, 8, 0, 0, Math.PI*2); ctx.fill();
  } else if (e.type === 'truck') {
    ctx.fillStyle = e.color;
    ctx.fillRect(-22, -35, 44, 70);
    ctx.fillStyle = '#333';
    ctx.fillRect(-18, -35, 36, 20);
    ctx.fillStyle = 'rgba(100,180,255,0.5)';
    ctx.fillRect(-14, -33, 28, 14);
  } else {
    // Car top-down
    ctx.fillStyle = e.color;
    ctx.beginPath();
    ctx.moveTo(-14, 25); ctx.lineTo(-16, 5); ctx.lineTo(-14, -20);
    ctx.lineTo(-10, -28); ctx.lineTo(10, -28); ctx.lineTo(14, -20);
    ctx.lineTo(16, 5); ctx.lineTo(14, 25); ctx.closePath(); ctx.fill();
    ctx.fillStyle = 'rgba(100,180,255,0.5)';
    ctx.fillRect(-10, -18, 20, 14);
    // Tail lights
    ctx.fillStyle = '#ff2200';
    ctx.fillRect(-14, 22, 8, 4);
    ctx.fillRect(6, 22, 8, 4);
  }

  // Health bar
  if (e.hp < e.maxHp) {
    const bw = 40, bh = 4;
    ctx.fillStyle = '#333';
    ctx.fillRect(-bw/2, -40, bw, bh);
    ctx.fillStyle = e.hp/e.maxHp > 0.5 ? '#00ff44' : '#ff4400';
    ctx.fillRect(-bw/2, -40, bw * (e.hp/e.maxHp), bh);
  }
  ctx.restore();
}

// ── ENEMY IN PSEUDO-3D ────────────────────────────────────────────────────────
function drawEnemyPseudo3D(e, proj) {
  if (!proj) return;
  const { x, y, w } = proj;
  const ew = w * 0.55 * (e.w / ROAD_WIDTH);
  const eh = ew * (e.h / e.w);
  ctx.save();
  ctx.translate(x, y);

  if (e.type === 'heli') {
    // Helicopter in 3D view — hovering above road
    const hoverY = -eh * 0.8 - Math.sin(STATE.time * 3 + e.hoverPhase) * 8;
    ctx.translate(0, hoverY);
    // Body
    ctx.fillStyle = e.color;
    ctx.beginPath(); ctx.ellipse(0, 0, ew*0.6, eh*0.35, 0, 0, Math.PI*2); ctx.fill();
    // Rotor
    ctx.strokeStyle = 'rgba(200,200,200,0.7)'; ctx.lineWidth = 2;
    const ra = STATE.time * 20;
    ctx.beginPath(); ctx.moveTo(Math.cos(ra)*ew*0.8, Math.sin(ra)*ew*0.2);
    ctx.lineTo(Math.cos(ra+Math.PI)*ew*0.8, Math.sin(ra+Math.PI)*ew*0.2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(Math.cos(ra+Math.PI/2)*ew*0.8, Math.sin(ra+Math.PI/2)*ew*0.2);
    ctx.lineTo(Math.cos(ra+Math.PI*1.5)*ew*0.8, Math.sin(ra+Math.PI*1.5)*ew*0.2); ctx.stroke();
    // Cockpit glass
    ctx.fillStyle = 'rgba(80,160,255,0.5)';
    ctx.beginPath(); ctx.ellipse(-ew*0.15, -eh*0.1, ew*0.25, eh*0.25, 0, 0, Math.PI*2); ctx.fill();
    // Skids
    ctx.strokeStyle = '#555'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(-ew*0.5, eh*0.3); ctx.lineTo(ew*0.5, eh*0.3); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-ew*0.5, eh*0.4); ctx.lineTo(ew*0.5, eh*0.4); ctx.stroke();
    // Shadow on ground
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.ellipse(0, eh*0.8 + Math.abs(hoverY)*0.5, ew*0.5, eh*0.2, 0, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  } else {
    // Car/truck from behind
    ctx.translate(0, -eh*0.5);
    const cg = ctx.createLinearGradient(-ew, -eh*0.5, ew, -eh*0.5);
    cg.addColorStop(0, shadeColor(e.color, -30));
    cg.addColorStop(0.4, e.color);
    cg.addColorStop(0.6, shadeColor(e.color, 20));
    cg.addColorStop(1, shadeColor(e.color, -30));
    ctx.fillStyle = cg;
    ctx.beginPath();
    ctx.moveTo(-ew, eh*0.5);
    ctx.lineTo(-ew*0.95, -eh*0.1);
    ctx.lineTo(-ew*0.7, -eh*0.55);
    ctx.lineTo(-ew*0.35, -eh*0.75);
    ctx.lineTo( ew*0.35, -eh*0.75);
    ctx.lineTo( ew*0.7,  -eh*0.55);
    ctx.lineTo( ew*0.95, -eh*0.1);
    ctx.lineTo( ew,       eh*0.5);
    ctx.closePath(); ctx.fill();
    // Rear window
    ctx.fillStyle = 'rgba(60,120,200,0.5)';
    ctx.beginPath();
    ctx.moveTo(-ew*0.6, -eh*0.45);
    ctx.lineTo(-ew*0.32, -eh*0.72);
    ctx.lineTo( ew*0.32, -eh*0.72);
    ctx.lineTo( ew*0.6,  -eh*0.45);
    ctx.lineTo( ew*0.52, -eh*0.2);
    ctx.lineTo(-ew*0.52, -eh*0.2);
    ctx.closePath(); ctx.fill();
    // Tail lights
    ctx.fillStyle = '#ff2200';
    ctx.fillRect(-ew*0.95, -eh*0.05, ew*0.28, 5);
    ctx.fillRect( ew*0.67, -eh*0.05, ew*0.28, 5);
    // Shadow
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.ellipse(0, eh*0.55, ew*0.65, 8, 0, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  }
  // HP bar
  if (e.hp < e.maxHp) {
    const bw = ew * 1.2;
    ctx.fillStyle = '#222'; ctx.fillRect(-bw/2, -eh - 8, bw, 5);
    ctx.fillStyle = e.hp/e.maxHp > 0.5 ? '#00ff44' : '#ff4400';
    ctx.fillRect(-bw/2, -eh - 8, bw * (e.hp/e.maxHp), 5);
  }
  ctx.restore();
}

function shadeColor(hex, pct) {
  const n = parseInt(hex.replace('#',''), 16);
  const r = Math.min(255, Math.max(0, (n>>16) + pct));
  const g = Math.min(255, Math.max(0, ((n>>8)&0xff) + pct));
  const b = Math.min(255, Math.max(0, (n&0xff) + pct));
  return `rgb(${r},${g},${b})`;
}

// ═══════════════════════════════════════════════════════════════════════════════
//  HUD SYSTEM
// ═══════════════════════════════════════════════════════════════════════════════

function drawHUD(W, H) {
  if (!STATE.running) return;
  const palette = ROAD_PALETTES[Math.min(STATE.level-1, 3)];

  // ── TOP-LEFT: Health + Turbo + SPM bars ──
  drawHUDBar(W, H, 12, 12, 180, 16, kitt.health/KITT_MAX_HP, '#00ff44', '#ff2200', 'SHIELD');
  drawHUDBar(W, H, 12, 34, 180, 16, kitt.turbo/TURBO_MAX,   '#00aaff', '#0044aa', 'TURBO BOOST');
  drawHUDBar(W, H, 12, 56, 180, 16, kitt.spm/100,           '#ffaa00', '#884400', 'SPM');

  // ── TOP-RIGHT: Radar ──
  drawRadar(W, H, W - 130, 12, 118, 118);

  // ── WEAPON INDICATOR (top-left below bars) ──
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(12, 78, 180, 22);
  ctx.strokeStyle = '#00ff44'; ctx.lineWidth = 1;
  ctx.strokeRect(12, 78, 180, 22);
  ctx.fillStyle = '#00ff44';
  ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'left';
  const wname = kitt.weapon ? `${kitt.weapon.type.toUpperCase()} x${kitt.weapon.ammo}` : 'NO WEAPON';
  ctx.fillText(`\u25B8 ${wname}`, 18, 93);

  // ── SCORE / LEVEL (top-center) ──
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(W/2 - 100, 8, 200, 40);
  ctx.strokeStyle = '#00ff44'; ctx.lineWidth = 1;
  ctx.strokeRect(W/2 - 100, 8, 200, 40);
  ctx.fillStyle = '#00ff44';
  ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(`LEVEL ${STATE.level}  \u2014  ${LEVEL_NAMES[STATE.level] || 'PURSUIT'}`, W/2, 22);
  ctx.font = 'bold 18px monospace';
  ctx.fillText(String(STATE.score).padStart(6,'0'), W/2, 42);

  // ── BOTTOM-RIGHT: Speed ──
  drawSpeedometer(W, H, W - 130, H - 80);

  // ── BOTTOM-LEFT: Turbo boost visual ──
  if (kitt.boosting) {
    ctx.fillStyle = 'rgba(0,170,255,0.15)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#00aaff';
    ctx.font = 'bold 22px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('TURBO BOOST', 12, H - 20);
  }
  if (kitt.spmActive) {
    ctx.fillStyle = 'rgba(255,170,0,0.1)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#ffaa00';
    ctx.font = 'bold 22px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('SUPER PURSUIT MODE', 12, H - 20);
  }

  // ── MINI-MAP INDICATOR (bottom-center) ──
  drawMiniMap(W, H, W/2 - 50, H - 68, 100, 56);

  // ── SCORE POPUPS ──
  scorePopups = scorePopups.filter(p => p.life > 0);
  scorePopups.forEach(p => {
    const proj = worldToHUD(p.x, p.z, W, H);
    if (proj) {
      ctx.globalAlpha = p.life;
      ctx.fillStyle = '#ffff00';
      ctx.font = 'bold 16px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(`+${p.val}`, proj.x, proj.y + p.vy * (1 - p.life));
      ctx.globalAlpha = 1;
    }
    p.life -= 0.015;
  });

  // ── DIALOGUE BOX ──
  if (dialogue.active && dialogue.alpha > 0) {
    drawDialogueBox(W, H);
  }

  // ── BOSS HEALTH BAR ──
  if (boss.active) {
    const bw = W * 0.5;
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(W/2 - bw/2 - 2, H - 40, bw + 4, 22);
    ctx.strokeStyle = '#ff4400'; ctx.lineWidth = 1;
    ctx.strokeRect(W/2 - bw/2 - 2, H - 40, bw + 4, 22);
    ctx.fillStyle = '#ff2200';
    ctx.fillRect(W/2 - bw/2, H - 38, bw * (boss.health/boss.maxHealth), 18);
    ctx.fillStyle = '#ff8800';
    ctx.font = 'bold 11px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('FOUNDATION TRUCK', W/2, H - 24);
  }

  // ── VIEW LABEL ──
  ctx.fillStyle = 'rgba(0,255,136,0.7)';
  ctx.font = '10px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(`VIEW: ${currentView.toUpperCase()}  [V] CYCLE`, 12, H - 8);
}

function drawHUDBar(W, H, x, y, w, h, pct, colFull, colLow, label) {
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(x, y, w, h);
  const col = pct > 0.3 ? colFull : colLow;
  const grad = ctx.createLinearGradient(x, y, x + w * pct, y);
  grad.addColorStop(0, shadeColor(col, -20));
  grad.addColorStop(1, col);
  ctx.fillStyle = grad;
  ctx.fillRect(x + 1, y + 1, (w - 2) * pct, h - 2);
  ctx.strokeStyle = col; ctx.lineWidth = 1;
  ctx.strokeRect(x, y, w, h);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 9px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(label, x + 4, y + h - 3);
  // Segment ticks
  ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth = 1;
  for (let t = 1; t < 10; t++) {
    ctx.beginPath(); ctx.moveTo(x + w*t/10, y); ctx.lineTo(x + w*t/10, y+h); ctx.stroke();
  }
}

function drawSpeedometer(W, H, x, y) {
  const mph = Math.round(kitt.speed);
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(x, y, 118, 68);
  ctx.strokeStyle = '#00ff44'; ctx.lineWidth = 1;
  ctx.strokeRect(x, y, 118, 68);
  ctx.fillStyle = '#00ff44';
  ctx.font = 'bold 36px monospace';
  ctx.textAlign = 'right';
  ctx.fillText(String(mph), x + 90, y + 48);
  ctx.font = 'bold 12px monospace';
  ctx.fillText('MPH', x + 112, y + 48);
  ctx.fillStyle = '#888';
  ctx.font = '9px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('DAMAGE', x + 4, y + 62);
  // Damage bar
  const dmgPct = 1 - kitt.health/KITT_MAX_HP;
  ctx.fillStyle = '#ff2200';
  ctx.fillRect(x + 50, y + 54, 60 * dmgPct, 8);
  ctx.strokeStyle = '#ff2200'; ctx.lineWidth = 1;
  ctx.strokeRect(x + 50, y + 54, 60, 8);
}

function drawRadar(W, H, x, y, rw, rh) {
  ctx.fillStyle = 'rgba(0,20,0,0.75)';
  ctx.fillRect(x, y, rw, rh);
  ctx.strokeStyle = '#00ff44'; ctx.lineWidth = 1;
  ctx.strokeRect(x, y, rw, rh);
  // Grid lines
  ctx.strokeStyle = 'rgba(0,255,68,0.2)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(x + rw/2, y); ctx.lineTo(x + rw/2, y + rh); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x, y + rh/2); ctx.lineTo(x + rw, y + rh/2); ctx.stroke();
  ctx.beginPath(); ctx.arc(x + rw/2, y + rh/2, rw*0.3, 0, Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(x + rw/2, y + rh/2, rw*0.45, 0, Math.PI*2); ctx.stroke();
  // Sweep
  const sweep = (STATE.time * 2) % (Math.PI * 2);
  const sweepG = ctx.createConicalGradient ? null : null;
  ctx.save();
  ctx.translate(x + rw/2, y + rh/2);
  ctx.rotate(sweep);
  const sg = ctx.createLinearGradient(0, 0, rw*0.45, 0);
  sg.addColorStop(0, 'rgba(0,255,68,0.5)');
  sg.addColorStop(1, 'rgba(0,255,68,0)');
  ctx.fillStyle = sg;
  ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0,0, rw*0.45, -0.3, 0); ctx.closePath(); ctx.fill();
  ctx.restore();
  // KITT dot (center)
  ctx.fillStyle = '#00ff44';
  ctx.beginPath(); ctx.arc(x + rw/2, y + rh/2, 4, 0, Math.PI*2); ctx.fill();
  // Enemy dots
  const radarRange = 1200;
  enemies.forEach(e => {
    const dx = (e.x - kitt.x) / radarRange * rw * 0.45;
    const dz = (e.z - kitt.z) / radarRange * rh * 0.45;
    const ex = x + rw/2 + dx;
    const ey = y + rh/2 + dz;
    if (ex > x && ex < x+rw && ey > y && ey < y+rh) {
      ctx.fillStyle = e.type === 'heli' ? '#00ffff' : '#ff4400';
      ctx.beginPath(); ctx.arc(ex, ey, 3, 0, Math.PI*2); ctx.fill();
    }
  });
  if (boss.active) {
    const dx = (boss.x - kitt.x) / radarRange * rw * 0.45;
    const dz = (boss.z - kitt.z) / radarRange * rh * 0.45;
    ctx.fillStyle = '#ff0000';
    ctx.beginPath(); ctx.arc(x + rw/2 + dx, y + rh/2 + dz, 5, 0, Math.PI*2); ctx.fill();
  }
  // Label
  ctx.fillStyle = '#00ff44'; ctx.font = 'bold 9px monospace'; ctx.textAlign = 'center';
  ctx.fillText('RADAR', x + rw/2, y + rh - 4);
}

function drawMiniMap(W, H, x, y, mw, mh) {
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(x, y, mw, mh);
  ctx.strokeStyle = '#00ff44'; ctx.lineWidth = 1;
  ctx.strokeRect(x, y, mw, mh);
  // Road line
  ctx.strokeStyle = '#555'; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(x + mw/2, y); ctx.lineTo(x + mw/2, y + mh); ctx.stroke();
  // KITT
  ctx.fillStyle = '#00ff44';
  ctx.beginPath(); ctx.arc(x + mw/2, y + mh/2, 4, 0, Math.PI*2); ctx.fill();
  // Enemies
  enemies.forEach(e => {
    const ex = x + mw/2 + (e.x - kitt.x) / 800 * mw * 0.4;
    const ey = y + mh/2 + (e.z - kitt.z) / 800 * mh * 0.4;
    if (ex > x && ex < x+mw && ey > y && ey < y+mh) {
      ctx.fillStyle = '#ff4400';
      ctx.beginPath(); ctx.arc(ex, ey, 3, 0, Math.PI*2); ctx.fill();
    }
  });
}

function worldToHUD(wx, wz, W, H) {
  const dx = (wx - kitt.x) / 800 * W * 0.3;
  const dz = (wz - kitt.z) / 800 * H * 0.3;
  return { x: W/2 + dx, y: H/2 + dz };
}

function drawDialogueBox(W, H) {
  const bw = Math.min(500, W * 0.55);
  const bh = 80;
  const bx = 12;
  const by = H - bh - 12;
  ctx.globalAlpha = dialogue.alpha;
  // Portrait
  const portW = 64, portH = 64;
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(bx, by + (bh-portH)/2, portW, portH);
  ctx.strokeStyle = '#00ff44'; ctx.lineWidth = 1;
  ctx.strokeRect(bx, by + (bh-portH)/2, portW, portH);
  drawMichaelPortrait(bx + portW/2, by + (bh-portH)/2 + portH/2, dialogue.speaker === 'KITT');

  // Text box
  ctx.fillStyle = 'rgba(0,0,0,0.8)';
  ctx.fillRect(bx + portW + 6, by, bw - portW - 6, bh);
  ctx.strokeStyle = '#00ff44'; ctx.lineWidth = 1;
  ctx.strokeRect(bx + portW + 6, by, bw - portW - 6, bh);
  // Speaker name
  ctx.fillStyle = dialogue.speaker === 'KITT' ? '#00ffff' : '#00ff44';
  ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(dialogue.speaker, bx + portW + 12, by + 16);
  // Dialogue text (word-wrap)
  ctx.fillStyle = '#ffffff';
  ctx.font = '12px monospace';
  wrapText(ctx, dialogue.text, bx + portW + 12, by + 32, bw - portW - 24, 16);
  ctx.globalAlpha = 1;
}

function wrapText(ctx, text, x, y, maxW, lineH) {
  const words = text.split(' ');
  let line = '';
  let cy = y;
  words.forEach(word => {
    const test = line + word + ' ';
    if (ctx.measureText(test).width > maxW && line !== '') {
      ctx.fillText(line, x, cy);
      line = word + ' ';
      cy += lineH;
    } else { line = test; }
  });
  ctx.fillText(line, x, cy);
}

function drawMichaelPortrait(cx, cy, isKITT) {
  ctx.save();
  ctx.translate(cx, cy);
  if (isKITT) {
    // KITT scanner icon
    ctx.fillStyle = '#001100';
    ctx.fillRect(-28, -28, 56, 56);
    ctx.fillStyle = '#00ff44';
    ctx.font = 'bold 9px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('K.I.T.T', 0, -10);
    // Scanner bar
    const sy = Math.sin(STATE.time * 6) * 12;
    const sg = ctx.createLinearGradient(-20, sy-3, 20, sy+3);
    sg.addColorStop(0, 'transparent'); sg.addColorStop(0.5, '#ff2200'); sg.addColorStop(1, 'transparent');
    ctx.fillStyle = sg;
    ctx.fillRect(-20, sy-3, 40, 6);
  } else {
    // Michael Knight face
    ctx.fillStyle = '#c8956a';
    ctx.beginPath(); ctx.arc(0, -5, 18, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#4a2a0a';
    ctx.beginPath(); ctx.arc(0, -18, 14, Math.PI, 0); ctx.fill();
    ctx.fillStyle = '#8B6040';
    ctx.fillRect(-18, -8, 36, 30);
    ctx.fillStyle = '#c8956a';
    ctx.fillRect(-14, -5, 28, 18);
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(-6, -7, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc( 6, -7, 3, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

// ═══════════════════════════════════════════════════════════════════════════════
//  COCKPIT VIEW
// ═══════════════════════════════════════════════════════════════════════════════

function drawCockpitView(W, H) {
  // ── ROAD THROUGH WINDSHIELD ──
  const palette = ROAD_PALETTES[Math.min(STATE.level-1, 3)];
  const windX = W * 0.18, windW = W * 0.64, windH = H * 0.57;
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(windX, 0); ctx.lineTo(windX + windW, 0);
  ctx.lineTo(W * 0.73, windH); ctx.lineTo(W * 0.27, windH);
  ctx.closePath(); ctx.clip();
  drawPseudo3DRoad(kitt.x, kitt.z, CAM_HEIGHT * 0.55, W, windH, palette);
  const camZ = kitt.z;
  enemies.forEach(e => {
    const dz = e.z - camZ;
    if (dz < 0 || dz > DRAW_DIST * SEGMENT_LEN) return;
    const proj = project(e.x, 0, e.z, kitt.x, camZ, CAM_HEIGHT * 0.55, CAM_DEPTH, W, windH);
    if (proj) drawEnemyPseudo3D(e, proj);
  });
  ctx.restore();

  // ── A-PILLARS ──
  ctx.fillStyle = '#080808';
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(W*0.18,0); ctx.lineTo(W*0.27,H*0.57); ctx.lineTo(0,H*0.61); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#080808';
  ctx.beginPath(); ctx.moveTo(W,0); ctx.lineTo(W*0.82,0); ctx.lineTo(W*0.73,H*0.57); ctx.lineTo(W,H*0.61); ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#1c1c1c'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(W*0.18,0); ctx.lineTo(W*0.27,H*0.57); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W*0.82,0); ctx.lineTo(W*0.73,H*0.57); ctx.stroke();

  // ── DASHBOARD BODY ──
  const dashY = H * 0.57;
  ctx.save();
  const dashG = ctx.createLinearGradient(0, dashY, 0, H);
  dashG.addColorStop(0, '#111'); dashG.addColorStop(0.15, '#0a0a0a'); dashG.addColorStop(1, '#020202');
  ctx.fillStyle = dashG;
  // Full rectangle dashboard - fills entire bottom area
  ctx.fillRect(0, dashY, W, H - dashY);
  // Decorative top edge line
  ctx.strokeStyle = '#252525'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(0, dashY); ctx.lineTo(W, dashY); ctx.stroke();
  // Subtle trapezoid highlight on top edge
  ctx.strokeStyle = '#333'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0,H*0.61); ctx.lineTo(W*0.27,H*0.57); ctx.lineTo(W*0.73,H*0.57); ctx.lineTo(W,H*0.61); ctx.stroke();
  // Section dividers
  ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(W*0.26, dashY); ctx.lineTo(W*0.26, H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W*0.56, dashY); ctx.lineTo(W*0.56, H); ctx.stroke();

  // ════════════════════════════════════════════════════════════════════════
  //  THREE-SECTION AUTHENTIC KITT DASHBOARD
  //  LEFT (0..W*0.30) | CENTER (W*0.30..W*0.65) | RIGHT (W*0.65..W)
  // ════════════════════════════════════════════════════════════════════════
  const dT = dashY + 5, dB = H - 4, dH = dB - dT;

  drawKITTLeftDash(4, dT, W * 0.26 - 4, dH);
  drawKITTCenterDash(W * 0.26, dT, W * 0.30, dH);
  drawKITTRightDash(W * 0.56 + 2, dT, W * 0.43, dH);

  ctx.restore();
}

// ═══════════════════════════════════════════════════════════════════════════════
//  LEFT SECTION: MPH LED + Fuel/Time + Voice Meter + Status + Steering
// ═══════════════════════════════════════════════════════════════════════════════
function drawKITTLeftDash(px, py, pw, ph) {
  ctx.save();

  const cx = px + pw / 2;
  let cy = py + 2;

  // ── MPH LABEL ──
  ctx.fillStyle = '#ff2200';
  ctx.font = 'bold 9px monospace'; ctx.textAlign = 'left';
  ctx.fillText('MPH', px + 4, cy + 9); cy += 11;

  // ── MPH BIG LED DISPLAY ──
  const mphBoxW = pw * 0.72, mphBoxH = ph * 0.20;
  const mphBx = px + 4;
  ctx.fillStyle = '#0a0000';
  ctx.fillRect(mphBx, cy, mphBoxW, mphBoxH);
  ctx.strokeStyle = '#550000'; ctx.lineWidth = 1;
  ctx.strokeRect(mphBx, cy, mphBoxW, mphBoxH);
  // LED glow
  ctx.fillStyle = '#ff2200';
  ctx.shadowColor = '#ff2200'; ctx.shadowBlur = 10;
  ctx.font = `bold ${Math.floor(mphBoxH * 0.72)}px monospace`;
  ctx.textAlign = 'center';
  ctx.fillText(String(Math.round(kitt.speed)).padStart(3, ' '), mphBx + mphBoxW / 2, cy + mphBoxH - 5);
  ctx.shadowBlur = 0;
  cy += mphBoxH + 4;

  // ── FUEL / TIME DISPLAY ──
  const fuelBoxH = ph * 0.09;
  ctx.fillStyle = '#000800';
  ctx.fillRect(px + 4, cy, pw - 8, fuelBoxH);
  ctx.strokeStyle = '#003300'; ctx.lineWidth = 1;
  ctx.strokeRect(px + 4, cy, pw - 8, fuelBoxH);
  const fuelStr = kitt.fuelGals.toFixed(2).padStart(5, '0');
  const timeStr = new Date(STATE.time * 1000).toISOString().substr(11, 8);
  ctx.fillStyle = '#00ff44'; ctx.shadowColor = '#00ff44'; ctx.shadowBlur = 6;
  ctx.font = `bold ${Math.floor(fuelBoxH * 0.55)}px monospace`;
  ctx.textAlign = 'center';
  ctx.fillText(fuelStr + '  ' + timeStr, px + pw / 2, cy + fuelBoxH - 3);
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#006600'; ctx.font = '5px monospace';
  ctx.fillText('FUEL GALS', px + pw * 0.25, cy + fuelBoxH + 7);
  cy += fuelBoxH + 10;

  // ── VOICE SYNTHESIZER BARS ──
  ctx.fillStyle = '#ff4400';
  ctx.font = 'bold 6px monospace'; ctx.textAlign = 'left';
  ctx.fillText('VOICE', px + 4, cy + 7); cy += 9;

  const numBars = 10;
  const barAreaW = pw - 8;
  const barW = barAreaW / numBars - 1.5;
  const maxBarH = ph * 0.12;
  const voiceActive = dialogue.active;
  for (let b = 0; b < numBars; b++) {
    const bx = px + 4 + b * (barAreaW / numBars);
    let barH;
    if (voiceActive) {
      barH = maxBarH * (0.25 + Math.abs(Math.sin(STATE.time * 18 + b * 1.1)) * 0.75);
    } else {
      barH = maxBarH * (0.08 + Math.abs(Math.sin(STATE.time * 4 + b * 0.6)) * 0.12);
    }
    const segs = 7;
    for (let s = 0; s < segs; s++) {
      const segFrac = s / segs;
      if (segFrac * maxBarH > barH) continue;
      const segH = maxBarH / segs - 1;
      const segY = cy + maxBarH - (s + 1) * (maxBarH / segs);
      const col = segFrac < 0.5 ? '#00ff44' : segFrac < 0.78 ? '#ffaa00' : '#ff2200';
      ctx.fillStyle = col;
      if (voiceActive && segFrac > 0.6) { ctx.shadowColor = col; ctx.shadowBlur = 4; }
      ctx.fillRect(bx, segY, barW, segH);
      ctx.shadowBlur = 0;
    }
  }
  cy += maxBarH + 6;

  // ── SEPARATOR ──
  ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(px+2, cy); ctx.lineTo(px+pw-2, cy); ctx.stroke();
  cy += 4;

  // ── STATUS ROWS (surveillance / alert indicators) ──
  const statRows = [
    { label: 'SURVEILLANCE', on: true,  col: '#00ff44' },
    { label: 'ALERT LVL ' + STATE.level, on: STATE.level > 1, col: '#ff8800' },
    { label: 'COMMS',        on: dialogue.active, col: '#00aaff' },
    { label: 'RADAR',        on: true,  col: '#ff44aa' },
  ];
  statRows.forEach(r => {
    const pulse = r.on && (Math.floor(STATE.time * 2) % 2 === 0);
    ctx.fillStyle = pulse ? r.col : '#1a1a1a';
    if (pulse) { ctx.shadowColor = r.col; ctx.shadowBlur = 5; }
    ctx.beginPath(); ctx.arc(px + 8, cy + 4, 3, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = r.on ? '#aaa' : '#333';
    ctx.font = '5px monospace'; ctx.textAlign = 'left';
    ctx.fillText(r.label, px + 14, cy + 7);
    cy += 10;
  });
  cy += 4;

  // ── SHIELD / TURBO MINI BARS ──
  const miniBarW = pw - 8;
  [
    { label: 'SHIELD', pct: kitt.health / KITT_MAX_HP, col: '#00ff44' },
    { label: 'TURBO',  pct: kitt.turbo / TURBO_MAX,   col: '#00aaff' },
    { label: 'SPM',    pct: kitt.spm / 100,            col: '#ff8800' },
  ].forEach(b => {
    ctx.fillStyle = '#333'; ctx.font = '5px monospace'; ctx.textAlign = 'left';
    ctx.fillText(b.label, px + 4, cy + 5);
    ctx.fillStyle = '#0a0a0a'; ctx.fillRect(px + 4, cy + 6, miniBarW, 5);
    ctx.fillStyle = b.col; ctx.fillRect(px + 4, cy + 6, miniBarW * b.pct, 5);
    ctx.strokeStyle = '#222'; ctx.lineWidth = 0.5; ctx.strokeRect(px + 4, cy + 6, miniBarW, 5);
    cy += 13;
  });
  cy += 2;

  // ── STEERING WHEEL ──
  const dB = py + ph;
  const swR = Math.min(pw * 0.32, (dB - cy - 4) * 0.48);
  if (swR > 10) {
    drawKITTSteeringColumn(px + pw / 2, cy + swR * 0.3, pw, dB - cy - 4);
  }

  ctx.restore();
}

// ═══════════════════════════════════════════════════════════════════════════════
//  CENTER SECTION: Button grid (AIR/OIL/S1/S2/P1-P4/AUTO CRUISE) + Scanner
// ═══════════════════════════════════════════════════════════════════════════════
function drawKITTCenterDash(px, py, pw, ph) {
  ctx.save();
  const cx = px + pw / 2;
  let cy = py + 2;

  // ── POWER STATUS INDICATORS (top row) ──
  const topIndicators = [
    { label: 'POWER',   on: true,  col: '#00ff44' },
    { label: 'MIN RPM', on: kitt.rpm < 1200, col: '#ffaa00' },
    { label: 'FUEL ON', on: kitt.fuelGals > 0.5, col: '#00ff44' },
    { label: 'IGNITION',on: STATE.running, col: '#ff4400' },
  ];
  const indW = (pw - 6) / topIndicators.length;
  topIndicators.forEach((ind, i) => {
    const ix = px + 3 + i * indW;
    ctx.fillStyle = ind.on ? ind.col : '#222222';
    if (ind.on) { ctx.shadowColor = ind.col; ctx.shadowBlur = 5; }
    ctx.fillRect(ix, cy, indW - 2, 8);
    ctx.shadowBlur = 0;
    ctx.fillStyle = ind.on ? '#000' : '#333';
    ctx.font = `bold ${Math.max(4, indW * 0.22)}px monospace`;
    ctx.textAlign = 'center';
    ctx.fillText(ind.label, ix + (indW-2)/2, cy + 6);
  });
  cy += 12;

  // ── KITT SCANNER BAR ──
  const scanW = pw - 6, scanH = 14;
  ctx.fillStyle = '#0d0000';
  ctx.fillRect(px + 3, cy - 1, scanW, scanH + 2);
  ctx.strokeStyle = '#330000'; ctx.lineWidth = 1;
  ctx.strokeRect(px + 3, cy - 1, scanW, scanH + 2);
  const numSegs = 18;
  const segW2 = scanW / numSegs - 1;
  const scanPos = (Math.sin(STATE.time * 9) + 1) / 2;
  for (let i = 0; i < numSegs; i++) {
    const sx = px + 3 + i * (scanW / numSegs);
    const dist = Math.abs(i / (numSegs - 1) - scanPos);
    const bright = Math.max(0, 1 - dist * 3.0);
    const rv = Math.floor(bright * 255);
    ctx.fillStyle = `rgb(${rv},0,0)`;
    if (bright > 0.6) { ctx.shadowColor = '#ff2200'; ctx.shadowBlur = 6; }
    ctx.fillRect(sx, cy, segW2, scanH);
    ctx.shadowBlur = 0;
  }
  cy += scanH + 6;

  // ── BUTTON GRID LAYOUT (matching reference image exactly) ──
  // Row 1: [AIR] [S1]
  // Row 2: [OIL] [S2]
  // Row 3: [P1] [AUTO CRUISE] [P3]
  // Row 4: [P2] [NORMAL/PURSUIT] [P4]
  const btnAreaW = pw - 6;
  const btnAreaH = ph * 0.52;
  const btnAreaX = px + 3;
  const btnAreaY = cy;

  // Yellow circle buttons: AIR, OIL (left column)
  const circR = Math.min(btnAreaW * 0.10, btnAreaH * 0.10);
  const circX = btnAreaX + circR + 2;
  const circY1 = btnAreaY + circR + 2;
  const circY2 = btnAreaY + circR * 3 + 6;
  drawCircleButton(circX, circY1, circR, 'AIR', '#ffee00', false);
  drawCircleButton(circX, circY2, circR, 'OIL', '#ffee00', kitt.oilPsi < 30);

  // S1, S2 buttons (right of AIR/OIL)
  const sX = btnAreaX + circR * 2 + 8;
  const sBtnW = btnAreaW * 0.18, sBtnH = circR * 1.4;
  drawRectButton(sX, circY1 - sBtnH/2, sBtnW, sBtnH, 'S1', '#ff4400', STATE.weaponMode === 0);
  drawRectButton(sX, circY2 - sBtnH/2, sBtnW, sBtnH, 'S2', '#ff4400', STATE.weaponMode === 1);

  // P1-P4 buttons (bottom left/right)
  const pBtnW = btnAreaW * 0.16, pBtnH = btnAreaH * 0.12;
  const pY1 = btnAreaY + circR * 5 + 10;
  const pY2 = pY1 + pBtnH + 4;
  drawRectButton(btnAreaX, pY1, pBtnW, pBtnH, 'P1', '#ff8800', false);
  drawRectButton(btnAreaX, pY2, pBtnW, pBtnH, 'P2', '#ff8800', false);
  drawRectButton(btnAreaX + btnAreaW - pBtnW, pY1, pBtnW, pBtnH, 'P3', '#ff8800', false);
  drawRectButton(btnAreaX + btnAreaW - pBtnW, pY2, pBtnW, pBtnH, 'P4', '#ff8800', false);

  // AUTO CRUISE / NORMAL CRUISE / PURSUIT (center column)
  const cruiseBtnW = btnAreaW * 0.40, cruiseBtnH = pBtnH * 0.85;
  const cruiseX = btnAreaX + (btnAreaW - cruiseBtnW) / 2;
  drawRectButton(cruiseX, pY1 - cruiseBtnH - 2, cruiseBtnW, cruiseBtnH, 'AUTO CRUISE', '#ff8800', kitt.speed > 60);
  drawRectButton(cruiseX, pY1, cruiseBtnW, cruiseBtnH, 'NORMAL', '#ff4400', !kitt.boosting && !kitt.spmActive);
  drawRectButton(cruiseX, pY1 + cruiseBtnH + 3, cruiseBtnW, cruiseBtnH, 'PURSUIT', '#ff2200', kitt.boosting || kitt.spmActive);

  cy = pY2 + pBtnH + 8;

  // ── GEAR INDICATOR ──
  ctx.fillStyle = '#333'; ctx.font = '6px monospace'; ctx.textAlign = 'left';
  ctx.fillText('GEAR', px + 4, cy + 7);
  ctx.fillStyle = '#001200'; ctx.fillRect(px + 28, cy, 22, 12);
  ctx.strokeStyle = '#00ff44'; ctx.lineWidth = 1; ctx.strokeRect(px + 28, cy, 22, 12);
  ctx.fillStyle = '#00ff44'; ctx.shadowColor = '#00ff44'; ctx.shadowBlur = 5;
  ctx.font = 'bold 9px monospace'; ctx.textAlign = 'center';
  ctx.fillText(kitt.gear, px + 39, cy + 10);
  ctx.shadowBlur = 0;
  cy += 16;

  // ── SCORE DISPLAY ──
  ctx.fillStyle = '#333'; ctx.font = '6px monospace'; ctx.textAlign = 'left';
  ctx.fillText('SCORE', px + 4, cy + 7);
  ctx.fillStyle = '#001200'; ctx.fillRect(px + 4, cy + 8, pw - 8, 12);
  ctx.strokeStyle = '#00ff44'; ctx.lineWidth = 1; ctx.strokeRect(px + 4, cy + 8, pw - 8, 12);
  ctx.fillStyle = '#00ff44'; ctx.shadowColor = '#00ff44'; ctx.shadowBlur = 5;
  ctx.font = 'bold 9px monospace'; ctx.textAlign = 'center';
  ctx.fillText(String(STATE.score).padStart(7, '0'), cx, cy + 18);
  ctx.shadowBlur = 0;

  ctx.restore();
}

function drawCircleButton(cx, cy, r, label, col, active) {
  ctx.fillStyle = active ? col : '#1c1800';
  ctx.strokeStyle = col; ctx.lineWidth = 1.5;
  if (active) { ctx.shadowColor = col; ctx.shadowBlur = 8; }
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.fillStyle = active ? '#000' : col;
  ctx.font = `bold ${Math.max(5, r * 0.55)}px monospace`;
  ctx.textAlign = 'center';
  ctx.fillText(label, cx, cy + r * 0.35);
}

function drawRectButton(bx, by, bw, bh, label, col, active) {
  ctx.fillStyle = active ? col : '#111108';
  ctx.strokeStyle = active ? col : '#333'; ctx.lineWidth = 1;
  if (active) { ctx.shadowColor = col; ctx.shadowBlur = 6; }
  ctx.fillRect(bx, by, bw, bh);
  ctx.strokeRect(bx, by, bw, bh);
  ctx.shadowBlur = 0;
  // LED dot
  ctx.fillStyle = active ? '#000' : col;
  ctx.beginPath(); ctx.arc(bx + 5, by + bh/2, 2, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = active ? '#000' : col;
  ctx.font = `bold ${Math.max(5, bh * 0.38)}px monospace`;
  ctx.textAlign = 'center';
  ctx.fillText(label, bx + bw / 2, by + bh * 0.72);
}

// ═══════════════════════════════════════════════════════════════════════════════
//  RIGHT SECTION: RPM arc gauge + readouts + dual camera screens
// ═══════════════════════════════════════════════════════════════════════════════
function drawKITTRightDash(px, py, pw, ph) {
  ctx.save();
  const cx = px + pw / 2;
  let cy = py + 2;

  // ── RPM ARC GAUGE (dot arc like reference image) ──
  const arcCX = cx;
  const arcCY = cy + ph * 0.18;
  const arcR  = Math.min(pw * 0.38, ph * 0.20);

  // Arc labels: 0, 1000, 3000, 5000, 9000
  const rpmLabels = [0, 1, 3, 5, 9]; // thousands
  const arcStart = Math.PI * 0.75, arcEnd = Math.PI * 2.25;
  const arcSpan = arcEnd - arcStart;

  // Draw dot arc (green dots, red in redline zone)
