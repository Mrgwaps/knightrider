<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KITT Pursuit — Knight Rider</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:#000; overflow:hidden; font-family:'Courier New',monospace; }
#gameCanvas { display:block; width:100%; height:100%; image-rendering:pixelated; }
#ui {
  position:fixed; top:0; left:0; width:100%; height:100%;
  pointer-events:none; z-index:10;
}
/* ── TITLE SCREEN ── */
#titleScreen {
  position:fixed; inset:0; background:radial-gradient(ellipse at center, #1a0000 0%, #000 70%);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:100; pointer-events:all;
}
#titleScreen h1 {
  font-size:clamp(2.5rem,7vw,5rem); letter-spacing:0.3em;
  color:#ff4400; text-shadow:0 0 30px #ff4400, 0 0 60px #ff2200;
  font-weight:900; margin-bottom:0.2em;
}
#titleScreen h2 {
  font-size:clamp(0.9rem,2.5vw,1.4rem); letter-spacing:0.5em;
  color:#00ff88; text-shadow:0 0 15px #00ff88; margin-bottom:3em;
}
.title-scanner {
  width:200px; height:4px; background:#111; border-radius:2px;
  margin-bottom:3em; overflow:hidden; position:relative;
}
.title-scanner::after {
  content:''; position:absolute; top:0; left:-40px; width:40px; height:100%;
  background:linear-gradient(90deg,transparent,#ff4400,transparent);
  animation:scan 1.5s ease-in-out infinite;
}
@keyframes scan { 0%{left:-40px} 100%{left:240px} }
.menu-btn {
  display:block; width:280px; padding:14px 0; margin:8px 0;
  background:transparent; border:2px solid #ff4400; color:#ff4400;
  font-family:'Courier New',monospace; font-size:1rem; letter-spacing:0.2em;
  cursor:pointer; text-transform:uppercase; transition:all 0.2s;
  pointer-events:all;
}
.menu-btn:hover { background:#ff4400; color:#000; box-shadow:0 0 20px #ff4400; }
.title-footer { position:absolute; bottom:20px; color:#333; font-size:0.7rem; letter-spacing:0.2em; }
/* ── VIEW BUTTONS ── */
#viewBar {
  position:fixed; bottom:12px; left:50%; transform:translateX(-50%);
  display:flex; gap:6px; z-index:20; pointer-events:all;
}
.vbtn {
  padding:6px 14px; background:rgba(0,0,0,0.7); border:1px solid #00ff88;
  color:#00ff88; font-family:'Courier New',monospace; font-size:0.7rem;
  letter-spacing:0.1em; cursor:pointer; text-transform:uppercase;
  transition:all 0.15s;
}
.vbtn:hover, .vbtn.active { background:#00ff88; color:#000; }
/* ── OVERLAY ── */
#overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.85);
  display:none; align-items:center; justify-content:center;
  flex-direction:column; z-index:90; pointer-events:all;
}
#overlay h2 { font-size:3rem; letter-spacing:0.3em; margin-bottom:1em; }
#overlay.fail h2 { color:#ff2200; text-shadow:0 0 30px #ff2200; }
#overlay.win h2  { color:#00ff88; text-shadow:0 0 30px #00ff88; }
#overlay p { color:#aaa; letter-spacing:0.1em; margin-bottom:2em; font-size:1.1rem; }
/* ── CONTROLS MODAL ── */
#controlsModal {
  position:fixed; inset:0; background:rgba(0,0,0,0.92);
  display:none; align-items:center; justify-content:center;
  z-index:95; pointer-events:all;
}
#controlsModal .box {
  border:2px solid #00ff88; padding:40px; max-width:500px; width:90%;
  color:#00ff88;
}
#controlsModal h3 { font-size:1.5rem; letter-spacing:0.3em; margin-bottom:1.5em; text-align:center; }
#controlsModal table { width:100%; border-collapse:collapse; }
#controlsModal td { padding:8px 12px; border-bottom:1px solid #1a3a2a; font-size:0.9rem; }
#controlsModal td:first-child { color:#ff8800; }
#controlsModal .close-btn { margin-top:1.5em; width:100%; }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="viewBar" style="display:none">
  <button class="vbtn active" id="btnTopDown"  onclick="setView('topdown')">&#9635; Top-Down</button>
  <button class="vbtn"        id="btnStreet"   onclick="setView('street')">&#9670; Street View</button>
  <button class="vbtn"        id="btnCockpit"  onclick="setView('cockpit')">&#9673; Cockpit</button>
  <button class="vbtn"        id="btnFront"    onclick="setView('front')">&#9650; Front View</button>
  <button class="vbtn" style="border-color:#ff4400;color:#ff4400;margin-left:12px" onclick="exitToMenu()">&#9632; EXIT</button>
</div>
<div id="titleScreen">
  <h1>KITT PURSUIT</h1>
  <h2>Knight Rider</h2>
  <div class="title-scanner"></div>
  <button class="menu-btn" id="btnStart">&#9654; Start Mission</button>
  <button class="menu-btn" id="btnControls">&#9776; Controls</button>
  <div class="title-footer">v2.0 &nbsp;·&nbsp; Production Build &nbsp;·&nbsp; Foundation Industries</div>
</div>
<div id="overlay">
  <h2 id="overlayTitle">MISSION FAILED</h2>
  <p id="overlayScore">Score: 0</p>
  <button class="menu-btn" id="btnRestart">&#9654; Try Again</button>
  <button class="menu-btn" id="btnMenu" style="margin-top:8px">&#8592; Main Menu</button>
</div>
<div id="controlsModal">
  <div class="box">
    <h3>CONTROLS</h3>
    <table>
      <tr><td>W / &uarr;</td><td>Accelerate</td></tr>
      <tr><td>S / &darr;</td><td>Brake / Reverse</td></tr>
      <tr><td>A / &larr;</td><td>Steer Left</td></tr>
      <tr><td>D / &rarr;</td><td>Steer Right</td></tr>
      <tr><td>SPACE</td><td>Fire Weapon</td></tr>
      <tr><td>B</td><td>Turbo Boost</td></tr>
      <tr><td>V</td><td>Cycle View</td></tr>
      <tr><td>M</td><td>Super Pursuit Mode</td></tr>
    </table>
    <button class="menu-btn close-btn" onclick="document.getElementById('controlsModal').style.display='none'">Close</button>
  </div>
</div>

// ── ROAD SEGMENTS ─────────────────────────────────────────────────────────────
// Each segment: { index, curve, hill, color, scenery[] }
let segments = [];
let segmentOffset = 0; // how many segments have scrolled past

function buildRoad() {
  segments = [];
  const N = 2000; // pre-build 2000 segments
  let curve = 0;
  let curveDelta = 0;
  for (let i = 0; i < N; i++) {
    // Vary curve every ~80 segments
    if (i % 80 === 0) curveDelta = (Math.random() - 0.5) * 0.008;
    curve += curveDelta;
    curve = Math.max(-0.006, Math.min(0.006, curve));
    const seg = {
      index: i,
      curve: curve,
      hill: Math.sin(i * 0.05) * 0.002,
      colorIdx: Math.floor(i / 2) % 2,
      scenery: [],
    };
    // Add city scenery — dense urban environment
    // Right sidewalk objects
    if (i % 6 === 0) {
      seg.scenery.push({ type: pickScenery(i), side: 1, offset: 1.08 + Math.random() * 0.18 });
    }
    // Left sidewalk objects
    if (i % 7 === 0) {
      seg.scenery.push({ type: pickScenery(i), side: -1, offset: 1.08 + Math.random() * 0.18 });
    }
    // Background buildings (far offset)
    if (i % 20 === 0) {
      seg.scenery.push({ type: 'building_tall', side: 1,  offset: 2.5 + Math.random() * 1.5 });
      seg.scenery.push({ type: 'building_tall', side: -1, offset: 2.5 + Math.random() * 1.5 });
    }
    // Streetlights every ~30m
    if (i % 15 === 0) {
      seg.scenery.push({ type: 'streetlight', side: 1,  offset: 1.04 });
      seg.scenery.push({ type: 'streetlight', side: -1, offset: 1.04 });
    }
    segments.push(seg);
  }
}

function mulberry32(a) {
  a |= 0; a = a + 0x6D2B79F5 | 0;
  var t = Math.imul(a ^ a >>> 15, 1 | a);
  t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
  return ((t ^ t >>> 14) >>> 0) % 100;
}
function pickScenery(i) {
  // Dense California city scenery — buildings, palm trees, storefronts, billboards, streetlights
  const r = mulberry32(i * 1234567 + 89012);
  const r2 = mulberry32(i * 7654321 + 11111);
  const r3 = mulberry32(i * 9999991 + 33333);
  const items = [];

  // Every segment gets a streetlight on both sides
  if (i % 4 === 0) {
    items.push({ type: 'streetlight', side: -1, offset: 1.35 });
    items.push({ type: 'streetlight', side:  1, offset: 1.35 });
  }

  // Dense building/scenery mix
  const roll = r % 100;
  if (roll < 20) {
    // Tall office building
    items.push({ type: 'building_tall', side: r2 % 2 === 0 ? -1 : 1, offset: 1.6 + (r3 % 30) * 0.01 });
  } else if (roll < 38) {
    // Palm tree cluster
    items.push({ type: 'palm_tree', side: -1, offset: 1.25 });
    if (r2 % 3 === 0) items.push({ type: 'palm_tree', side: -1, offset: 1.55 });
  } else if (roll < 55) {
    // Storefront strip
    items.push({ type: 'storefront', side: r2 % 2 === 0 ? -1 : 1, offset: 1.45 });
  } else if (roll < 68) {
    // Billboard
    items.push({ type: 'billboard', side: r2 % 2 === 0 ? -1 : 1, offset: 1.8 });
  } else if (roll < 80) {
    // Overpass pillar pair
    items.push({ type: 'overpass_pillar', side: -1, offset: 1.1 });
    items.push({ type: 'overpass_pillar', side:  1, offset: 1.1 });
  } else if (roll < 90) {
    // Palm tree on right
    items.push({ type: 'palm_tree', side: 1, offset: 1.25 });
    if (r2 % 2 === 0) items.push({ type: 'palm_tree', side: 1, offset: 1.55 });
  } else {
    // Building on both sides
    items.push({ type: 'building_tall', side: -1, offset: 1.55 });
    items.push({ type: 'building_tall', side:  1, offset: 1.55 });
  }

  return items;
}

function initTraffic() {
  trafficCars = [];
  const colors = ['#cc2200','#2244cc','#228822','#888800','#cc8822','#888888','#cc2288','#ffffff','#222222'];
  for (let i = 0; i < 18; i++) {
    trafficCars.push({
      x: FIELD_W/2 + (Math.random() - 0.5) * ROAD_WIDTH * 0.7,
      z: kitt.z + 200 + Math.random() * 3000,
      speed: 60 + Math.random() * 80,
      color: colors[Math.floor(Math.random() * colors.length)],
      lane: (Math.random() > 0.5 ? 1 : -1) * (0.2 + Math.random() * 0.25),
      type: Math.random() > 0.85 ? 'truck' : 'car',
    });
  }
}
function updateTraffic(dt) {
  trafficCars.forEach(tc => {
    tc.z += tc.speed * dt;
    // Respawn behind KITT when too far ahead
    if (tc.z > kitt.z + 4000) {
      tc.z = kitt.z + 150 + Math.random() * 500;
      tc.x = FIELD_W/2 + (Math.random() - 0.5) * ROAD_WIDTH * 0.7;
      tc.speed = 60 + Math.random() * 80;
    }
    if (tc.z < kitt.z - 200) {
      tc.z = kitt.z + 200 + Math.random() * 2000;
    }
  });
}
function drawTrafficCar(tc, proj) {
  // Realistic city traffic vehicle — sedan/SUV/truck
  const s = proj.scale * 55;   // half-width
  const h = proj.scale * 38;   // half-height
  const x = proj.x;
  const y = proj.y;
  ctx.save();
  ctx.translate(x, y);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath();
  ctx.ellipse(0, h * 0.15, s * 0.9, h * 0.18, 0, 0, Math.PI * 2);
  ctx.fill();

  // Body color (varied by car type)
  const bodyColor = tc.color || '#888888';

  // Main body
  const bodyG = ctx.createLinearGradient(-s, -h * 0.8, s, -h * 0.8);
  bodyG.addColorStop(0,   darkenHex(bodyColor, 30));
  bodyG.addColorStop(0.3, bodyColor);
  bodyG.addColorStop(0.5, lightenHex(bodyColor, 20));
  bodyG.addColorStop(0.7, bodyColor);
  bodyG.addColorStop(1,   darkenHex(bodyColor, 30));
  ctx.fillStyle = bodyG;
  ctx.beginPath();
  ctx.moveTo(-s,       h * 0.05);
  ctx.lineTo(-s,      -h * 0.35);
  ctx.lineTo(-s * 0.85, -h * 0.80);
  ctx.lineTo(-s * 0.55, -h * 1.00);
  ctx.lineTo( s * 0.55, -h * 1.00);
  ctx.lineTo( s * 0.85, -h * 0.80);
  ctx.lineTo( s,       -h * 0.35);
  ctx.lineTo( s,        h * 0.05);
  ctx.closePath();
  ctx.fill();

  // Roof
  const roofG = ctx.createLinearGradient(-s * 0.5, -h, s * 0.5, -h);
  roofG.addColorStop(0,   darkenHex(bodyColor, 20));
  roofG.addColorStop(0.5, lightenHex(bodyColor, 10));
  roofG.addColorStop(1,   darkenHex(bodyColor, 20));
  ctx.fillStyle = roofG;
  ctx.beginPath();
  ctx.moveTo(-s * 0.55, -h * 1.00);
  ctx.lineTo(-s * 0.42, -h * 1.30);
  ctx.lineTo( s * 0.42, -h * 1.30);
  ctx.lineTo( s * 0.55, -h * 1.00);
  ctx.closePath();
  ctx.fill();

  // Windshield (rear-facing — dark tinted)
  ctx.fillStyle = 'rgba(30,50,80,0.75)';
  ctx.beginPath();
  ctx.moveTo(-s * 0.50, -h * 1.00);
  ctx.lineTo(-s * 0.38, -h * 1.28);
  ctx.lineTo( s * 0.38, -h * 1.28);
  ctx.lineTo( s * 0.50, -h * 1.00);
  ctx.closePath();
  ctx.fill();

  // Tail lights
  ctx.shadowColor = '#ff2200'; ctx.shadowBlur = 8 * proj.scale;
  ctx.fillStyle = '#ff2200';
  ctx.fillRect(-s * 0.92, -h * 0.20, s * 0.22, h * 0.18);
  ctx.fillRect( s * 0.70, -h * 0.20, s * 0.22, h * 0.18);
  ctx.shadowBlur = 0;

  // Wheels (2 visible from rear)
  [[-s * 0.82, h * 0.05], [s * 0.82, h * 0.05]].forEach(([wx, wy]) => {
    const tw = s * 0.22, th = h * 0.20;
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.ellipse(wx, wy, tw, th, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#555';
    ctx.beginPath(); ctx.ellipse(wx, wy, tw * 0.65, th * 0.65, 0, 0, Math.PI * 2); ctx.fill();
  });

  ctx.restore();
}
function lightenHex(hex, amt) {
  const n = parseInt(hex.replace('#',''), 16);
  const r = Math.min(255, (n >> 16) + amt);
  const g = Math.min(255, ((n >> 8) & 0xff) + amt);
  const b = Math.min(255, (n & 0xff) + amt);
  return '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0')).join('');
}

function darkenColor2(color, amt) {
  // Works with hex or rgb strings
  if (color.startsWith('#')) {
    const n = parseInt(color.slice(1), 16);
    const r = Math.max(0, (n >> 16) - amt);
    const g = Math.max(0, ((n >> 8) & 0xff) - amt);
    const b = Math.max(0, (n & 0xff) - amt);
    return `rgb(${r},${g},${b})`;
  }
  return color;
}

let audioCtx = null;
let currentMusic = null;
let musicGain = null;
let sfxGain = null;
const audioBuffers = {};
const AUDIO_FILES = {
  music_main:   'audio/music_main_theme.mp3',
  music_level1: 'audio/music_level1.mp3',
  music_level2: 'audio/music_level2.mp3',
  music_level3: 'audio/music_level3.mp3',
  music_level4: 'audio/music_level4.mp3',
  music_boss:   'audio/music_boss.mp3',
  sfx_boost:    'audio/sfx_boost.wav',
  sfx_hit:      'audio/sfx_hit.wav',
  sfx_explosion:'audio/sfx_explosion.wav',
  sfx_gun:      'audio/sfx_gunfire.wav',
};

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  musicGain = audioCtx.createGain(); musicGain.gain.value = 0.55;
  sfxGain   = audioCtx.createGain(); sfxGain.gain.value   = 0.75;
  musicGain.connect(audioCtx.destination);
  sfxGain.connect(audioCtx.destination);
  // Load all files
  Object.entries(AUDIO_FILES).forEach(([key, url]) => {
    fetch(url).then(r => r.arrayBuffer()).then(buf =>
      audioCtx.decodeAudioData(buf, decoded => { audioBuffers[key] = decoded; })
    ).catch(() => {});
  });
}

function playMusic(key) {
  if (!audioCtx || !audioBuffers[key]) return;
  if (currentMusic) { try { currentMusic.stop(); } catch(e){} }
  const src = audioCtx.createBufferSource();
  src.buffer = audioBuffers[key];
  src.loop = true;
  src.connect(musicGain);
  src.start(0);
  currentMusic = src;
}

function playSFX(key, vol=1) {
  if (!audioCtx || !audioBuffers[key]) return;
  const src = audioCtx.createBufferSource();
  src.buffer = audioBuffers[key];
  const g = audioCtx.createGain(); g.gain.value = vol;
  src.connect(g); g.connect(sfxGain);
  src.start(0);
}

function stopMusic() {
  if (currentMusic) { try { currentMusic.stop(); } catch(e){} currentMusic = null; }
}

  const d = DIALOGUES[idx % DIALOGUES.length];
  dialogueQueue.push({ ...d, duration: 220 });

function updateDialogue(dt) {
  if (dialogue.active) {
    dialogue.timer -= dt * 60;
    if (dialogue.timer < 60) dialogue.alpha = dialogue.timer / 60;
    else if (dialogue.timer > dialogue.duration - 30) dialogue.alpha = (dialogue.duration - dialogue.timer) / 30;
    else dialogue.alpha = 1;
    if (dialogue.timer <= 0) { dialogue.active = false; }
  }
  if (!dialogue.active && dialogueQueue.length > 0) {
    const next = dialogueQueue.shift();
    dialogue = { active: true, ...next, timer: next.duration, alpha: 0 };
  }
  // Auto-trigger dialogues
  if (STATE.time - lastDialogueTime > 35 && STATE.running) {
    lastDialogueTime = STATE.time;
    showDialogue(Math.floor(STATE.time / 35) % DIALOGUES.length);

}

// Project a world point to screen coordinates (pseudo-3D)
function project(worldX, worldY, worldZ, camX, camZ, camH, camDepth, W, H) {
  const dz = worldZ - camZ;
  if (dz <= 0) return null;
  const scale = camDepth / dz;
  const screenX = W/2 + scale * (worldX - camX) * W/2;
  const screenY = H/2 - scale * (worldY - camH) * H/2;
  const screenW = scale * ROAD_WIDTH * W/2;
  return { x: screenX, y: screenY, w: screenW, scale };
}

// Draw the pseudo-3D road
function drawPseudo3DRoad(camX, camZ, camH, W, H, palette) {
  const horizon = H * 0.48;

  // ── SKY ──
  const skyGrad = ctx.createLinearGradient(0, 0, 0, horizon);
  skyGrad.addColorStop(0,    palette.sky1);
  skyGrad.addColorStop(0.65, palette.sky2);
  skyGrad.addColorStop(1,    palette.sky2);
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, horizon);
  // Atmospheric haze at horizon
  {
    const hazeG2 = ctx.createLinearGradient(0, horizon - 45, 0, horizon);
    hazeG2.addColorStop(0, 'rgba(255,255,255,0)');
    hazeG2.addColorStop(1, STATE.level <= 1 ? 'rgba(210,225,255,0.15)' : STATE.level === 2 ? 'rgba(255,160,50,0.18)' : 'rgba(80,60,160,0.12)');
    ctx.fillStyle = hazeG2;
    ctx.fillRect(0, horizon - 45, W, 45);
  }

  // ── CANYON WALLS / MOUNTAINS ──
  drawCityEnvironment(W, H, horizon, palette, camZ);

  // ── GROUND (city concrete/asphalt) ──
  const groundGrad = ctx.createLinearGradient(0, horizon, 0, H);
  groundGrad.addColorStop(0, palette.grass1);
  groundGrad.addColorStop(0.5, palette.grass1);
  groundGrad.addColorStop(1, palette.grass2);
  ctx.fillStyle = groundGrad;
  ctx.fillRect(0, horizon, W, H - horizon);
  // Subtle grid lines for city block feel
  ctx.strokeStyle = 'rgba(0,0,0,0.08)';
  ctx.lineWidth = 1;
  for (let gy = horizon + 20; gy < H; gy += 30) {
    ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke();
  }

  // ── ROAD SEGMENTS ──
  const startSeg = Math.floor(camZ / SEGMENT_LEN) % segments.length;
  let x = 0, dx = 0;
  let prevY = H;

  // Draw from back to front
  for (let n = 0; n < DRAW_DIST; n++) {
    const segIdx = (startSeg + n) % segments.length;
    const seg = segments[segIdx];
    const segZ = (Math.floor(camZ / SEGMENT_LEN) + n) * SEGMENT_LEN;

    const p1 = project(FIELD_W/2 + x, 0, segZ,     camX, camZ, camH, CAM_DEPTH, W, H);
    const p2 = project(FIELD_W/2 + x + dx, 0, segZ + SEGMENT_LEN, camX, camZ, camH, CAM_DEPTH, W, H);

    if (!p1 || !p2) { x += dx; dx += seg.curve * SEGMENT_LEN; continue; }
    if (p1.y >= prevY) { x += dx; dx += seg.curve * SEGMENT_LEN; continue; }

    const isAlternate = seg.colorIdx === 1;
    const roadColor  = palette.road;
    const rumbleColor = isAlternate ? palette.rumble1 : palette.rumble2;
    const grassColor  = isAlternate ? palette.grass1  : palette.grass2;
    const laneColor   = isAlternate ? palette.lane    : 'transparent';

    // Ground (grass/sidewalk area)
    ctx.fillStyle = grassColor;
    ctx.fillRect(0, p2.y, W, p1.y - p2.y);
    // Sidewalk strips (between road edge and grass)
    const sidewalkColor = palette.sidewalk || '#c8c0b0';
    const curbColor = palette.curb || '#e0d8c8';
    const sidewalkW = p1.w * 0.14;
    // Left sidewalk
    ctx.fillStyle = sidewalkColor;
    ctx.beginPath();
    ctx.moveTo(p1.x - p1.w - sidewalkW, p1.y);
    ctx.lineTo(p1.x - p1.w, p1.y);
    ctx.lineTo(p2.x - p2.w, p2.y);
    ctx.lineTo(p2.x - p2.w - sidewalkW * p2.w/p1.w, p2.y);
    ctx.closePath(); ctx.fill();
    // Right sidewalk
    ctx.fillStyle = sidewalkColor;
    ctx.beginPath();
    ctx.moveTo(p1.x + p1.w, p1.y);
    ctx.lineTo(p1.x + p1.w + sidewalkW, p1.y);
    ctx.lineTo(p2.x + p2.w + sidewalkW * p2.w/p1.w, p2.y);
    ctx.lineTo(p2.x + p2.w, p2.y);
    ctx.closePath(); ctx.fill();
    // Curb lines
    ctx.strokeStyle = curbColor; ctx.lineWidth = Math.max(1, p1.scale * 3);
    ctx.beginPath(); ctx.moveTo(p1.x - p1.w, p1.y); ctx.lineTo(p2.x - p2.w, p2.y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(p1.x + p1.w, p1.y); ctx.lineTo(p2.x + p2.w, p2.y); ctx.stroke();

    // Rumble strips
    const rumbleW = p1.w * 0.15;
    ctx.fillStyle = rumbleColor;
    // Left rumble
    ctx.beginPath();
    ctx.moveTo(p1.x - p1.w - rumbleW, p1.y);
    ctx.lineTo(p1.x - p1.w, p1.y);
    ctx.lineTo(p2.x - p2.w, p2.y);
    ctx.lineTo(p2.x - p2.w - rumbleW*p2.w/p1.w, p2.y);
    ctx.closePath(); ctx.fill();
    // Right rumble
    ctx.beginPath();
    ctx.moveTo(p1.x + p1.w, p1.y);
    ctx.lineTo(p1.x + p1.w + rumbleW, p1.y);
    ctx.lineTo(p2.x + p2.w + rumbleW*p2.w/p1.w, p2.y);
    ctx.lineTo(p2.x + p2.w, p2.y);
    ctx.closePath(); ctx.fill();

    // Road surface
    ctx.fillStyle = roadColor;
    ctx.beginPath();
    ctx.moveTo(p1.x - p1.w, p1.y);
    ctx.lineTo(p1.x + p1.w, p1.y);
    ctx.lineTo(p2.x + p2.w, p2.y);
    ctx.lineTo(p2.x - p2.w, p2.y);
    ctx.closePath(); ctx.fill();
    // Road surface sheen (wet asphalt gloss)
    if (n < 12) {
      const sheenG = ctx.createLinearGradient(p1.x - p1.w, 0, p1.x + p1.w, 0);
      sheenG.addColorStop(0,    'rgba(255,255,255,0)');
      sheenG.addColorStop(0.35, 'rgba(255,255,255,0.025)');
      sheenG.addColorStop(0.50, 'rgba(255,255,255,0.055)');
      sheenG.addColorStop(0.65, 'rgba(255,255,255,0.025)');
      sheenG.addColorStop(1,    'rgba(255,255,255,0)');
      ctx.fillStyle = sheenG;
      ctx.beginPath();
      ctx.moveTo(p1.x - p1.w, p1.y);
      ctx.lineTo(p1.x + p1.w, p1.y);
      ctx.lineTo(p2.x + p2.w, p2.y);
      ctx.lineTo(p2.x - p2.w, p2.y);
      ctx.closePath(); ctx.fill();
    }

    // Lane markings
    if (isAlternate) {
      ctx.strokeStyle = '#FFDD00';
      ctx.lineWidth = Math.max(1, p1.scale * 8);
      // Center double yellow line
      ctx.beginPath();
      ctx.moveTo(p1.x - p1.w*0.04, p1.y);
      ctx.lineTo(p2.x - p2.w*0.04, p2.y);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(p1.x + p1.w*0.04, p1.y);
      ctx.lineTo(p2.x + p2.w*0.04, p2.y);
      ctx.stroke();
      // White lane dividers
      ctx.strokeStyle = '#FFFFFF';
      ctx.lineWidth = Math.max(1, p1.scale * 4);
      const lanePositions = [-0.5, 0.5];
      lanePositions.forEach(lp => {
        ctx.beginPath();
        ctx.moveTo(p1.x + p1.w * lp * 0.65, p1.y);
        ctx.lineTo(p2.x + p2.w * lp * 0.65, p2.y);
        ctx.stroke();
      });
    }

    // Draw scenery objects
    seg.scenery.forEach(sc => {
      const scX = FIELD_W/2 + sc.side * ROAD_WIDTH * sc.offset;
      const sp = project(scX, 0, segZ, camX, camZ, camH, CAM_DEPTH, W, H);
      if (sp && sp.y < p1.y && sp.y > 0) {
        drawSceneryObject(sc.type, sp.x, sp.y, sp.scale, sc.side);
      }
    });

    prevY = p1.y;
    x += dx;
    dx += seg.curve * SEGMENT_LEN;
  }
  // ── KITT TAIL-LIGHT ROAD GLOW ──
  // Cast a red glow from KITT's tail lights onto the road surface below
  {
    const glowY = H * 0.72;
    const glowX = W / 2;
    const glowR = ctx.createRadialGradient(glowX - W*0.12, glowY, 2, glowX - W*0.12, glowY, W*0.14);
    glowR.addColorStop(0, 'rgba(255,30,0,0.22)');
    glowR.addColorStop(1, 'rgba(255,30,0,0)');
    ctx.fillStyle = glowR;
    ctx.beginPath(); ctx.ellipse(glowX - W*0.12, glowY, W*0.14, H*0.06, 0, 0, Math.PI*2); ctx.fill();
    const glowL = ctx.createRadialGradient(glowX + W*0.12, glowY, 2, glowX + W*0.12, glowY, W*0.14);
    glowL.addColorStop(0, 'rgba(255,30,0,0.22)');
    glowL.addColorStop(1, 'rgba(255,30,0,0)');
    ctx.fillStyle = glowL;
    ctx.beginPath(); ctx.ellipse(glowX + W*0.12, glowY, W*0.14, H*0.06, 0, 0, Math.PI*2); ctx.fill();
  }
  // ── TRAFFIC VEHICLES ──
  if (typeof trafficCars !== 'undefined') {
    trafficCars.forEach(tc => {
      const dz = tc.z - camZ;
      if (dz < 0 || dz > DRAW_DIST * SEGMENT_LEN) return;
      const proj = project(tc.x, 0, tc.z, camX, camZ, camH, CAM_DEPTH, W, H);
      if (proj && proj.y > 0 && proj.y < H) drawTrafficCar(tc, proj);
    });
  }
}

// ── CANYON ENVIRONMENT ────────────────────────────────────────────────────────
function drawCityEnvironment(W, H, horizon, palette, camZ) {
  const t = STATE.time;
  const scroll = camZ * 0.00008;
  const level = STATE.level - 1;

  // ── SKY ──────────────────────────────────────────────────────────────────
  const skyG = ctx.createLinearGradient(0, 0, 0, horizon);
  skyG.addColorStop(0,    palette.sky1);
  skyG.addColorStop(0.65, palette.sky2);
  skyG.addColorStop(1,    palette.sky2);
  ctx.fillStyle = skyG;
  ctx.fillRect(0, 0, W, horizon);
  // Atmospheric horizon haze
  {
    const hazeGc = ctx.createLinearGradient(0, horizon - 50, 0, horizon);
    hazeGc.addColorStop(0, 'rgba(255,255,255,0)');
    hazeGc.addColorStop(1, level === 0 ? 'rgba(210,225,255,0.18)' : level === 1 ? 'rgba(255,170,60,0.22)' : level === 2 ? 'rgba(120,80,200,0.12)' : 'rgba(40,40,80,0.08)');
    ctx.fillStyle = hazeGc;
    ctx.fillRect(0, horizon - 50, W, 50);
  }
  if (level <= 1) {
    // ── DAYTIME: Sun + clouds ──────────────────────────────────────────────
    // Sun
    const sunX = W * 0.75 - ((scroll * 20) % (W * 0.3));
    const sunY = horizon * 0.22;
    const sunR = level === 1 ? 28 : 22; // bigger at sunset
    const sunColor = level === 1 ? '#ffcc00' : '#ffffcc';
    // Sun glow
    const sunGlow = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, sunR * 3.5);
    sunGlow.addColorStop(0, level === 1 ? 'rgba(255,200,50,0.5)' : 'rgba(255,255,180,0.3)');
    sunGlow.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = sunGlow;
    ctx.beginPath(); ctx.arc(sunX, sunY, sunR * 3.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = sunColor;
    ctx.beginPath(); ctx.arc(sunX, sunY, sunR, 0, Math.PI * 2); ctx.fill();

    // Clouds
    const cloudDefs = [
      { x: 0.08, y: 0.15, w: 0.18, h: 0.07 },
      { x: 0.30, y: 0.08, w: 0.22, h: 0.06 },
      { x: 0.55, y: 0.18, w: 0.15, h: 0.05 },
      { x: 0.78, y: 0.10, w: 0.20, h: 0.07 },
    ];
    cloudDefs.forEach((c, ci) => {
      const cx2 = ((c.x * W + scroll * 25 * (1 + ci * 0.3)) % (W + 200)) - 100;
      const cy2 = c.y * horizon;
      const cw = c.w * W, ch = c.h * horizon;
      const cloudAlpha = level === 1 ? 0.55 : 0.7;
      ctx.globalAlpha = cloudAlpha;
      ctx.fillStyle = level === 1 ? '#ffe8c0' : '#ffffff';
      // Puffy cloud shape
      ctx.beginPath(); ctx.ellipse(cx2,         cy2,          cw * 0.5, ch * 0.6, 0, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(cx2 - cw*0.2, cy2 + ch*0.1, cw * 0.35, ch * 0.5, 0, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(cx2 + cw*0.2, cy2 + ch*0.1, cw * 0.35, ch * 0.5, 0, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(cx2,          cy2 + ch*0.2, cw * 0.45, ch * 0.45, 0, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 1;
    });

  } else if (level === 2) {
    // ── DUSK: Purple/pink sky, stars beginning ────────────────────────────
    // Gradient already set via palette
    // Moon
    const moonX = W * 0.2;
    const moonY = horizon * 0.2;
    ctx.fillStyle = '#ffe8c0';
    ctx.beginPath(); ctx.arc(moonX, moonY, 14, 0, Math.PI * 2); ctx.fill();
    // A few early stars
    for (let s = 0; s < 30; s++) {
      const sx = (s * 173.5 + scroll * 8) % W;
      const sy = (s * 59.3) % (horizon * 0.6);
      const sa = 0.3 + Math.sin(s + t * 2) * 0.2;
      ctx.globalAlpha = sa;
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(sx, sy, 1.5, 1.5);
    }
    ctx.globalAlpha = 1;

  } else {
    // ── NIGHT: Stars, moon, neon glow on horizon ──────────────────────────
    // Stars
    for (let s = 0; s < 120; s++) {
      const sx = (s * 137.5 + scroll * 6) % W;
      const sy = (s * 73.1) % (horizon * 0.85);
      const sa = 0.4 + Math.sin(s * 2.3 + t * 1.5) * 0.35;
      ctx.globalAlpha = sa;
      ctx.fillStyle = s % 7 === 0 ? '#aaccff' : '#ffffff';
      ctx.fillRect(sx, sy, s % 5 === 0 ? 2 : 1.5, s % 5 === 0 ? 2 : 1.5);
    }
    ctx.globalAlpha = 1;
    // Moon
    const moonX = W * 0.82;
    const moonY = horizon * 0.18;
    const moonGlow = ctx.createRadialGradient(moonX, moonY, 0, moonX, moonY, 40);
    moonGlow.addColorStop(0, 'rgba(200,220,255,0.25)');
    moonGlow.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = moonGlow;
    ctx.beginPath(); ctx.arc(moonX, moonY, 40, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#ddeeff';
    ctx.beginPath(); ctx.arc(moonX, moonY, 14, 0, Math.PI * 2); ctx.fill();
    // Neon city glow on horizon
    const neonColors = ['#ff2244','#ff8800','#00ccff','#aa00ff','#00ff88'];
    neonColors.forEach((col, i) => {
      const nx = W * (0.1 + i * 0.18);
      const ng = ctx.createRadialGradient(nx, horizon, 0, nx, horizon, 80);
      ng.addColorStop(0, col.replace(')', ',0.18)').replace('rgb','rgba').replace('#', 'rgba(') );
      ng.addColorStop(1, 'rgba(0,0,0,0)');
      // Simple glow blob
      ctx.globalAlpha = 0.4;
      ctx.fillStyle = col;
      ctx.beginPath(); ctx.ellipse(nx, horizon, 60, 20, 0, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 1;
    });
  }

  // ── DISTANT CITY SKYLINE ──────────────────────────────────────────────────
  drawCitySkyline(W, H, horizon, scroll, level, t);

  // ── ATMOSPHERIC HAZE ──────────────────────────────────────────────────────
  const hazeG = ctx.createLinearGradient(0, horizon * 0.7, 0, horizon);
  const hazeAlpha = level === 3 ? 0.0 : 0.18;
  hazeG.addColorStop(0, 'rgba(200,210,230,0)');
  hazeG.addColorStop(1, `rgba(200,210,230,${hazeAlpha})`);
  ctx.fillStyle = hazeG;
  ctx.fillRect(0, horizon * 0.7, W, horizon * 0.3);
}

function drawCitySkyline(W, H, horizon, scroll, level, t) {
  ctx.save();

  // ── BACKGROUND HILLS / SANTA MONICA MOUNTAINS ────────────────────────────
  if (level <= 2) {
    const hillColor = level === 0 ? '#6a8a4a' : level === 1 ? '#7a6a3a' : '#3a3a5a';
    ctx.fillStyle = hillColor;
    ctx.beginPath(); ctx.moveTo(0, horizon);
    for (let x = 0; x <= W; x += 15) {
      const y = horizon - 55 - Math.sin(x * 0.008 + scroll * 0.05) * 35
                          - Math.sin(x * 0.019 + scroll * 0.03) * 22
                          - Math.sin(x * 0.004) * 18;
      ctx.lineTo(x, y);
    }
    ctx.lineTo(W, horizon); ctx.closePath(); ctx.fill();
    // Second hill layer (darker, closer)
    const hill2Color = level === 0 ? '#5a7a3a' : level === 1 ? '#6a5a2a' : '#2a2a4a';
    ctx.fillStyle = hill2Color;
    ctx.beginPath(); ctx.moveTo(0, horizon);
    for (let x = 0; x <= W; x += 12) {
      const y = horizon - 30 - Math.sin(x * 0.012 + scroll * 0.08 + 1.5) * 20
                          - Math.sin(x * 0.025 + scroll * 0.06) * 12;
      ctx.lineTo(x, y);
    }
    ctx.lineTo(W, horizon); ctx.closePath(); ctx.fill();
  }

  // ── DOWNTOWN SKYSCRAPERS (far background) ─────────────────────────────────
  const buildingDefs = [
    // { relX, width, height_frac, color, windowColor }
    { rx: 0.04, w: 0.055, h: 0.52, c: '#8a9aaa', wc: 'rgba(255,255,180,0.7)' },
    { rx: 0.09, w: 0.04,  h: 0.68, c: '#7a8a9a', wc: 'rgba(255,255,180,0.6)' },
    { rx: 0.13, w: 0.06,  h: 0.42, c: '#9aaabb', wc: 'rgba(255,255,180,0.5)' },
    { rx: 0.18, w: 0.035, h: 0.78, c: '#6a7a8a', wc: 'rgba(255,255,200,0.8)' },
    { rx: 0.22, w: 0.05,  h: 0.55, c: '#8a9aaa', wc: 'rgba(255,255,180,0.6)' },
    { rx: 0.27, w: 0.04,  h: 0.35, c: '#aabbcc', wc: 'rgba(255,255,180,0.4)' },
    // Right side
    { rx: 0.65, w: 0.04,  h: 0.45, c: '#9aaabb', wc: 'rgba(255,255,180,0.5)' },
    { rx: 0.70, w: 0.055, h: 0.72, c: '#7a8a9a', wc: 'rgba(255,255,200,0.7)' },
    { rx: 0.75, w: 0.04,  h: 0.38, c: '#8a9aaa', wc: 'rgba(255,255,180,0.5)' },
    { rx: 0.80, w: 0.06,  h: 0.60, c: '#6a7a8a', wc: 'rgba(255,255,200,0.8)' },
    { rx: 0.86, w: 0.035, h: 0.48, c: '#9aaabb', wc: 'rgba(255,255,180,0.6)' },
    { rx: 0.91, w: 0.05,  h: 0.82, c: '#7a8a9a', wc: 'rgba(255,255,200,0.9)' },
    { rx: 0.96, w: 0.04,  h: 0.44, c: '#8a9aaa', wc: 'rgba(255,255,180,0.5)' },
  ];

  buildingDefs.forEach((b, bi) => {
    const bx = ((b.rx * W + scroll * 30) % (W + 200)) - 100;
    const bh = b.h * (horizon - 10);
    const bw = b.w * W;
    const by = horizon - bh;

    // Building color adjustments per level
    let bColor = b.c;
    if (level === 1) bColor = b.c.replace(/[0-9a-f]{2}/gi, (m) => {
      const v = parseInt(m, 16);
      return Math.min(255, v + 30).toString(16).padStart(2, '0');
    });
    if (level === 3) bColor = '#1a1a2a';

    ctx.fillStyle = bColor;
    ctx.fillRect(bx, by, bw, bh);

    // Building top detail (parapet / antenna)
    ctx.fillStyle = level === 3 ? '#0d0d1a' : darkenHex(bColor, 20);
    ctx.fillRect(bx + bw * 0.1, by - 6, bw * 0.8, 6);
    // Antenna
    if (bi % 3 === 0) {
      ctx.strokeStyle = level === 3 ? '#ff2244' : '#888';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(bx + bw * 0.5, by - 6); ctx.lineTo(bx + bw * 0.5, by - 22); ctx.stroke();
      if (level >= 2) {
        // Blinking light
        const blink = Math.sin(t * 3 + bi) > 0.5;
        ctx.fillStyle = blink ? '#ff2244' : '#660011';
        ctx.beginPath(); ctx.arc(bx + bw * 0.5, by - 22, 2, 0, Math.PI * 2); ctx.fill();
      }
    }

    // Windows
    const winRows = Math.floor(bh / 14);
    const winCols = Math.max(1, Math.floor(bw / 10));
    for (let wr = 0; wr < winRows; wr++) {
      for (let wc2 = 0; wc2 < winCols; wc2++) {
        const wx = bx + 3 + wc2 * (bw - 6) / winCols;
        const wy = by + 4 + wr * 14;
        // Night: most windows lit; day: fewer
        const litChance = level === 3 ? 0.75 : level === 2 ? 0.5 : 0.25;
        const lit = (bi * 7 + wr * 3 + wc2 * 5 + Math.floor(t * 0.2)) % 10 < litChance * 10;
        if (lit) {
          ctx.fillStyle = level === 3 ? b.wc : 'rgba(255,255,200,0.3)';
          ctx.fillRect(wx, wy, (bw - 6) / winCols - 2, 8);
        }
      }
    }

    // Neon signs on buildings (night only)
    if (level === 3 && bi % 4 === 0) {
      const signs = ['HOTEL','BAR','OPEN','EAT'];
      const signColors = ['#ff2244','#00ccff','#ff8800','#00ff88'];
      const sc2 = bi % 4;
      ctx.fillStyle = signColors[sc2];
      ctx.font = `bold ${Math.max(6, bw * 0.25)}px monospace`;
      ctx.textAlign = 'center';
      ctx.globalAlpha = 0.7 + Math.sin(t * 2 + bi) * 0.2;
      ctx.fillText(signs[sc2], bx + bw / 2, by + bh * 0.3);
      ctx.globalAlpha = 1;
    }
  });

  ctx.restore();
}

function darkenHex(hex, amt) {
  // Simple hex darkener
  const n = parseInt(hex.replace('#',''), 16);
  const r = Math.max(0, (n >> 16) - amt);
  const g = Math.max(0, ((n >> 8) & 0xff) - amt);
  const b = Math.max(0, (n & 0xff) - amt);
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

function drawDesertTree(x, y, scale) {
  const h = 40 * scale;
  // Trunk
  ctx.fillStyle = '#5a3a1a';
  ctx.fillRect(x - 3*scale, y - h*0.4, 6*scale, h*0.4);
  // Canopy
  ctx.fillStyle = '#4a6a2a';
  ctx.beginPath();
  ctx.arc(x, y - h*0.5, 18*scale, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#3a5a1a';
  ctx.beginPath();
  ctx.arc(x - 8*scale, y - h*0.6, 12*scale, 0, Math.PI*2);
  ctx.fill();
}

// ── CITY SCENERY OBJECT DRAWING ──────────────────────────────────────────────
function drawSceneryObject(type, sx, sy, scale, side) {
  const s = scale * 0.8;  // perspective scale for city objects
  ctx.save();
  ctx.translate(sx, sy);
  switch(type) {

    case 'palm_tree': {
      // California palm tree — tall trunk, drooping fronds
      const h = 90 * s;
      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.25)';
      ctx.beginPath(); ctx.ellipse(8*s, 2*s, 12*s, 4*s, 0, 0, Math.PI*2); ctx.fill();
      // Trunk (slightly curved)
      ctx.strokeStyle = '#7a5a2a';
      ctx.lineWidth = 5 * s;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.bezierCurveTo(side * 4*s, -h*0.3, side * -3*s, -h*0.6, side * 5*s, -h);
      ctx.stroke();
      // Trunk texture rings
      ctx.strokeStyle = '#5a3a0a';
      ctx.lineWidth = 1 * s;
      for (let r = 0; r < 8; r++) {
        const ry = -h * (0.1 + r * 0.1);
        ctx.beginPath();
        ctx.moveTo(side * (r%2===0?2:4)*s - 3*s, ry);
        ctx.lineTo(side * (r%2===0?2:4)*s + 3*s, ry);
        ctx.stroke();
      }
      // Fronds
      const frondColors = ['#2a6a1a','#3a7a2a','#1a5a0a','#4a8a2a'];
      const frondTip = { x: side * 5*s, y: -h };
      for (let f = 0; f < 8; f++) {
        const angle = (f / 8) * Math.PI * 2;
        const fl = (35 + Math.sin(f * 1.7) * 10) * s;
        const fx = frondTip.x + Math.cos(angle) * fl;
        const fy = frondTip.y + Math.sin(angle) * fl * 0.4 + 10*s;
        ctx.strokeStyle = frondColors[f % 4];
        ctx.lineWidth = 2.5 * s;
        ctx.beginPath();
        ctx.moveTo(frondTip.x, frondTip.y);
        ctx.quadraticCurveTo(
          frondTip.x + Math.cos(angle) * fl * 0.5,
          frondTip.y + Math.sin(angle) * fl * 0.2 + 5*s,
          fx, fy
        );
        ctx.stroke();
        // Leaflets
        ctx.strokeStyle = frondColors[(f+1) % 4];
        ctx.lineWidth = 1 * s;
        for (let l = 1; l <= 4; l++) {
          const lt = l / 5;
          const lx = frondTip.x + Math.cos(angle) * fl * lt;
          const ly = frondTip.y + Math.sin(angle) * fl * 0.2 * lt + 5*s*lt;
          const la = angle + Math.PI * 0.4 * (l%2===0?1:-1);
          ctx.beginPath();
          ctx.moveTo(lx, ly);
          ctx.lineTo(lx + Math.cos(la)*8*s, ly + Math.sin(la)*4*s);
          ctx.stroke();
        }
      }
      break;
    }

    case 'building_low': {
      // 2-3 story commercial building with storefront
      const bw = (50 + Math.abs(Math.sin(sy)) * 30) * s;
      const bh = (55 + Math.abs(Math.cos(sx)) * 25) * s;
      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.beginPath(); ctx.ellipse(side * 10*s, 2*s, bw*0.5, 6*s, 0, 0, Math.PI*2); ctx.fill();
      // Building body
      const bGrad = ctx.createLinearGradient(-bw/2, -bh, bw/2, 0);
      bGrad.addColorStop(0, '#c8c0b0');
      bGrad.addColorStop(0.5, '#d8d0c0');
      bGrad.addColorStop(1, '#b8b0a0');
      ctx.fillStyle = bGrad;
      ctx.fillRect(-bw/2, -bh, bw, bh);
      // Roof
      ctx.fillStyle = '#a09888';
      ctx.fillRect(-bw/2, -bh, bw, 5*s);
      // Storefront windows (ground floor)
      ctx.fillStyle = 'rgba(150,200,240,0.6)';
      ctx.fillRect(-bw/2 + 4*s, -bh*0.38, bw - 8*s, bh*0.28);
      ctx.strokeStyle = '#888'; ctx.lineWidth = 1*s;
      ctx.strokeRect(-bw/2 + 4*s, -bh*0.38, bw - 8*s, bh*0.28);
      // Upper windows
      for (let wr = 0; wr < 2; wr++) {
        for (let wc2 = 0; wc2 < 3; wc2++) {
          ctx.fillStyle = 'rgba(150,200,240,0.5)';
          ctx.fillRect(-bw/2 + 5*s + wc2*(bw-10*s)/3, -bh + 8*s + wr*18*s, (bw-10*s)/3 - 3*s, 12*s);
        }
      }
      // Door
      ctx.fillStyle = '#6a5a4a';
      ctx.fillRect(-5*s, -bh*0.38, 10*s, bh*0.38);
      // Sign above storefront
      const signs = ['DINER','SHOP','CAFE','MART','SALON'];
      const signIdx = Math.floor(Math.abs(sx + sy) * 3) % signs.length;
      const signColors = ['#ff4444','#ffaa00','#44aaff','#44ff88','#ff44aa'];
      ctx.fillStyle = signColors[signIdx];
      ctx.fillRect(-bw/2 + 2*s, -bh*0.42, bw - 4*s, 8*s);
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${Math.max(5, 7*s)}px monospace`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(signs[signIdx], 0, -bh*0.42 + 4*s);
      break;
    }

    case 'building_tall': {
      // Downtown high-rise
      const bw = (35 + Math.abs(Math.sin(sy * 0.01)) * 20) * s;
      const bh = (120 + Math.abs(Math.cos(sx * 0.01)) * 80) * s;
      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.25)';
      ctx.beginPath(); ctx.ellipse(side * 12*s, 2*s, bw*0.45, 5*s, 0, 0, Math.PI*2); ctx.fill();
      // Building body gradient
      const tGrad = ctx.createLinearGradient(-bw/2, -bh, bw/2, 0);
      tGrad.addColorStop(0, '#9aacbe');
      tGrad.addColorStop(0.4, '#b0c2d4');
      tGrad.addColorStop(1, '#8a9aaa');
      ctx.fillStyle = tGrad;
      ctx.fillRect(-bw/2, -bh, bw, bh);
      // Glass facade reflection
      ctx.fillStyle = 'rgba(150,200,255,0.15)';
      ctx.fillRect(-bw/2 + 2*s, -bh + 2*s, bw*0.4, bh - 4*s);
      // Roof
      ctx.fillStyle = '#7a8a9a';
      ctx.fillRect(-bw/2, -bh, bw, 4*s);
      // Antenna
      ctx.strokeStyle = '#888'; ctx.lineWidth = 1.5*s;
      ctx.beginPath(); ctx.moveTo(0, -bh); ctx.lineTo(0, -bh - 18*s); ctx.stroke();
      // Windows grid
      const winR = Math.floor(bh / (10*s));
      const winC = Math.max(2, Math.floor(bw / (8*s)));
      for (let wr = 0; wr < winR; wr++) {
        for (let wc2 = 0; wc2 < winC; wc2++) {
          const lit = (Math.abs(sx * 3 + sy + wr * 5 + wc2 * 7) % 10) > (STATE.level >= 3 ? 2 : 6);
          ctx.fillStyle = lit ? 'rgba(255,255,180,0.7)' : 'rgba(80,100,130,0.4)';
          ctx.fillRect(-bw/2 + 3*s + wc2*(bw-6*s)/winC, -bh + 6*s + wr*10*s, (bw-6*s)/winC - 2*s, 6*s);
        }
      }
      break;
    }

    case 'storefront': {
      // Single-story storefront strip
      const bw = 60 * s;
      const bh = 40 * s;
      ctx.fillStyle = '#c0b8a8';
      ctx.fillRect(-bw/2, -bh, bw, bh);
      // Awning
      const awningColors = ['#cc2222','#2244cc','#228822','#cc8822'];
      const aci = Math.floor(Math.abs(sx + sy) * 2) % 4;
      ctx.fillStyle = awningColors[aci];
      ctx.beginPath();
      ctx.moveTo(-bw/2, -bh * 0.55);
      ctx.lineTo(bw/2,  -bh * 0.55);
      ctx.lineTo(bw/2 + 4*s, -bh * 0.35);
      ctx.lineTo(-bw/2 - 4*s, -bh * 0.35);
      ctx.closePath(); ctx.fill();
      // Awning stripes
      ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 2*s;
      for (let st = 0; st < 5; st++) {
        const stx = -bw/2 + (st + 0.5) * bw / 5;
        ctx.beginPath();
        ctx.moveTo(stx, -bh * 0.55);
        ctx.lineTo(stx + 4*s, -bh * 0.35);
        ctx.stroke();
      }
      // Window
      ctx.fillStyle = 'rgba(150,200,240,0.55)';
      ctx.fillRect(-bw/2 + 5*s, -bh + 5*s, bw - 10*s, bh * 0.45);
      // Door
      ctx.fillStyle = '#7a6a5a';
      ctx.fillRect(-6*s, -bh + 5*s, 12*s, bh - 5*s);
      break;
    }

    case 'billboard': {
      // Highway billboard
      const ph = 70 * s; // pole height
      const bw = 55 * s, bh = 30 * s;
      // Pole
      ctx.strokeStyle = '#888'; ctx.lineWidth = 4*s;
      ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -ph); ctx.stroke();
      // Board
      ctx.fillStyle = '#222';
      ctx.fillRect(-bw/2, -ph - bh, bw, bh);
      // Billboard content
      const boards = [
        { bg:'#cc2200', text:'KNIGHT\nINDUSTRIES', tc:'#ffffff' },
        { bg:'#0044aa', text:'VISIT\nLA', tc:'#ffdd00' },
        { bg:'#ff8800', text:'NEXT\nEXIT', tc:'#000000' },
        { bg:'#006622', text:'PALM\nSPRINGS', tc:'#ffffff' },
      ];
      const bi2 = Math.floor(Math.abs(sx + sy) * 1.5) % boards.length;
      const board = boards[bi2];
      ctx.fillStyle = board.bg;
      ctx.fillRect(-bw/2 + 2*s, -ph - bh + 2*s, bw - 4*s, bh - 4*s);
      ctx.fillStyle = board.tc;
      ctx.font = `bold ${Math.max(6, 9*s)}px monospace`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      const lines = board.text.split('\n');
      lines.forEach((ln, li) => {
        ctx.fillText(ln, 0, -ph - bh/2 + (li - (lines.length-1)/2) * 12*s);
      });
      break;
    }

    case 'streetlight': {
      // LA-style streetlight
      const ph = 55 * s;
      // Pole
      ctx.strokeStyle = '#888'; ctx.lineWidth = 3*s;
      ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -ph); ctx.stroke();
      // Arm
      ctx.beginPath(); ctx.moveTo(0, -ph); ctx.lineTo(side * 18*s, -ph); ctx.stroke();
      // Lamp housing
      ctx.fillStyle = '#666';
      ctx.fillRect(side * 14*s, -ph - 5*s, 8*s, 5*s);
      // Light glow (night levels)
      if (STATE.level >= 3) {
        const lgX = side * 18*s;
        const lgY = -ph - 2*s;
        const lg = ctx.createRadialGradient(lgX, lgY, 0, lgX, lgY, 25*s);
        lg.addColorStop(0, 'rgba(255,220,100,0.6)');
        lg.addColorStop(1, 'rgba(255,220,100,0)');
        ctx.fillStyle = lg;
        ctx.beginPath(); ctx.arc(lgX, lgY, 25*s, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#ffee88';
        ctx.beginPath(); ctx.arc(lgX, lgY, 3*s, 0, Math.PI*2); ctx.fill();
      } else {
        ctx.fillStyle = '#ffffcc';
        ctx.beginPath(); ctx.arc(side * 18*s, -ph - 2*s, 3*s, 0, Math.PI*2); ctx.fill();
      }
      break;
    }

    case 'overpass_pillar': {
      // Concrete highway overpass pillar
      const ph = 80 * s;
      const pw2 = 18 * s;
      ctx.fillStyle = '#aaa8a0';
      ctx.fillRect(-pw2/2, -ph, pw2, ph);
      // Concrete texture
      ctx.strokeStyle = 'rgba(0,0,0,0.1)'; ctx.lineWidth = 1*s;
      for (let r = 0; r < 5; r++) {
        ctx.beginPath();
        ctx.moveTo(-pw2/2, -ph * (0.2 + r * 0.15));
        ctx.lineTo(pw2/2,  -ph * (0.2 + r * 0.15));
        ctx.stroke();
      }
      // Beam above
      ctx.fillStyle = '#b8b4ac';
      ctx.fillRect(-pw2 * 1.5, -ph, pw2 * 3, 8*s);
      break;
    }

    case 'building_tall': {
      // Mid-rise office building (4-8 stories, glass facade)
      const bw = (50 + Math.abs(Math.sin(sx * 0.1)) * 40) * s;
      const bh = (80 + Math.abs(Math.cos(sy * 0.07)) * 60) * s;
      // Main structure
      const bG = ctx.createLinearGradient(-bw/2, -bh, bw/2, -bh);
      bG.addColorStop(0,   '#6a7a8a');
      bG.addColorStop(0.3, '#8a9aaa');
      bG.addColorStop(0.5, '#9aaabb');
      bG.addColorStop(0.7, '#8a9aaa');
      bG.addColorStop(1,   '#6a7a8a');
      ctx.fillStyle = bG;
      ctx.fillRect(-bw/2, -bh, bw, bh);
      // Side face (3D depth)
      ctx.fillStyle = '#4a5a6a';
      ctx.beginPath();
      ctx.moveTo(bw/2,     -bh);
      ctx.lineTo(bw/2 + 8*s, -bh + 6*s);
      ctx.lineTo(bw/2 + 8*s,  0 + 6*s);
      ctx.lineTo(bw/2,      0);
      ctx.closePath(); ctx.fill();
      // Roof parapet
      ctx.fillStyle = '#3a4a5a';
      ctx.fillRect(-bw/2, -bh - 5*s, bw, 5*s);
      // Windows grid
      const winRows = Math.max(2, Math.floor(bh / (12*s)));
      const winCols = Math.max(1, Math.floor(bw / (12*s)));
      const litBase = (Math.abs(sx + sy) * 3 + STATE.time * 0.1) | 0;
      for (let wr = 0; wr < winRows; wr++) {
        for (let wc2 = 0; wc2 < winCols; wc2++) {
          const wx2 = -bw/2 + 3*s + wc2 * (bw - 6*s) / winCols;
          const wy2 = -bh + 5*s + wr * (bh - 8*s) / winRows;
          const lit = (litBase + wr * 3 + wc2 * 7) % 10 < (STATE.level >= 3 ? 7 : 3);
          ctx.fillStyle = lit
            ? (STATE.level >= 3 ? 'rgba(255,240,160,0.80)' : 'rgba(200,220,255,0.55)')
            : 'rgba(40,60,90,0.45)';
          ctx.fillRect(wx2, wy2, (bw - 6*s) / winCols - 2*s, (bh - 8*s) / winRows - 2*s);
        }
      }
      // Antenna
      ctx.strokeStyle = '#666'; ctx.lineWidth = 1.5*s;
      ctx.beginPath(); ctx.moveTo(0, -bh - 5*s); ctx.lineTo(0, -bh - 20*s); ctx.stroke();
      if (STATE.level >= 2) {
        ctx.fillStyle = Math.sin(STATE.time * 2.5 + sx) > 0 ? '#ff2244' : '#660011';
        ctx.beginPath(); ctx.arc(0, -bh - 20*s, 2*s, 0, Math.PI*2); ctx.fill();
      }
      break;
    }
    // Fallback: simple pole
    default: {
      ctx.strokeStyle = '#888'; ctx.lineWidth = 3*s;
      ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -50*s); ctx.stroke();
      break;
    }
  }
  ctx.restore();
}

// ═══════════════════════════════════════════════════════════════════════════════
//  KITT SPRITE DRAWING (all views)
// ═══════════════════════════════════════════════════════════════════════════════

// ── KITT TOP-DOWN (detailed Trans Am silhouette) ──────────────────────────────
function drawKITTTopDown(cx, cy, scale = 1) {
  const img = KITT_SPRITES.topdown;
  if (!img || !img.complete || img.naturalWidth === 0) {
    ctx.fillStyle = '#111'; ctx.fillRect(cx - 20*scale, cy - 35*scale, 40*scale, 70*scale);
    return;
  }
  // Sprite is 120x200 — draw centered, facing up (nose toward top of screen)
  const sw = 52 * scale;
  const sh = 88 * scale;
  // Ground shadow
  ctx.save();
  ctx.globalAlpha = 0.4;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(cx + 4*scale, cy + 4*scale, sw*0.42, sh*0.28, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
  // Draw sprite — car faces UP so no rotation needed (image is already nose-up)
  ctx.drawImage(img, cx - sw/2, cy - sh/2, sw, sh);
}

// ── KITT REAR VIEW (3rd-person street view) ───────────────────────────────────
function drawKITTRear(cx, cy, scale = 1) {
  const img = KITT_SPRITES.rear;
  const sw = 200 * scale;
  const sh = 150 * scale;

  // ── Wheel dimensions (perspective: slightly wider than tall, foreshortened) ──
  // Rear wheels sit at the very bottom of the car, slightly outside the body width
  // In a rear 3/4 perspective the wheels appear as ellipses, NOT flat circles
  const wheelW  = 38 * scale;   // width of wheel (ellipse x-radius * 2)
  const wheelH  = 22 * scale;   // height of wheel (foreshortened, ~60% of width)
  const wheelRx = wheelW / 2;
  const wheelRy = wheelH / 2;
  // Wheel centers: sit at road contact level (cy + sh*0.44), spread outside body
  const wheelY  = cy + sh * 0.44;
  const leftWX  = cx - sw * 0.36;
  const rightWX = cx + sw * 0.36;

  // ── Spinning spoke angle (tied to kitt.speed) ──
  const spinAngle = (Date.now() * 0.012 * (typeof kitt !== 'undefined' ? Math.max(kitt.speed / 60, 0.3) : 1)) % (Math.PI * 2);

  // Helper: draw one spinning wheel at (wx, wy)
  function drawWheel(wx, wy) {
    ctx.save();
    // Tyre (dark rubber outer ring)
    ctx.beginPath();
    ctx.ellipse(wx, wy, wheelRx, wheelRy, 0, 0, Math.PI * 2);
    const tyreGrad = ctx.createRadialGradient(wx - wheelRx*0.2, wy - wheelRy*0.2, wheelRx*0.1, wx, wy, wheelRx);
    tyreGrad.addColorStop(0, '#3a3a3a');
    tyreGrad.addColorStop(0.72, '#1a1a1a');
    tyreGrad.addColorStop(1, '#0a0a0a');
    ctx.fillStyle = tyreGrad;
    ctx.fill();
    ctx.strokeStyle = '#111';
    ctx.lineWidth = 1.5 * scale;
    ctx.stroke();

    // Rim (silver alloy wheel inside tyre)
    const rimRx = wheelRx * 0.62;
    const rimRy = wheelRy * 0.62;
    ctx.beginPath();
    ctx.ellipse(wx, wy, rimRx, rimRy, 0, 0, Math.PI * 2);
    const rimGrad = ctx.createRadialGradient(wx - rimRx*0.3, wy - rimRy*0.3, rimRx*0.05, wx, wy, rimRx);
    rimGrad.addColorStop(0, '#e8e8e8');
    rimGrad.addColorStop(0.4, '#b0b0b0');
    rimGrad.addColorStop(1, '#606060');
    ctx.fillStyle = rimGrad;
    ctx.fill();

    // 5 spinning spokes
    ctx.save();
    ctx.translate(wx, wy);
    ctx.scale(1, wheelRy / wheelRx);  // squish to match ellipse perspective
    for (let s = 0; s < 5; s++) {
      const angle = spinAngle + (s / 5) * Math.PI * 2;
      const sx = Math.cos(angle) * rimRx * 0.88;
      const sy = Math.sin(angle) * rimRx * 0.88;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(sx, sy);
      ctx.strokeStyle = '#cccccc';
      ctx.lineWidth = 2.5 * scale;
      ctx.stroke();
    }
    ctx.restore();

    // Centre hub cap
    ctx.beginPath();
    ctx.ellipse(wx, wy, rimRx * 0.22, rimRy * 0.22, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#aaaaaa';
    ctx.fill();
    ctx.strokeStyle = '#888';
    ctx.lineWidth = 1 * scale;
    ctx.stroke();

    // Tyre contact shadow on road (flat ellipse below wheel)
    ctx.globalAlpha = 0.28;
    ctx.beginPath();
    ctx.ellipse(wx, wy + wheelRy * 0.9, wheelRx * 0.9, wheelRy * 0.35, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#000';
    ctx.fill();
    ctx.globalAlpha = 1;

    ctx.restore();
  }

  // ── Draw wheels BEFORE the car body so body overlaps them slightly (realistic) ──
  drawWheel(leftWX, wheelY);
  drawWheel(rightWX, wheelY);

  // ── Ground shadow under the whole car ──
  ctx.save();
  ctx.globalAlpha = 0.32;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(cx, wheelY + wheelRy * 0.6, sw * 0.44, sh * 0.09, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // ── Draw the car body sprite on top ──
  if (img && img.complete && img.naturalWidth > 0) {
    // Position sprite so the bottom of the car body aligns with the wheel centres
    // (wheels peek out below and to the sides)
    ctx.drawImage(img, cx - sw/2, cy - sh/2, sw, sh);
  } else {
    ctx.fillStyle = '#111';
    ctx.fillRect(cx - sw/2, cy - sh/2, sw, sh);
  }

  // ── Tail light glow overlay (animated pulse) ──
  const glowAlpha = 0.55 + 0.25 * Math.sin(Date.now() * 0.006);
  ctx.save();
  ctx.globalAlpha = glowAlpha;
  ctx.fillStyle = '#ff2200';
  ctx.beginPath();
  ctx.ellipse(cx - sw*0.31, cy + sh*0.18, sw*0.14, sh*0.07, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(cx + sw*0.31, cy + sh*0.18, sw*0.14, sh*0.07, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}
// ── KITT FRONT VIEW ───────────────────────────────────────────────────────────
function drawKITTFront(cx, cy, scale = 1) {
  const img = KITT_SPRITES.front;
  if (!img || !img.complete || img.naturalWidth === 0) {
    ctx.fillStyle = '#111'; ctx.fillRect(cx - 60*scale, cy - 40*scale, 120*scale, 80*scale);
    return;
  }
  // Sprite is 400x280 — draw centered at (cx, cy)
  const sw = 200 * scale;
  const sh = 140 * scale;
  // Ground shadow
  ctx.save();
  ctx.globalAlpha = 0.35;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(cx, cy + sh*0.5, sw*0.5, sh*0.1, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
  // Draw the sprite
  ctx.drawImage(img, cx - sw/2, cy - sh/2, sw, sh);
  // Scanner bar glow overlay (animated red sweep)
  const t = Date.now() * 0.003;
  const scanX = cx + Math.sin(t) * sw * 0.28;
  ctx.save();
  ctx.globalAlpha = 0.7;
  const scanGrad = ctx.createRadialGradient(scanX, cy + sh*0.08, 0, scanX, cy + sh*0.08, sw*0.12);
  scanGrad.addColorStop(0, 'rgba(255,30,0,0.9)');
  scanGrad.addColorStop(1, 'rgba(255,30,0,0)');
  ctx.fillStyle = scanGrad;
  ctx.fillRect(cx - sw*0.4, cy + sh*0.02, sw*0.8, sh*0.12);
  ctx.restore();
}

// ── ENEMY DRAWING ─────────────────────────────────────────────────────────────
function drawEnemyTopDown(e, sx, sy, scale) {
  ctx.save();
  ctx.translate(sx, sy);
  ctx.scale(scale, scale);

  if (e.type === 'heli') {
    // Helicopter top-down
    ctx.fillStyle = e.color;
    ctx.beginPath(); ctx.ellipse(0, 0, 28, 18, 0, 0, Math.PI*2); ctx.fill();
    // Rotor
    ctx.strokeStyle = '#aaa'; ctx.lineWidth = 3;
    const ra = STATE.time * 15;
    ctx.beginPath(); ctx.moveTo(Math.cos(ra)*30, Math.sin(ra)*30);
    ctx.lineTo(Math.cos(ra+Math.PI)*30, Math.sin(ra+Math.PI)*30); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(Math.cos(ra+Math.PI/2)*30, Math.sin(ra+Math.PI/2)*30);
    ctx.lineTo(Math.cos(ra+Math.PI*1.5)*30, Math.sin(ra+Math.PI*1.5)*30); ctx.stroke();
    // Cockpit
    ctx.fillStyle = 'rgba(100,180,255,0.6)';
    ctx.beginPath(); ctx.ellipse(0, -5, 12, 8, 0, 0, Math.PI*2); ctx.fill();
  } else if (e.type === 'truck') {
    ctx.fillStyle = e.color;
    ctx.fillRect(-22, -35, 44, 70);
    ctx.fillStyle = '#333';
    ctx.fillRect(-18, -35, 36, 20);
    ctx.fillStyle = 'rgba(100,180,255,0.5)';
    ctx.fillRect(-14, -33, 28, 14);
  } else {
    // Car top-down
    ctx.fillStyle = e.color;
    ctx.beginPath();
    ctx.moveTo(-14, 25); ctx.lineTo(-16, 5); ctx.lineTo(-14, -20);
    ctx.lineTo(-10, -28); ctx.lineTo(10, -28); ctx.lineTo(14, -20);
    ctx.lineTo(16, 5); ctx.lineTo(14, 25); ctx.closePath(); ctx.fill();
    ctx.fillStyle = 'rgba(100,180,255,0.5)';
    ctx.fillRect(-10, -18, 20, 14);
    // Tail lights
    ctx.fillStyle = '#ff2200';
    ctx.fillRect(-14, 22, 8, 4);
    ctx.fillRect(6, 22, 8, 4);
  }

  // Health bar
  if (e.hp < e.maxHp) {
    const bw = 40, bh = 4;
    ctx.fillStyle = '#333';
    ctx.fillRect(-bw/2, -40, bw, bh);
    ctx.fillStyle = e.hp/e.maxHp > 0.5 ? '#00ff44' : '#ff4400';
    ctx.fillRect(-bw/2, -40, bw * (e.hp/e.maxHp), bh);
  }
  ctx.restore();
}

// ── ENEMY IN PSEUDO-3D ────────────────────────────────────────────────────────
function drawEnemyPseudo3D(e, proj) {
  if (!proj) return;
  const { x, y, w } = proj;
  const ew = w * 0.55 * (e.w / ROAD_WIDTH);
  const eh = ew * (e.h / e.w);
  ctx.save();
  ctx.translate(x, y);

  if (e.type === 'heli') {
    // Helicopter in 3D view — hovering above road
    const hoverY = -eh * 0.8 - Math.sin(STATE.time * 3 + e.hoverPhase) * 8;
    ctx.translate(0, hoverY);
    // Body
    ctx.fillStyle = e.color;
    ctx.beginPath(); ctx.ellipse(0, 0, ew*0.6, eh*0.35, 0, 0, Math.PI*2); ctx.fill();
    // Rotor
    ctx.strokeStyle = 'rgba(200,200,200,0.7)'; ctx.lineWidth = 2;
    const ra = STATE.time * 20;
    ctx.beginPath(); ctx.moveTo(Math.cos(ra)*ew*0.8, Math.sin(ra)*ew*0.2);
    ctx.lineTo(Math.cos(ra+Math.PI)*ew*0.8, Math.sin(ra+Math.PI)*ew*0.2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(Math.cos(ra+Math.PI/2)*ew*0.8, Math.sin(ra+Math.PI/2)*ew*0.2);
    ctx.lineTo(Math.cos(ra+Math.PI*1.5)*ew*0.8, Math.sin(ra+Math.PI*1.5)*ew*0.2); ctx.stroke();
    // Cockpit glass
    ctx.fillStyle = 'rgba(80,160,255,0.5)';
    ctx.beginPath(); ctx.ellipse(-ew*0.15, -eh*0.1, ew*0.25, eh*0.25, 0, 0, Math.PI*2); ctx.fill();
    // Skids
    ctx.strokeStyle = '#555'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(-ew*0.5, eh*0.3); ctx.lineTo(ew*0.5, eh*0.3); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-ew*0.5, eh*0.4); ctx.lineTo(ew*0.5, eh*0.4); ctx.stroke();
    // Shadow on ground
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.ellipse(0, eh*0.8 + Math.abs(hoverY)*0.5, ew*0.5, eh*0.2, 0, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  } else {
    // Car/truck from behind
    ctx.translate(0, -eh*0.5);
    const cg = ctx.createLinearGradient(-ew, -eh*0.5, ew, -eh*0.5);
    cg.addColorStop(0, shadeColor(e.color, -30));
    cg.addColorStop(0.4, e.color);
    cg.addColorStop(0.6, shadeColor(e.color, 20));
    cg.addColorStop(1, shadeColor(e.color, -30));
    ctx.fillStyle = cg;
    ctx.beginPath();
    ctx.moveTo(-ew, eh*0.5);
    ctx.lineTo(-ew*0.95, -eh*0.1);
    ctx.lineTo(-ew*0.7, -eh*0.55);
    ctx.lineTo(-ew*0.35, -eh*0.75);
    ctx.lineTo( ew*0.35, -eh*0.75);
    ctx.lineTo( ew*0.7,  -eh*0.55);
    ctx.lineTo( ew*0.95, -eh*0.1);
    ctx.lineTo( ew,       eh*0.5);
    ctx.closePath(); ctx.fill();
    // Rear window
    ctx.fillStyle = 'rgba(60,120,200,0.5)';
    ctx.beginPath();
    ctx.moveTo(-ew*0.6, -eh*0.45);
    ctx.lineTo(-ew*0.32, -eh*0.72);
    ctx.lineTo( ew*0.32, -eh*0.72);
    ctx.lineTo( ew*0.6,  -eh*0.45);
    ctx.lineTo( ew*0.52, -eh*0.2);
    ctx.lineTo(-ew*0.52, -eh*0.2);
    ctx.closePath(); ctx.fill();
    // Tail lights
    ctx.fillStyle = '#ff2200';
    ctx.fillRect(-ew*0.95, -eh*0.05, ew*0.28, 5);
    ctx.fillRect( ew*0.67, -eh*0.05, ew*0.28, 5);
    // Shadow
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.ellipse(0, eh*0.55, ew*0.65, 8, 0, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  }
  // HP bar
  if (e.hp < e.maxHp) {
    const bw = ew * 1.2;
    ctx.fillStyle = '#222'; ctx.fillRect(-bw/2, -eh - 8, bw, 5);
    ctx.fillStyle = e.hp/e.maxHp > 0.5 ? '#00ff44' : '#ff4400';
    ctx.fillRect(-bw/2, -eh - 8, bw * (e.hp/e.maxHp), 5);
  }
  ctx.restore();
}

function shadeColor(hex, pct) {
  const n = parseInt(hex.replace('#',''), 16);
  const r = Math.min(255, Math.max(0, (n>>16) + pct));
  const g = Math.min(255, Math.max(0, ((n>>8)&0xff) + pct));
  const b = Math.min(255, Math.max(0, (n&0xff) + pct));
  return `rgb(${r},${g},${b})`;
}

// ═══════════════════════════════════════════════════════════════════════════════
//  HUD SYSTEM
// ═══════════════════════════════════════════════════════════════════════════════

function drawHUD(W, H) {
  if (!STATE.running) return;
  const palette = ROAD_PALETTES[Math.min(STATE.level-1, 3)];

  // ── TOP-LEFT: Health + Turbo + SPM bars ──
  drawHUDBar(W, H, 12, 12, 180, 16, kitt.health/KITT_MAX_HP, '#00ff44', '#ff2200', 'SHIELD');
  drawHUDBar(W, H, 12, 34, 180, 16, kitt.turbo/TURBO_MAX,   '#00aaff', '#0044aa', 'TURBO BOOST');
  drawHUDBar(W, H, 12, 56, 180, 16, kitt.spm/100,           '#ffaa00', '#884400', 'SPM');

  // ── TOP-RIGHT: Radar ──
  drawRadar(W, H, W - 130, 12, 118, 118);

  // ── WEAPON INDICATOR (top-left below bars) ──
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(12, 78, 180, 22);
  ctx.strokeStyle = '#00ff44'; ctx.lineWidth = 1;
  ctx.strokeRect(12, 78, 180, 22);
  ctx.fillStyle = '#00ff44';
  ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'left';
  const wname = kitt.weapon ? `${kitt.weapon.type.toUpperCase()} x${kitt.weapon.ammo}` : 'NO WEAPON';
  ctx.fillText(`\u25B8 ${wname}`, 18, 93);

  // ── SCORE / LEVEL (top-center) ──
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(W/2 - 100, 8, 200, 40);
  ctx.strokeStyle = '#00ff44'; ctx.lineWidth = 1;
  ctx.strokeRect(W/2 - 100, 8, 200, 40);
  ctx.fillStyle = '#00ff44';
  ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(`LEVEL ${STATE.level}  \u2014  ${LEVEL_NAMES[STATE.level] || 'PURSUIT'}`, W/2, 22);
  ctx.font = 'bold 18px monospace';
  ctx.fillText(String(STATE.score).padStart(6,'0'), W/2, 42);

  // ── BOTTOM-RIGHT: Speed ──
  drawSpeedometer(W, H, W - 130, H - 80);

  // ── BOTTOM-LEFT: Turbo boost visual ──
  if (kitt.boosting) {
    ctx.fillStyle = 'rgba(0,170,255,0.15)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#00aaff';
    ctx.font = 'bold 22px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('TURBO BOOST', 12, H - 20);
  }
  if (kitt.spmActive) {
    ctx.fillStyle = 'rgba(255,170,0,0.1)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#ffaa00';
    ctx.font = 'bold 22px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('SUPER PURSUIT MODE', 12, H - 20);
  }

  // ── MINI-MAP INDICATOR (bottom-center) ──
  drawMiniMap(W, H, W/2 - 50, H - 68, 100, 56);

  // ── SCORE POPUPS ──
  scorePopups = scorePopups.filter(p => p.life > 0);
  scorePopups.forEach(p => {
    const proj = worldToHUD(p.x, p.z, W, H);
    if (proj) {
      ctx.globalAlpha = p.life;
      ctx.fillStyle = '#ffff00';
      ctx.font = 'bold 16px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(`+${p.val}`, proj.x, proj.y + p.vy * (1 - p.life));
      ctx.globalAlpha = 1;
    }
    p.life -= 0.015;
  });

  // ── DIALOGUE BOX ──
  if (dialogue.active && dialogue.alpha > 0) {
    drawDialogueBox(W, H);
  }

  // ── BOSS HEALTH BAR ──
  if (boss.active) {
    const bw = W * 0.5;
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(W/2 - bw/2 - 2, H - 40, bw + 4, 22);
    ctx.strokeStyle = '#ff4400'; ctx.lineWidth = 1;
    ctx.strokeRect(W/2 - bw/2 - 2, H - 40, bw + 4, 22);
    ctx.fillStyle = '#ff2200';
    ctx.fillRect(W/2 - bw/2, H - 38, bw * (boss.health/boss.maxHealth), 18);
    ctx.fillStyle = '#ff8800';
    ctx.font = 'bold 11px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('FOUNDATION TRUCK', W/2, H - 24);
  }

  // ── VIEW LABEL ──
  ctx.fillStyle = 'rgba(0,255,136,0.7)';
  ctx.font = '10px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(`VIEW: ${currentView.toUpperCase()}  [V] CYCLE`, 12, H - 8);
}

function drawHUDBar(W, H, x, y, w, h, pct, colFull, colLow, label) {
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(x, y, w, h);
  const col = pct > 0.3 ? colFull : colLow;
  const grad = ctx.createLinearGradient(x, y, x + w * pct, y);
  grad.addColorStop(0, shadeColor(col, -20));
  grad.addColorStop(1, col);
  ctx.fillStyle = grad;
  ctx.fillRect(x + 1, y + 1, (w - 2) * pct, h - 2);
  ctx.strokeStyle = col; ctx.lineWidth = 1;
  ctx.strokeRect(x, y, w, h);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 9px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(label, x + 4, y + h - 3);
  // Segment ticks
  ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth = 1;
  for (let t = 1; t < 10; t++) {
    ctx.beginPath(); ctx.moveTo(x + w*t/10, y); ctx.lineTo(x + w*t/10, y+h); ctx.stroke();
  }
}

function drawSpeedometer(W, H, x, y) {
  const mph = Math.round(kitt.speed);
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(x, y, 118, 68);
  ctx.strokeStyle = '#00ff44'; ctx.lineWidth = 1;
  ctx.strokeRect(x, y, 118, 68);
  ctx.fillStyle = '#00ff44';
  ctx.font = 'bold 36px monospace';
  ctx.textAlign = 'right';
  ctx.fillText(String(mph), x + 90, y + 48);
  ctx.font = 'bold 12px monospace';
  ctx.fillText('MPH', x + 112, y + 48);
  ctx.fillStyle = '#888';
  ctx.font = '9px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('DAMAGE', x + 4, y + 62);
  // Damage bar
  const dmgPct = 1 - kitt.health/KITT_MAX_HP;
  ctx.fillStyle = '#ff2200';
  ctx.fillRect(x + 50, y + 54, 60 * dmgPct, 8);
  ctx.strokeStyle = '#ff2200'; ctx.lineWidth = 1;
  ctx.strokeRect(x + 50, y + 54, 60, 8);
}

function drawRadar(W, H, x, y, rw, rh) {
  ctx.fillStyle = 'rgba(0,20,0,0.75)';
  ctx.fillRect(x, y, rw, rh);
  ctx.strokeStyle = '#00ff44'; ctx.lineWidth = 1;
  ctx.strokeRect(x, y, rw, rh);
  // Grid lines
  ctx.strokeStyle = 'rgba(0,255,68,0.2)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(x + rw/2, y); ctx.lineTo(x + rw/2, y + rh); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x, y + rh/2); ctx.lineTo(x + rw, y + rh/2); ctx.stroke();
  ctx.beginPath(); ctx.arc(x + rw/2, y + rh/2, rw*0.3, 0, Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(x + rw/2, y + rh/2, rw*0.45, 0, Math.PI*2); ctx.stroke();
  // Sweep
  const sweep = (STATE.time * 2) % (Math.PI * 2);
  const sweepG = ctx.createConicalGradient ? null : null;
  ctx.save();
  ctx.translate(x + rw/2, y + rh/2);
  ctx.rotate(sweep);
  const sg = ctx.createLinearGradient(0, 0, rw*0.45, 0);
  sg.addColorStop(0, 'rgba(0,255,68,0.5)');
  sg.addColorStop(1, 'rgba(0,255,68,0)');
  ctx.fillStyle = sg;
  ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0,0, rw*0.45, -0.3, 0); ctx.closePath(); ctx.fill();
  ctx.restore();
  // KITT dot (center)
  ctx.fillStyle = '#00ff44';
  ctx.beginPath(); ctx.arc(x + rw/2, y + rh/2, 4, 0, Math.PI*2); ctx.fill();
  // Enemy dots
  const radarRange = 1200;
  enemies.forEach(e => {
    const dx = (e.x - kitt.x) / radarRange * rw * 0.45;
    const dz = (e.z - kitt.z) / radarRange * rh * 0.45;
    const ex = x + rw/2 + dx;
    const ey = y + rh/2 + dz;
    if (ex > x && ex < x+rw && ey > y && ey < y+rh) {
      ctx.fillStyle = e.type === 'heli' ? '#00ffff' : '#ff4400';
      ctx.beginPath(); ctx.arc(ex, ey, 3, 0, Math.PI*2); ctx.fill();
    }
  });
  if (boss.active) {
    const dx = (boss.x - kitt.x) / radarRange * rw * 0.45;
    const dz = (boss.z - kitt.z) / radarRange * rh * 0.45;
    ctx.fillStyle = '#ff0000';
    ctx.beginPath(); ctx.arc(x + rw/2 + dx, y + rh/2 + dz, 5, 0, Math.PI*2); ctx.fill();
  }
  // Label
  ctx.fillStyle = '#00ff44'; ctx.font = 'bold 9px monospace'; ctx.textAlign = 'center';
  ctx.fillText('RADAR', x + rw/2, y + rh - 4);
}

function drawMiniMap(W, H, x, y, mw, mh) {
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(x, y, mw, mh);
  ctx.strokeStyle = '#00ff44'; ctx.lineWidth = 1;
  ctx.strokeRect(x, y, mw, mh);
  // Road line
  ctx.strokeStyle = '#555'; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(x + mw/2, y); ctx.lineTo(x + mw/2, y + mh); ctx.stroke();
  // KITT
  ctx.fillStyle = '#00ff44';
  ctx.beginPath(); ctx.arc(x + mw/2, y + mh/2, 4, 0, Math.PI*2); ctx.fill();
  // Enemies
  enemies.forEach(e => {
    const ex = x + mw/2 + (e.x - kitt.x) / 800 * mw * 0.4;
    const ey = y + mh/2 + (e.z - kitt.z) / 800 * mh * 0.4;
    if (ex > x && ex < x+mw && ey > y && ey < y+mh) {
      ctx.fillStyle = '#ff4400';
      ctx.beginPath(); ctx.arc(ex, ey, 3, 0, Math.PI*2); ctx.fill();
    }
  });
}

function worldToHUD(wx, wz, W, H) {
  const dx = (wx - kitt.x) / 800 * W * 0.3;
  const dz = (wz - kitt.z) / 800 * H * 0.3;
  return { x: W/2 + dx, y: H/2 + dz };
}

function drawDialogueBox(W, H) {
  const bw = Math.min(500, W * 0.55);
  const bh = 80;
  const bx = 12;
  const by = H - bh - 12;
  ctx.globalAlpha = dialogue.alpha;
  // Portrait
  const portW = 64, portH = 64;
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(bx, by + (bh-portH)/2, portW, portH);
  ctx.strokeStyle = '#00ff44'; ctx.lineWidth = 1;
  ctx.strokeRect(bx, by + (bh-portH)/2, portW, portH);
  drawMichaelPortrait(bx + portW/2, by + (bh-portH)/2 + portH/2, dialogue.speaker === 'KITT');

  // Text box
  ctx.fillStyle = 'rgba(0,0,0,0.8)';
  ctx.fillRect(bx + portW + 6, by, bw - portW - 6, bh);
  ctx.strokeStyle = '#00ff44'; ctx.lineWidth = 1;
  ctx.strokeRect(bx + portW + 6, by, bw - portW - 6, bh);
  // Speaker name
  ctx.fillStyle = dialogue.speaker === 'KITT' ? '#00ffff' : '#00ff44';
  ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(dialogue.speaker, bx + portW + 12, by + 16);
  // Dialogue text (word-wrap)
  ctx.fillStyle = '#ffffff';
  ctx.font = '12px monospace';
  wrapText(ctx, dialogue.text, bx + portW + 12, by + 32, bw - portW - 24, 16);
  ctx.globalAlpha = 1;
}

function wrapText(ctx, text, x, y, maxW, lineH) {
  const words = text.split(' ');
  let line = '';
  let cy = y;
  words.forEach(word => {
    const test = line + word + ' ';
    if (ctx.measureText(test).width > maxW && line !== '') {
      ctx.fillText(line, x, cy);
      line = word + ' ';
      cy += lineH;
    } else { line = test; }
  });
  ctx.fillText(line, x, cy);
}

function drawMichaelPortrait(cx, cy, isKITT) {
  ctx.save();
  ctx.translate(cx, cy);
  if (isKITT) {
    // KITT scanner icon
    ctx.fillStyle = '#001100';
    ctx.fillRect(-28, -28, 56, 56);
    ctx.fillStyle = '#00ff44';
    ctx.font = 'bold 9px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('K.I.T.T', 0, -10);
    // Scanner bar
    const sy = Math.sin(STATE.time * 6) * 12;
    const sg = ctx.createLinearGradient(-20, sy-3, 20, sy+3);
    sg.addColorStop(0, 'transparent'); sg.addColorStop(0.5, '#ff2200'); sg.addColorStop(1, 'transparent');
    ctx.fillStyle = sg;
    ctx.fillRect(-20, sy-3, 40, 6);
  } else {
    // Michael Knight face
    ctx.fillStyle = '#c8956a';
    ctx.beginPath(); ctx.arc(0, -5, 18, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#4a2a0a';
    ctx.beginPath(); ctx.arc(0, -18, 14, Math.PI, 0); ctx.fill();
    ctx.fillStyle = '#8B6040';
    ctx.fillRect(-18, -8, 36, 30);
    ctx.fillStyle = '#c8956a';
    ctx.fillRect(-14, -5, 28, 18);
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(-6, -7, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc( 6, -7, 3, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

// ═══════════════════════════════════════════════════════════════════════════════
//  COCKPIT VIEW
// ═══════════════════════════════════════════════════════════════════════════════

function drawCockpitView(W, H) {
  const palette = ROAD_PALETTES[Math.min(STATE.level-1, 3)];

  // ── WINDSHIELD ROAD VIEW ──────────────────────────────────────────────────
  // The windshield is a trapezoid: wide at top, narrower at dash line
  const windL  = W * 0.12,  windR  = W * 0.88;
  const windTL = W * 0.04,  windTR = W * 0.96;
  const dashY  = H * 0.60;

  ctx.save();
  ctx.beginPath();
  ctx.moveTo(windTL, 0);
  ctx.lineTo(windTR, 0);
  ctx.lineTo(windR,  dashY);
  ctx.lineTo(windL,  dashY);
  ctx.closePath();
  ctx.clip();
  drawPseudo3DRoad(kitt.x, kitt.z, CAM_HEIGHT * 0.52, W, dashY, palette);
  // Enemies through windshield
  const camZ = kitt.z;
  enemies.forEach(e => {
    const dz = e.z - camZ;
    if (dz < 0 || dz > DRAW_DIST * SEGMENT_LEN) return;
    const proj = project(e.x, 0, e.z, kitt.x, camZ, CAM_HEIGHT * 0.52, CAM_DEPTH, W, dashY);
    if (proj) drawEnemyPseudo3D(e, proj);
  });
  ctx.restore();

  // ── A-PILLARS ─────────────────────────────────────────────────────────────
  ctx.fillStyle = '#0a0a0a';
  // Left pillar
  ctx.beginPath();
  ctx.moveTo(0, 0); ctx.lineTo(windTL, 0);
  ctx.lineTo(windL, dashY); ctx.lineTo(0, dashY * 1.05);
  ctx.closePath(); ctx.fill();
  // Right pillar
  ctx.beginPath();
  ctx.moveTo(W, 0); ctx.lineTo(windTR, 0);
  ctx.lineTo(windR, dashY); ctx.lineTo(W, dashY * 1.05);
  ctx.closePath(); ctx.fill();
  // Pillar inner edge highlight
  ctx.strokeStyle = '#1c1c1c'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(windTL, 0); ctx.lineTo(windL, dashY); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(windTR, 0); ctx.lineTo(windR, dashY); ctx.stroke();

  // ── DASHBOARD BODY ────────────────────────────────────────────────────────
  // Curved black dash — fills from dashY to bottom
  const dashG = ctx.createLinearGradient(0, dashY, 0, H);
  dashG.addColorStop(0,   '#111');
  dashG.addColorStop(0.08,'#0c0c0c');
  dashG.addColorStop(0.3, '#080808');
  dashG.addColorStop(1,   '#030303');
  ctx.fillStyle = dashG;
  ctx.fillRect(0, dashY, W, H - dashY);

  // Dashboard top curved ridge (the raised brow of the real dash)
  ctx.fillStyle = '#0d0d0d';
  ctx.beginPath();
  ctx.moveTo(0, dashY * 1.02);
  ctx.lineTo(windL, dashY);
  ctx.lineTo(windR, dashY);
  ctx.lineTo(W, dashY * 1.02);
  ctx.lineTo(W, dashY * 1.08);
  ctx.lineTo(0, dashY * 1.08);
  ctx.closePath(); ctx.fill();

  // Dash top edge highlight line
  ctx.strokeStyle = '#222'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(0, dashY * 1.02);
  ctx.lineTo(windL, dashY);
  ctx.lineTo(windR, dashY);
  ctx.lineTo(W, dashY * 1.02);
  ctx.stroke();

  // ── STEERING COLUMN ───────────────────────────────────────────────────────
  // The real KITT has a prominent steering column with Firebird emblem
  const colX  = W * 0.50;
  const colY  = dashY + (H - dashY) * 0.25;
  const colW  = W * 0.08;
  const colH  = (H - dashY) * 0.55;
  // Column body
  const colG = ctx.createLinearGradient(colX - colW, 0, colX + colW, 0);
  colG.addColorStop(0, '#050505');
  colG.addColorStop(0.4, '#181818');
  colG.addColorStop(0.6, '#1e1e1e');
  colG.addColorStop(1, '#050505');
  ctx.fillStyle = colG;
  ctx.beginPath();
  ctx.moveTo(colX - colW * 0.5, dashY);
  ctx.lineTo(colX - colW,       colY + colH);
  ctx.lineTo(colX + colW,       colY + colH);
  ctx.lineTo(colX + colW * 0.5, dashY);
  ctx.closePath(); ctx.fill();

  // Steering wheel
  const swCX = colX;
  const swCY = colY + colH * 0.3;
  const swR  = Math.min(W * 0.095, H * 0.12);
  const steerAngle = (kitt.steer || 0) * 0.55;
  ctx.save();
  ctx.translate(swCX, swCY);
  ctx.rotate(steerAngle);
  // Outer rim shadow
  ctx.strokeStyle = '#000'; ctx.lineWidth = 8;
  ctx.beginPath(); ctx.arc(0, 0, swR, 0, Math.PI * 2); ctx.stroke();
  // Outer rim
  ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 6;
  ctx.beginPath(); ctx.arc(0, 0, swR, 0, Math.PI * 2); ctx.stroke();
  ctx.strokeStyle = '#2a2a2a'; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.arc(0, 0, swR, 0, Math.PI * 2); ctx.stroke();
  // Rim highlight
  ctx.strokeStyle = 'rgba(60,60,60,0.5)'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(0, 0, swR - 2, -Math.PI * 0.8, -Math.PI * 0.1); ctx.stroke();
  // Spokes (3-spoke)
  const spokeAngles = [Math.PI * 0.5, Math.PI * 1.17, Math.PI * 1.83];
  spokeAngles.forEach(a => {
    ctx.strokeStyle = '#111'; ctx.lineWidth = 5;
    ctx.beginPath(); ctx.moveTo(Math.cos(a)*swR*0.22, Math.sin(a)*swR*0.22);
    ctx.lineTo(Math.cos(a)*swR*0.88, Math.sin(a)*swR*0.88); ctx.stroke();
    ctx.strokeStyle = '#1e1e1e'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(Math.cos(a)*swR*0.22, Math.sin(a)*swR*0.22);
    ctx.lineTo(Math.cos(a)*swR*0.88, Math.sin(a)*swR*0.88); ctx.stroke();
  });
  // Center hub
  ctx.fillStyle = '#0d0d0d';
  ctx.beginPath(); ctx.arc(0, 0, swR * 0.26, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#cc2200'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(0, 0, swR * 0.26, 0, Math.PI * 2); ctx.stroke();
  // Firebird emblem (red bird silhouette)
  ctx.fillStyle = '#cc2200';
  ctx.save();
  ctx.scale(swR * 0.018, swR * 0.018);
  // Simplified Firebird/Trans Am emblem
  ctx.beginPath();
  ctx.moveTo(0, -8); ctx.bezierCurveTo(3, -6, 8, -2, 6, 2);
  ctx.bezierCurveTo(4, 5, 2, 4, 0, 6);
  ctx.bezierCurveTo(-2, 4, -4, 5, -6, 2);
  ctx.bezierCurveTo(-8, -2, -3, -6, 0, -8);
  ctx.fill();
  // Wings
  ctx.beginPath();
  ctx.moveTo(-3, 0); ctx.bezierCurveTo(-7, -3, -12, 1, -10, 4);
  ctx.bezierCurveTo(-8, 6, -4, 3, -3, 0); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(3, 0); ctx.bezierCurveTo(7, -3, 12, 1, 10, 4);
  ctx.bezierCurveTo(8, 6, 4, 3, 3, 0); ctx.fill();
  ctx.restore();
  ctx.restore();

  // ── INSTRUMENT PANEL SECTIONS ─────────────────────────────────────────────
  // Layout matches real KITT: narrow left strip | main left panel | center gap |
  // main right panel | far right camera section
  // The dash panel sits from dashY+ridge to H, full width
  const panelTop = dashY + (H - dashY) * 0.06;
  const panelBot = H - 4;
  const panelH   = panelBot - panelTop;

  // Panel background (slightly raised inset)
  ctx.fillStyle = '#050505';
  ctx.fillRect(4, panelTop, W - 8, panelH);
  ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 1;
  ctx.strokeRect(4, panelTop, W - 8, panelH);

  // Divide into sections:
  // [FAR LEFT 9%] [LEFT MAIN 22%] [STEERING GAP 18%] [CENTER MAIN 28%] [RIGHT CAMERAS 23%]
  const s1W = W * 0.09;   // far-left strip
  const s2W = W * 0.22;   // left main
  const s3W = W * 0.18;   // steering column gap (not drawn)
  const s4W = W * 0.28;   // center main
  const s5W = W * 0.23;   // right cameras

  const s1X = 4;
  const s2X = s1X + s1W;
  const s4X = s2X + s2W + s3W;
  const s5X = s4X + s4W;

  drawKITTFarLeft(s1X, panelTop, s1W - 2, panelH);
  drawKITTLeftMain(s2X, panelTop, s2W - 2, panelH);
  drawKITTCenterMain(s4X, panelTop, s4W - 2, panelH);
  drawKITTRightCameras(s5X, panelTop, s5W - 4, panelH);
}

// ═══════════════════════════════════════════════════════════════════════════════
//  HELPER: Draw a labeled horizontal LED bar graph (like the real KITT)
// ═══════════════════════════════════════════════════════════════════════════════
function drawLEDBar(x, y, w, h, frac, label, minLabel, maxLabel, colorFull, colorLow) {
  // Label on left
  ctx.fillStyle = '#aaa'; ctx.font = `${Math.max(5, h * 0.7)}px monospace`;
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  const labelW = label ? ctx.measureText(label).width + 3 : 0;
  if (label) ctx.fillText(label, x, y + h * 0.5);
  const bx = x + labelW;
  const bw = w - labelW - (maxLabel ? ctx.measureText(maxLabel).width + 2 : 0);
  // Bar background (dark red grid)
  ctx.fillStyle = '#0d0000';
  ctx.fillRect(bx, y, bw, h);
  // LED segments
  const segCount = 20;
  const segW = (bw - 2) / segCount;
  const litCount = Math.round(frac * segCount);
  for (let i = 0; i < segCount; i++) {
    const sx = bx + 1 + i * segW;
    const lit = i < litCount;
    let col;
    if (!lit) { col = '#0d0000'; }
    else if (i > segCount * 0.85) { col = '#ff0000'; }
    else if (i > segCount * 0.65) { col = '#ff8800'; }
    else { col = colorFull || '#00ff44'; }
    ctx.fillStyle = col;
    ctx.fillRect(sx, y + 1, segW - 1, h - 2);
  }
  ctx.strokeStyle = '#222'; ctx.lineWidth = 0.5;
  ctx.strokeRect(bx, y, bw, h);
  // Min/max labels
  if (minLabel) {
    ctx.fillStyle = '#666'; ctx.font = `${Math.max(4, h * 0.6)}px monospace`;
    ctx.textAlign = 'left'; ctx.fillText(minLabel, bx, y + h + 5);
  }
  if (maxLabel) {
    ctx.fillStyle = '#666'; ctx.font = `${Math.max(4, h * 0.6)}px monospace`;
    ctx.textAlign = 'right'; ctx.fillText(maxLabel, bx + bw, y + h + 5);
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
//  HELPER: Draw a labeled button (rectangular, like real KITT)
// ═══════════════════════════════════════════════════════════════════════════════
function drawKITTButton(x, y, w, h, label, color, lit, textColor) {
  const c = lit ? color : '#0a0a0a';
  ctx.fillStyle = c;
  ctx.fillRect(x, y, w, h);
  // 3D bevel
  ctx.strokeStyle = lit ? lightenColor(color, 40) : '#1e1e1e';
  ctx.lineWidth = 0.5;
  ctx.beginPath(); ctx.moveTo(x, y + h); ctx.lineTo(x, y); ctx.lineTo(x + w, y); ctx.stroke();
  ctx.strokeStyle = lit ? darkenColor(color, 40) : '#080808';
  ctx.beginPath(); ctx.moveTo(x + w, y); ctx.lineTo(x + w, y + h); ctx.lineTo(x, y + h); ctx.stroke();
  // Label
  if (label) {
    ctx.fillStyle = lit ? (textColor || '#000') : '#444';
    const fs = Math.max(4, Math.min(7, h * 0.45, w * 0.18));
    ctx.font = `bold ${fs}px monospace`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    // Multi-line support
    const lines = label.split('\n');
    lines.forEach((ln, li) => {
