  const numDots = 36;
  for (let d = 0; d < numDots; d++) {
    const frac = d / (numDots - 1);
    const angle = arcStart + arcSpan * frac;
    const rpmVal = frac * 9000;
    const isLit = rpmVal <= kitt.rpm;
    const isRedline = frac > 0.82; // 7380+ RPM
    const dotCol = isRedline ? (isLit ? '#ff2200' : '#330000') : (isLit ? '#00ff44' : '#003300');
    const dotR = d % 3 === 0 ? 3.5 : 2.5; // larger dots at major marks
    ctx.fillStyle = dotCol;
    if (isLit) { ctx.shadowColor = dotCol; ctx.shadowBlur = isRedline ? 8 : 4; }
    ctx.beginPath();
    ctx.arc(arcCX + Math.cos(angle) * arcR, arcCY + Math.sin(angle) * arcR, dotR, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  // Arc labels
  ctx.fillStyle = '#888'; ctx.font = '6px monospace'; ctx.textAlign = 'center';
  rpmLabels.forEach((v, i) => {
    const frac = (v * 1000) / 9000;
    const angle = arcStart + arcSpan * frac;
    const lx = arcCX + Math.cos(angle) * (arcR + 10);
    const ly = arcCY + Math.sin(angle) * (arcR + 10);
    ctx.fillText(v === 0 ? '0' : v * 1000, lx, ly);
  });

  // ── RPM BIG LED DISPLAY (inside arc) ──
  const rpmBoxW = arcR * 1.1, rpmBoxH = arcR * 0.52;
  const rpmBx = arcCX - rpmBoxW / 2, rpmBy = arcCY - rpmBoxH / 2 + 4;
  ctx.fillStyle = '#150000';
  ctx.fillRect(rpmBx, rpmBy, rpmBoxW, rpmBoxH);
  ctx.strokeStyle = '#660000'; ctx.lineWidth = 1;
  ctx.strokeRect(rpmBx, rpmBy, rpmBoxW, rpmBoxH);
  const rpmDisplay = Math.round(kitt.rpm);
  const isRedlining = kitt.rpm > 7500;
  ctx.fillStyle = isRedlining ? '#ff6600' : '#ff2200';
  ctx.shadowColor = isRedlining ? '#ff6600' : '#ff2200'; ctx.shadowBlur = 10;
  ctx.font = `bold ${Math.floor(rpmBoxH * 0.65)}px monospace`;
  ctx.textAlign = 'center';
  ctx.fillText(String(rpmDisplay).padStart(4, ' '), arcCX, rpmBy + rpmBoxH - 4);
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#ff4400'; ctx.font = '6px monospace';
  ctx.fillText('RPM', arcCX + rpmBoxW * 0.3, rpmBy + 8);

  cy = arcCY + arcR + 12;

  // ── READOUT GRID: INLET°F, TEMP°F, AMP, OIL PSI, BOOST ──
  const readouts = [
    { label: 'INLET °F',  val: Math.round(kitt.inletTemp),   col: '#ff4400' },
    { label: 'INLET °F',  val: Math.round(kitt.inletTemp + 3), col: '#ff4400' },
    { label: 'TEMP °F',   val: Math.round(kitt.tempF),        col: '#ffaa00' },
    { label: 'AMP',       val: kitt.ampere.toFixed(1),        col: '#00ff44' },
    { label: 'OIL PSI',   val: Math.round(kitt.oilPsi),       col: '#00aaff' },
    { label: 'BOOST',     val: kitt.boostPsi.toFixed(1),      col: '#ff8800' },
  ];
  const cols2 = 2, rows2 = Math.ceil(readouts.length / cols2);
  const rdW = (pw - 6) / cols2, rdH = Math.min(18, (ph * 0.30) / rows2);
  readouts.forEach((r, i) => {
    const col = i % cols2, row = Math.floor(i / cols2);
    const rx = px + 3 + col * rdW, ry = cy + row * rdH;
    // Box
    ctx.fillStyle = '#0d0d08';
    ctx.fillRect(rx, ry, rdW - 2, rdH - 1);
    ctx.strokeStyle = '#2a2a1a'; ctx.lineWidth = 0.5;
    ctx.strokeRect(rx, ry, rdW - 2, rdH - 1);
    // LED bar
    const barPct = Math.min(1, parseFloat(r.val) / (r.label === 'RPM' ? 9000 : r.label === 'BOOST' ? 20 : r.label === 'AMP' ? 20 : r.label === 'OIL PSI' ? 80 : r.label === 'TEMP °F' ? 250 : 120));
    const barW3 = (rdW - 6) * barPct;
    ctx.fillStyle = '#1a1a1a'; ctx.fillRect(rx + 2, ry + rdH - 5, rdW - 6, 3);
    ctx.fillStyle = r.col; ctx.fillRect(rx + 2, ry + rdH - 5, barW3, 3);
    // Label
    ctx.fillStyle = '#888'; ctx.font = '5px monospace'; ctx.textAlign = 'left';
    ctx.fillText(r.label, rx + 3, ry + 7);
    // Value
    ctx.fillStyle = r.col; ctx.shadowColor = r.col; ctx.shadowBlur = 4;
    ctx.font = `bold ${Math.max(6, rdH * 0.42)}px monospace`;
    ctx.textAlign = 'right';
    ctx.fillText(r.val, rx + rdW - 4, ry + rdH - 6);
    ctx.shadowBlur = 0;
  });
  cy += rows2 * rdH + 6;

  // ── DUAL CAMERA SCREENS ──
  const camH = (ph - (cy - py) - 6) / 2 - 3;
  if (camH > 15) {
    drawCameraScreen(px + 2, cy, pw - 4, camH, 'REAR', drawRearCameraView);
    cy += camH + 4;
    drawCameraScreen(px + 2, cy, pw - 4, camH, 'SIDE-L', drawSideCameraView);
  }

  ctx.restore();
}

// ─────────────────────────────────────────────────────────────────────────────
//  STEERING COLUMN (shared by left dash)
// ─────────────────────────────────────────────────────────────────────────────
function drawKITTSteeringColumn(cx, topY, availW, availH) {
  ctx.save();
  ctx.translate(cx, topY);
  const steerAngle = kitt.steer * 0.65;
  const colH = availH * 0.8;
  const wheelR = Math.min(availW * 0.28, availH * 0.52);
  const colShift = kitt.steer * 10;
  ctx.save();
  ctx.translate(colShift, 0);
  // Column shaft
  const colGrad = ctx.createLinearGradient(-8, 0, 8, 0);
  colGrad.addColorStop(0, '#1a1a1a'); colGrad.addColorStop(0.5, '#333'); colGrad.addColorStop(1, '#1a1a1a');
  ctx.fillStyle = colGrad;
  ctx.beginPath();
  ctx.moveTo(-9, 0); ctx.lineTo(-5, colH * 0.55); ctx.lineTo(5, colH * 0.55); ctx.lineTo(9, 0);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#111'; ctx.lineWidth = 1; ctx.stroke();
  // Wheel
  ctx.translate(0, colH * 0.5);
  ctx.rotate(steerAngle);
  // Rim shadow
  ctx.shadowColor = 'rgba(0,0,0,0.9)'; ctx.shadowBlur = 14;
  ctx.strokeStyle = '#0a0a0a'; ctx.lineWidth = wheelR * 0.22 + 3;
  ctx.beginPath(); ctx.arc(0, 0, wheelR, 0, Math.PI * 2); ctx.stroke();
  ctx.shadowBlur = 0;
  // Rim
  const rimGrad = ctx.createLinearGradient(-wheelR, -wheelR, wheelR, wheelR);
  rimGrad.addColorStop(0, '#1a1a1a'); rimGrad.addColorStop(0.4, '#333'); rimGrad.addColorStop(0.6, '#3a3a3a'); rimGrad.addColorStop(1, '#1a1a1a');
  ctx.strokeStyle = rimGrad; ctx.lineWidth = wheelR * 0.18;
  ctx.beginPath(); ctx.arc(0, 0, wheelR, 0, Math.PI * 2); ctx.stroke();
  ctx.strokeStyle = 'rgba(70,70,70,0.4)'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(0, 0, wheelR - wheelR * 0.05, 0, Math.PI * 2); ctx.stroke();
  // 3 spokes
  [Math.PI * 1.5, Math.PI * 0.17, Math.PI * 0.83].forEach(a => {
    const sg = ctx.createLinearGradient(0, 0, Math.cos(a) * wheelR, Math.sin(a) * wheelR);
    sg.addColorStop(0, '#2a2a2a'); sg.addColorStop(1, '#1a1a1a');
    ctx.strokeStyle = sg; ctx.lineWidth = wheelR * 0.12; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(Math.cos(a) * wheelR * 0.2, Math.sin(a) * wheelR * 0.2);
    ctx.lineTo(Math.cos(a) * (wheelR - wheelR * 0.1), Math.sin(a) * (wheelR - wheelR * 0.1));
    ctx.stroke();
  });
  // Hub
  const hubR = wheelR * 0.24;
  const hubGrad = ctx.createRadialGradient(0, -hubR * 0.2, 1, 0, 0, hubR);
  hubGrad.addColorStop(0, '#2a2a2a'); hubGrad.addColorStop(1, '#0a0a0a');
  ctx.fillStyle = hubGrad;
  ctx.beginPath(); ctx.arc(0, 0, hubR, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#333'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(0, 0, hubR, 0, Math.PI * 2); ctx.stroke();
  ctx.fillStyle = '#ff2200'; ctx.shadowColor = '#ff2200'; ctx.shadowBlur = 6;
  ctx.font = `bold ${Math.max(5, hubR * 0.5)}px monospace`; ctx.textAlign = 'center';
  ctx.fillText('KITT', 0, hubR * 0.2);
  ctx.shadowBlur = 0;
  // Hub LEDs
  ['#00ff44', '#ff4400', '#00aaff'].forEach((lc, i) => {
    const la = (i / 3) * Math.PI * 2 - Math.PI / 2;
    ctx.fillStyle = lc; ctx.shadowColor = lc; ctx.shadowBlur = 4;
    ctx.beginPath(); ctx.arc(Math.cos(la) * hubR * 0.65, Math.sin(la) * hubR * 0.65, 2.5, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;
  });
  ctx.restore();
  ctx.restore();
  ctx.restore();
}

// ─────────────────────────────────────────────────────────────────────────────
//  CAMERA SCREEN RENDERER
// ─────────────────────────────────────────────────────────────────────────────
function drawCameraScreen(sx, sy, sw, sh, label, renderFn) {
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(sx - 2, sy - 2, sw + 4, sh + 4);
  ctx.strokeStyle = '#00ffff'; ctx.lineWidth = 1;
  ctx.strokeRect(sx - 2, sy - 2, sw + 4, sh + 4);
  ctx.save();
  ctx.beginPath(); ctx.rect(sx, sy, sw, sh); ctx.clip();
  renderFn(sx, sy, sw, sh);
  ctx.restore();
  // Scanlines
  for (let sl = 0; sl < sh; sl += 3) {
    ctx.fillStyle = 'rgba(0,0,0,0.12)';
    ctx.fillRect(sx, sy + sl, sw, 1);
  }
  // Corner brackets
  ctx.strokeStyle = '#00ffff'; ctx.lineWidth = 1;
  const bLen = 5;
  [[sx, sy], [sx+sw, sy], [sx, sy+sh], [sx+sw, sy+sh]].forEach(([bx, by], i) => {
    const dx = i % 2 === 0 ? 1 : -1, dy = i < 2 ? 1 : -1;
    ctx.beginPath(); ctx.moveTo(bx, by + dy*bLen); ctx.lineTo(bx, by); ctx.lineTo(bx + dx*bLen, by); ctx.stroke();
  });
  ctx.fillStyle = '#00ffff'; ctx.font = 'bold 5px monospace'; ctx.textAlign = 'left';
  ctx.fillText(label, sx + 2, sy + sh - 3);
  const t = STATE.time;
  const ts = `${String(Math.floor(t/3600)).padStart(2,'0')}:${String(Math.floor((t%3600)/60)).padStart(2,'0')}:${String(Math.floor(t%60)).padStart(2,'0')}`;
  ctx.fillStyle = '#00ffff'; ctx.textAlign = 'right';
  ctx.fillText(ts, sx + sw - 2, sy + sh - 3);
}

function drawRearCameraView(sx, sy, sw, sh) {
  const palette = ROAD_PALETTES[Math.min(STATE.level-1, 3)];
  const skyG = ctx.createLinearGradient(sx, sy, sx, sy + sh * 0.45);
  skyG.addColorStop(0, palette.sky1); skyG.addColorStop(1, palette.sky2);
  ctx.fillStyle = skyG; ctx.fillRect(sx, sy, sw, sh);
  ctx.fillStyle = palette.grass1; ctx.fillRect(sx, sy + sh * 0.45, sw, sh * 0.55);
  ctx.fillStyle = palette.road;
  ctx.beginPath();
  ctx.moveTo(sx + sw*0.3, sy + sh*0.45); ctx.lineTo(sx + sw*0.7, sy + sh*0.45);
  ctx.lineTo(sx + sw*0.85, sy + sh); ctx.lineTo(sx + sw*0.15, sy + sh);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#FFDD00'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(sx+sw*0.5, sy+sh*0.45); ctx.lineTo(sx+sw*0.5, sy+sh); ctx.stroke();
  // KITT rear silhouette
  ctx.save(); ctx.translate(sx + sw*0.5, sy + sh*0.52);
  const ks = sh * 0.018;
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.moveTo(-12*ks,0); ctx.lineTo(-11*ks,-4*ks); ctx.lineTo(-7*ks,-9*ks);
  ctx.lineTo(7*ks,-9*ks); ctx.lineTo(11*ks,-4*ks); ctx.lineTo(12*ks,0); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#ff2200'; ctx.fillRect(-10*ks, -2*ks, 20*ks, 2*ks);
  ctx.restore();
  // Enemies behind
  enemies.forEach(e => {
    const dz = kitt.z - e.z;
    if (dz < 0 || dz > 400) return;
    const ps = 1 - dz/500;
    const ex = sx + sw*0.5 + (e.x - kitt.x)*ps*0.04;
    const ey = sy + sh*0.48 + dz*0.001*sh;
    if (ey > sy+sh) return;
    ctx.fillStyle = '#cc2200'; ctx.fillRect(ex-4*ps, ey-3*ps, 8*ps, 5*ps);
    ctx.fillStyle = '#ffff88'; ctx.fillRect(ex-4*ps, ey-3*ps, 2*ps, 2*ps); ctx.fillRect(ex+2*ps, ey-3*ps, 2*ps, 2*ps);
  });
  ctx.fillStyle = 'rgba(0,40,0,0.22)'; ctx.fillRect(sx, sy, sw, sh);
}

function drawSideCameraView(sx, sy, sw, sh) {
  const palette = ROAD_PALETTES[Math.min(STATE.level-1, 3)];
  const skyG = ctx.createLinearGradient(sx, sy, sx, sy + sh*0.4);
  skyG.addColorStop(0, palette.sky1); skyG.addColorStop(1, palette.sky2);
  ctx.fillStyle = skyG; ctx.fillRect(sx, sy, sw, sh);
  ctx.fillStyle = palette.grass1; ctx.fillRect(sx, sy+sh*0.4, sw, sh*0.6);
  ctx.fillStyle = palette.road; ctx.fillRect(sx, sy+sh*0.4, sw, sh*0.25);
  ctx.strokeStyle = '#FFDD00'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(sx, sy+sh*0.4); ctx.lineTo(sx+sw, sy+sh*0.4); ctx.stroke();
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 0.5;
  ctx.beginPath(); ctx.moveTo(sx, sy+sh*0.65); ctx.lineTo(sx+sw, sy+sh*0.65); ctx.stroke();
  // KITT side profile
  ctx.save(); ctx.translate(sx+sw*0.5, sy+sh*0.42);
  const ks2 = sh*0.012;
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.moveTo(-30*ks2,0); ctx.lineTo(-28*ks2,-8*ks2); ctx.lineTo(-18*ks2,-18*ks2);
  ctx.lineTo(-5*ks2,-22*ks2); ctx.lineTo(10*ks2,-22*ks2); ctx.lineTo(22*ks2,-14*ks2);
  ctx.lineTo(30*ks2,-8*ks2); ctx.lineTo(30*ks2,0); ctx.closePath(); ctx.fill();
  ctx.fillStyle = 'rgba(80,160,255,0.45)';
  ctx.beginPath();
  ctx.moveTo(-16*ks2,-8*ks2); ctx.lineTo(-14*ks2,-18*ks2); ctx.lineTo(8*ks2,-20*ks2);
  ctx.lineTo(18*ks2,-12*ks2); ctx.lineTo(18*ks2,-8*ks2); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#0a0a0a';
  ctx.beginPath(); ctx.arc(-18*ks2, 0, 6*ks2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(18*ks2, 0, 6*ks2, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#444';
  ctx.beginPath(); ctx.arc(-18*ks2, 0, 3*ks2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(18*ks2, 0, 3*ks2, 0, Math.PI*2); ctx.fill();
  const scanX2 = Math.sin(STATE.time * 8) * 10*ks2;
  ctx.fillStyle = '#ff2200'; ctx.shadowColor = '#ff2200'; ctx.shadowBlur = 4;
  ctx.fillRect(-28*ks2+scanX2, -5*ks2, 6*ks2, 2*ks2);
  ctx.shadowBlur = 0;
  ctx.restore();
  // Scrolling scenery
  const scroll = kitt.z * 0.001;
  for (let t = 0; t < 4; t++) {
    const tx = sx + ((t * 70 + scroll * 45) % (sw + 60)) - 30;
    const ty = sy + sh * 0.35;
    ctx.fillStyle = '#4a3a1a'; ctx.fillRect(tx-2, ty-18, 4, 18);
    ctx.fillStyle = '#2a5a1a';
    ctx.beginPath(); ctx.arc(tx, ty-20, 9, 0, Math.PI*2); ctx.fill();
  }
  ctx.fillStyle = 'rgba(0,40,0,0.22)'; ctx.fillRect(sx, sy, sw, sh);
}

//  STREET VIEW (3rd-person follow camera)
// ═══════════════════════════════════════════════════════════════════════════════

function drawStreetView(W, H) {
  const palette = ROAD_PALETTES[Math.min(STATE.level-1, 3)];
  // Camera is behind and above KITT
  const camX = kitt.x + kitt.steer * 30;
  const camZ = kitt.z - 80; // camera behind KITT (lower Z)
  drawPseudo3DRoad(camX, camZ, CAM_HEIGHT, W, H, palette);

  // Draw enemies in 3D
  enemies.forEach(e => {
    const dz = e.z - camZ;
    if (dz <= 0 || dz > DRAW_DIST * SEGMENT_LEN) return;
    const proj = project(e.x, 0, e.z, camX, camZ, CAM_HEIGHT, CAM_DEPTH, W, H);
    if (proj) drawEnemyPseudo3D(e, proj);
  });
  // Draw boss
  if (boss.active) {
    const dz = boss.z - camZ;
    if (dz > 0 && dz < DRAW_DIST * SEGMENT_LEN) {
      const proj = project(boss.x, 0, boss.z, camX, camZ, CAM_HEIGHT, CAM_DEPTH, W, H);
      if (proj) drawBossPseudo3D(proj);
    }
  }

  // Draw pickups
  pickups.forEach(p => {
    if (p.collected) return;
    const dz = p.z - camZ;
    if (dz < 0 || dz > DRAW_DIST * SEGMENT_LEN) return;
    const proj = project(p.x, 0, p.z, camX, camZ, CAM_HEIGHT, CAM_DEPTH, W, H);
    if (proj) drawPickupPseudo3D(p, proj);
  });

  // Draw bullets
  bullets.forEach(b => {
    const dz = b.z - camZ;
    if (dz < 0 || dz > DRAW_DIST * SEGMENT_LEN) return;
    const proj = project(b.x, 0, b.z, camX, camZ, CAM_HEIGHT, CAM_DEPTH, W, H);
    if (proj) {
      ctx.fillStyle = b.color;
      ctx.shadowColor = b.color; ctx.shadowBlur = 8;
      ctx.beginPath(); ctx.arc(proj.x, proj.y, b.r * proj.scale * 200, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0;
    }
  });

  // Draw explosions
  explosions.forEach(ex => {
    const dz = ex.z - camZ;
    if (dz < 0 || dz > DRAW_DIST * SEGMENT_LEN) return;
    const proj = project(ex.x, 0, ex.z, camX, camZ, CAM_HEIGHT, CAM_DEPTH, W, H);
    if (proj) {
      ctx.globalAlpha = ex.life;
      const eg = ctx.createRadialGradient(proj.x, proj.y, 0, proj.x, proj.y, ex.r * proj.scale * 200);
      eg.addColorStop(0, '#ffffff');
      eg.addColorStop(0.3, '#ff8800');
      eg.addColorStop(0.7, '#ff2200');
      eg.addColorStop(1, 'transparent');
      ctx.fillStyle = eg;
      ctx.beginPath(); ctx.arc(proj.x, proj.y, ex.r * proj.scale * 200, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = 1;
    }
  });

  // Draw KITT (rear view, centered at bottom)
  const kittScreenX = W/2 + kitt.steer * 40;
  const kittScreenY = H * 0.78;
  drawKITTRear(kittScreenX, kittScreenY, kitt.steer, kitt.speed);

  // Speed lines when boosting
  if (kitt.boosting || kitt.spmActive) {
    ctx.globalAlpha = 0.15;
    ctx.strokeStyle = kitt.spmActive ? '#ffaa00' : '#00aaff';
    ctx.lineWidth = 1;
    for (let i = 0; i < 20; i++) {
      const lx = Math.random() * W;
      const ly = Math.random() * H * 0.7;
      const ll = 30 + Math.random() * 80;
      ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(lx, ly + ll); ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }
}

// ── FRONT VIEW ────────────────────────────────────────────────────────────────
function drawFrontView(W, H) {
  const palette = ROAD_PALETTES[Math.min(STATE.level-1, 3)];
  // Camera is in front of KITT looking back
  const camX = kitt.x - kitt.steer * 20;
  const camZ = kitt.z + 200;
  drawPseudo3DRoad(camX, camZ - 100, CAM_HEIGHT * 0.9, W, H, palette);

  // Enemies behind KITT
  enemies.forEach(e => {
    const dz = camZ - e.z;
    if (dz < 0 || dz > DRAW_DIST * SEGMENT_LEN) return;
    const proj = project(e.x, 0, e.z, camX, camZ, CAM_HEIGHT * 0.9, CAM_DEPTH, W, H);
    if (proj) drawEnemyPseudo3D(e, proj);
  });

  // KITT front view
  const kittScreenX = W/2 - kitt.steer * 30;
  const kittScreenY = H * 0.75;
  drawKITTFront(kittScreenX, kittScreenY, kitt.steer);
}

// ── TOP-DOWN VIEW ─────────────────────────────────────────────────────────────
function drawTopDownView(W, H) {
  const scale = 0.18;
  const camX = kitt.x;
  const camZ = kitt.z;

  // Background — desert terrain
  const bgG = ctx.createLinearGradient(0, 0, 0, H);
  bgG.addColorStop(0, '#c8a870');
  bgG.addColorStop(1, '#b89060');
  ctx.fillStyle = bgG;
  ctx.fillRect(0, 0, W, H);

  // Terrain texture
  ctx.fillStyle = 'rgba(0,0,0,0.05)';
  for (let i = 0; i < 40; i++) {
    const tx = ((i * 137 + camZ * 0.02) % W);
    const ty = ((i * 89  + camX * 0.02) % H);
    ctx.beginPath(); ctx.arc(tx, ty, 15 + i%8*3, 0, Math.PI*2); ctx.fill();
  }

  // Road (vertical strip)
  const roadScreenX = W/2 + (FIELD_W/2 - camX) * scale;
  const roadW = ROAD_WIDTH * scale;

  // Road surface
  ctx.fillStyle = '#3a3a3a';
  ctx.fillRect(roadScreenX - roadW/2, 0, roadW, H);

  // Road edge lines
  ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(roadScreenX - roadW/2, 0); ctx.lineTo(roadScreenX - roadW/2, H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(roadScreenX + roadW/2, 0); ctx.lineTo(roadScreenX + roadW/2, H); ctx.stroke();

  // Center dashes
  ctx.strokeStyle = '#ffdd00'; ctx.lineWidth = 2; ctx.setLineDash([20, 15]);
  ctx.beginPath(); ctx.moveTo(roadScreenX, 0); ctx.lineTo(roadScreenX, H); ctx.stroke();
  ctx.setLineDash([]);

  // Lane dividers
  ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 1; ctx.setLineDash([15, 20]);
  [-0.33, 0.33].forEach(lp => {
    ctx.beginPath();
    ctx.moveTo(roadScreenX + roadW*lp, 0);
    ctx.lineTo(roadScreenX + roadW*lp, H);
    ctx.stroke();
  });
  ctx.setLineDash([]);

  // Rumble strips
  ctx.fillStyle = '#cc0000';
  for (let y = 0; y < H; y += 30) {
    const ry = (y + camZ * scale) % H;
    ctx.fillRect(roadScreenX - roadW/2 - 12, ry, 12, 15);
    ctx.fillRect(roadScreenX + roadW/2,      ry, 12, 15);
  }

  // Scenery
  for (let i = 0; i < 20; i++) {
    const sz = ((i * 200 + camZ * scale) % (H + 200)) - 100;
    const side = i % 2 === 0 ? -1 : 1;
    const sx = roadScreenX + side * (roadW/2 + 30 + (i%5)*20);
    ctx.save();
    ctx.translate(sx, sz);
    ctx.scale(0.5, 0.5);
    drawSceneryObject(['rock_small','cactus','dead_tree','rock_large'][i%4], 0, 0, 1, side);
    ctx.restore();
  }

  // Enemies
  enemies.forEach(e => {
    const ex = roadScreenX + (e.x - FIELD_W/2) * scale;
    const ey = H/2 + (e.z - camZ) * scale;
    if (ey < -50 || ey > H + 50) return;
    drawEnemyTopDown(e, ex, ey, 0.55);
  });

  // Boss
  if (boss.active) {
    const bx = roadScreenX + (boss.x - FIELD_W/2) * scale;
    const by = H/2 + (boss.z - camZ) * scale;
    ctx.save(); ctx.translate(bx, by); ctx.scale(0.7, 0.7);
    ctx.fillStyle = '#556633';
    ctx.fillRect(-25, -40, 50, 80);
    ctx.fillStyle = '#334422';
    ctx.fillRect(-20, -40, 40, 25);
    ctx.restore();
  }

  // Pickups
  pickups.forEach(p => {
    if (p.collected) return;
    const px = roadScreenX + (p.x - FIELD_W/2) * scale;
    const py = H/2 + (p.z - camZ) * scale;
    if (py < -20 || py > H + 20) return;
    const bob = Math.sin(STATE.time * 5 + p.bob) * 3;
    ctx.fillStyle = PICKUP_COLORS[p.type] || '#ffffff';
    ctx.shadowColor = PICKUP_COLORS[p.type] || '#ffffff'; ctx.shadowBlur = 8;
    ctx.beginPath(); ctx.arc(px, py + bob, 7, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
  });

  // Bullets
  bullets.forEach(b => {
    const bx = roadScreenX + (b.x - FIELD_W/2) * scale;
    const by = H/2 + (b.z - camZ) * scale;
    ctx.fillStyle = b.color;
    ctx.beginPath(); ctx.arc(bx, by, 3, 0, Math.PI*2); ctx.fill();
  });

  // Particles
  particles.forEach(p => {
    const px = roadScreenX + (p.x - FIELD_W/2) * scale;
    const py = H/2 + (p.z - camZ) * scale;
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(px, py, p.r * 0.5, 0, Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1;

  // KITT (center)
  drawKITTTopDown(W/2, H/2, 1.1);

  // KITT shadow/glow
  ctx.shadowColor = '#00ff44'; ctx.shadowBlur = 20;
  ctx.strokeStyle = '#00ff44'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(W/2, H/2, 30, 0, Math.PI*2); ctx.stroke();
  ctx.shadowBlur = 0;

  // Compass
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.beginPath(); ctx.arc(W - 30, 30, 22, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#00ff44'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(W - 30, 30, 22, 0, Math.PI*2); ctx.stroke();
  ctx.fillStyle = '#ff2200'; ctx.font = 'bold 10px monospace'; ctx.textAlign = 'center';
  ctx.fillText('N', W - 30, 14);
  ctx.fillStyle = '#00ff44';
  ctx.fillText('S', W - 30, 48);
  ctx.fillText('E', W - 10, 34);
  ctx.fillText('W', W - 50, 34);
}

const PICKUP_COLORS = {
  health: '#00ff44', turbo: '#00aaff', laser: '#00ffff',
  machineGun: '#ffff00', missile: '#ff8800', shield: '#aa44ff',
};

// ── BOSS PSEUDO-3D ────────────────────────────────────────────────────────────
function drawBossPseudo3D(proj) {
  const { x, y, w } = proj;
  const bw = w * 1.2;
  const bh = bw * 0.8;
  ctx.save(); ctx.translate(x, y - bh*0.4);
  // Truck body
  const tg = ctx.createLinearGradient(-bw, 0, bw, 0);
  tg.addColorStop(0, '#2a3a1a'); tg.addColorStop(0.5, '#556633'); tg.addColorStop(1, '#2a3a1a');
  ctx.fillStyle = tg;
  ctx.fillRect(-bw, -bh, bw*2, bh);
  // Cab
  ctx.fillStyle = '#334422';
  ctx.fillRect(-bw*0.6, -bh*1.5, bw*1.2, bh*0.6);
  ctx.fillStyle = 'rgba(80,160,255,0.4)';
  ctx.fillRect(-bw*0.5, -bh*1.45, bw, bh*0.45);
  // Wheels
  ctx.fillStyle = '#111';
  [[-bw*0.8, 0],[bw*0.8, 0],[-bw*0.8, -bh*0.5],[bw*0.8, -bh*0.5]].forEach(([wx,wy]) => {
    ctx.beginPath(); ctx.ellipse(wx, wy, 18, 14, 0, 0, Math.PI*2); ctx.fill();
  });
  // HP bar
  const hpPct = boss.health / boss.maxHealth;
  ctx.fillStyle = '#222'; ctx.fillRect(-bw, -bh*1.7, bw*2, 8);
  ctx.fillStyle = hpPct > 0.5 ? '#ff4400' : '#ff0000';
  ctx.fillRect(-bw, -bh*1.7, bw*2*hpPct, 8);
  ctx.restore();
}

function drawPickupPseudo3D(p, proj) {
  const { x, y, scale } = proj;
  const r = 12 * scale * 200;
  const bob = Math.sin(STATE.time * 5 + p.bob) * 3;
  ctx.save(); ctx.translate(x, y + bob);
  ctx.fillStyle = PICKUP_COLORS[p.type] || '#fff';
  ctx.shadowColor = PICKUP_COLORS[p.type] || '#fff'; ctx.shadowBlur = 12;
  ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#000'; ctx.font = `bold ${Math.max(6, r*0.8)}px monospace`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(p.type[0].toUpperCase(), 0, 0);
  ctx.textBaseline = 'alphabetic';
  ctx.restore();
}

// ═══════════════════════════════════════════════════════════════════════════════
//  GAME LOOP & PHYSICS
// ═══════════════════════════════════════════════════════════════════════════════

let lastTime = 0;
let animId = null;

function gameLoop(ts) {
  if (!STATE.running) return;
  animId = requestAnimationFrame(gameLoop);
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;
  STATE.time += dt;

  update(dt);
  render();
}

function update(dt) {
  updateKITT(dt);
  updateEnemies(dt);
  updateBullets(dt);
  updatePickups(dt);
  updateParticles(dt);
  updateExplosions(dt);
  updateBoss(dt);
  updateDialogue(dt);
  updateSpawns(dt);
  updateLevel(dt);
}

// ── KITT PHYSICS ──────────────────────────────────────────────────────────────
function updateKITT(dt) {
  const W = canvas.width;
  const H = canvas.height;

  // Invincibility countdown
  if (kitt.invincible > 0) kitt.invincible -= dt * 60;
  if (kitt.damageCooldown > 0) kitt.damageCooldown -= dt * 60;

  // Turbo boost
  if (kitt.boosting) {
    kitt.turbo -= TURBO_DRAIN * dt;
    if (kitt.turbo <= 0) { kitt.turbo = 0; kitt.boosting = false; }
  } else {
    kitt.turbo = Math.min(TURBO_MAX, kitt.turbo + TURBO_REGEN * dt);
  }

  // SPM
  if (kitt.spmActive) {
    kitt.spm -= 20 * dt;
    if (kitt.spm <= 0) { kitt.spm = 0; kitt.spmActive = false; }
  } else {
    kitt.spm = Math.min(100, kitt.spm + 4 * dt);
  }

  // Acceleration
  const speedMult = (kitt.boosting ? TURBO_MULT : 1) * (kitt.spmActive ? 1.4 : 1);
  const maxSpd = MAX_SPEED * speedMult;

  if (keys['KeyW'] || keys['ArrowUp']) {
    kitt.speed = Math.min(maxSpd, kitt.speed + ACCEL * speedMult * dt * 60);
  } else if (keys['KeyS'] || keys['ArrowDown']) {
    kitt.speed = Math.max(-40, kitt.speed - BRAKE * dt * 60);
  } else {
    // Auto-accelerate to minimum speed
    const minSpeed = 60 + STATE.level * 10;
    if (kitt.speed < minSpeed) {
      kitt.speed = Math.min(minSpeed, kitt.speed + ACCEL * 0.5 * dt * 60);
    } else {
      kitt.speed *= Math.pow(FRICTION, dt * 60);
    }
  }

  // Steering
  const turnRate = TURN_SPEED * (1 - kitt.speed / MAX_SPEED * 0.4);
  if (keys['KeyA'] || keys['ArrowLeft']) {
    kitt.steer = Math.max(-1, kitt.steer - turnRate * dt * 60);
  } else if (keys['KeyD'] || keys['ArrowRight']) {
    kitt.steer = Math.min(1, kitt.steer + turnRate * dt * 60);
  } else {
    kitt.steer *= Math.pow(0.85, dt * 60);
  }

  // Move KITT
  const roadHalfW = ROAD_WIDTH * 0.48;
  kitt.x += kitt.steer * kitt.speed * 0.8 * dt;
  kitt.z += kitt.speed * dt * 0.6;

  // Keep on road (with bounce)
  const roadCenter = FIELD_W / 2;
  if (kitt.x < roadCenter - roadHalfW) {
    kitt.x = roadCenter - roadHalfW;
    kitt.steer *= -0.3;
    if (kitt.damageCooldown <= 0 && kitt.invincible <= 0) {
      damageKITT(8, 'off-road');
    }
  }
  if (kitt.x > roadCenter + roadHalfW) {
    kitt.x = roadCenter + roadHalfW;
    kitt.steer *= -0.3;
    if (kitt.damageCooldown <= 0 && kitt.invincible <= 0) {
      damageKITT(8, 'off-road');
    }
  }

  // ── RPM SIMULATION ──
  // Gear thresholds (mph): 1st=0-30, 2nd=30-60, 3rd=60-90, 4th=90-130, 5th=130-180, 6th=180+
  const gearThresholds = [0, 30, 60, 90, 130, 180, 999];
  const targetGear = gearThresholds.findIndex((t, i) => kitt.speed >= t && kitt.speed < gearThresholds[i+1]) + 1;
  if (targetGear !== kitt.gear && kitt.gearShiftTimer <= 0) {
    kitt.gear = Math.max(1, Math.min(6, targetGear));
    kitt.gearShiftTimer = 0.18; // 180ms gear shift
  }
  if (kitt.gearShiftTimer > 0) kitt.gearShiftTimer -= dt;
  // RPM within gear: maps speed to 1000-8500 rpm range per gear
  const gearLow  = gearThresholds[kitt.gear - 1];
  const gearHigh = gearThresholds[kitt.gear];
  const gearPct  = gearHigh > gearLow ? (kitt.speed - gearLow) / (gearHigh - gearLow) : 0;
  const idleRPM  = 800;
  const maxRPM   = kitt.boosting ? 9000 : (kitt.spmActive ? 8500 : 7500);
  const gearIdleRPM = idleRPM + (kitt.gear - 1) * 200;
  let targetRPM;
  if (kitt.gearShiftTimer > 0.1) {
    // During gear shift: RPM drops
    targetRPM = gearIdleRPM * 0.6;
  } else if (kitt.speed <= 5) {
    targetRPM = idleRPM + Math.sin(STATE.time * 3) * 80; // idle oscillation
  } else {
    targetRPM = gearIdleRPM + (maxRPM - gearIdleRPM) * Math.max(0, Math.min(1, gearPct));
    // Add slight oscillation for realism
    targetRPM += Math.sin(STATE.time * 15 + kitt.gear) * 120;
  }
  // Turbo boost spikes RPM
  if (kitt.boosting) targetRPM = Math.min(9000, targetRPM * 1.15);
  // Smooth RPM towards target
  const rpmLag = kitt.gearShiftTimer > 0.1 ? 8 : 4;
  kitt.rpm += (targetRPM - kitt.rpm) * Math.min(1, rpmLag * dt);
  kitt.rpm = Math.max(700, Math.min(9000, kitt.rpm));
  // Update ancillary gauges
  kitt.oilPsi  = 40 + (kitt.rpm / 9000) * 25 + Math.sin(STATE.time * 2) * 2;
  kitt.tempF   = 185 + (kitt.speed / MAX_SPEED) * 30 + (kitt.boosting ? 15 : 0);
  kitt.ampere  = 13.5 + (kitt.rpm / 9000) * 2.5;
  kitt.boostPsi = kitt.boosting ? (kitt.turbo / TURBO_MAX) * 18 : Math.max(0, kitt.boostPsi - 5 * dt);
  kitt.inletTemp = 65 + (kitt.speed / MAX_SPEED) * 25 + (kitt.boosting ? 10 : 0);
  kitt.fuelGals = Math.max(0, kitt.fuelGals - (kitt.speed / MAX_SPEED) * 0.001 * dt);
  // Score from distance
  STATE.score += Math.floor(kitt.speed * dt * 0.5);

  // Gun cooldown
  if (gunCooldown > 0) gunCooldown -= dt * 60;

  // KITT trail
  kitt.trail.push({ x: kitt.x, z: kitt.z });
  if (kitt.trail.length > 20) kitt.trail.shift();

  // Slow health regen
  if (kitt.health < KITT_MAX_HP && kitt.invincible <= 0) {
    kitt.health = Math.min(KITT_MAX_HP, kitt.health + 3 * dt);
  }
}

function damageKITT(amount, source) {
  if (kitt.invincible > 0 || kitt.damageCooldown > 0) return;
  kitt.health -= amount;
  kitt.damageCooldown = DAMAGE_COOL;
  playSFX('sfx_hit', 0.5);
  // Screen flash
  screenFlash = { alpha: 0.3, color: '#ff0000', decay: 0.04 };
  if (kitt.health <= 0) {
    kitt.health = 0;
    gameOver();
  }
}

let screenFlash = { alpha: 0, color: '#ff0000', decay: 0.05 };

// ── ENEMY AI ──────────────────────────────────────────────────────────────────
function updateEnemies(dt) {
  enemies = enemies.filter(e => e.active);
  enemies.forEach(e => {
    if (e.damageCooldown > 0) e.damageCooldown -= dt * 60;

    if (e.type === 'heli') {
      // Helicopter circles KITT at safe distance
      e.hoverPhase += dt * 1.2;
      const circleR = 280;
      const targetX = kitt.x + Math.cos(e.hoverPhase) * circleR;
      const targetZ = kitt.z + Math.sin(e.hoverPhase) * circleR * 0.5 - 200;
      e.x += (targetX - e.x) * dt * 1.5;
      e.z += (targetZ - e.z) * dt * 1.5;
      // Drop bombs
      e.shootTimer -= dt * 60;
      if (e.shootTimer <= 0) {
        e.shootTimer = 90 + Math.random() * 120;
        bullets.push({ x: e.x, z: e.z, vx: 0, vz: 200, damage: 25, owner:'enemy', color:'#ff8800', r:8 });
      }
    } else {
      // Ground vehicles chase KITT
      const dx = kitt.x - e.x;
      const dz = kitt.z - e.z;
      const dist = Math.sqrt(dx*dx + dz*dz);
      const speed = e.speed * (0.9 + Math.sin(STATE.time + e.x) * 0.1);

      if (dist > 20) {
        e.x += (dx / dist) * speed * dt * 0.5;
        e.z += (dz / dist) * speed * dt * 0.5;
      }

      // Ram collision
      if (dist < 55 && e.damageCooldown <= 0 && kitt.invincible <= 0 && kitt.damageCooldown <= 0) {
        damageKITT(12, 'ram');
        e.damageCooldown = DAMAGE_COOL;
        // Bounce enemy back
        e.x -= (dx / dist) * 40;
        e.z -= (dz / dist) * 40;
      }

      // Shooting enemies
      if (e.typeName === 'shadow' || e.typeName === 'muscle') {
        e.shootTimer -= dt * 60;
        if (e.shootTimer <= 0 && dist < 400) {
          e.shootTimer = 60 + Math.random() * 90;
          const bvx = (dx / dist) * 600;
          const bvz = (dz / dist) * 600;
          bullets.push({ x: e.x, z: e.z, vx: bvx, vz: bvz, damage: 18, owner:'enemy', color:'#ff4400', r:5 });
        }
      }
    }

    // Remove if too far ahead or too far behind
    if (e.z < kitt.z - 1500 || e.z > kitt.z + 800) e.active = false;
  });
}

// ── BULLETS ───────────────────────────────────────────────────────────────────
function updateBullets(dt) {
  bullets = bullets.filter(b => {
    b.x += b.vx * dt;
    b.z += b.vz * dt;

    // Homing missiles
    if (b.homing && enemies.length > 0) {
      let nearest = null, nearDist = Infinity;
      enemies.forEach(e => {
        const d = Math.hypot(e.x - b.x, e.z - b.z);
        if (d < nearDist) { nearDist = d; nearest = e; }
      });
      if (nearest) {
        const dx = nearest.x - b.x;
        const dz = nearest.z - b.z;
        const d = Math.hypot(dx, dz);
        b.vx += (dx/d) * 400 * dt;
        b.vz += (dz/d) * 400 * dt;
        const spd = Math.hypot(b.vx, b.vz);
        b.vx = b.vx/spd * 900;
        b.vz = b.vz/spd * 900;
      }
    }

    // Check hits
    if (b.owner === 'kitt') {
      // Check enemies
      for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        const dist = Math.hypot(e.x - b.x, e.z - b.z);
        if (dist < 50) {
          e.hp -= b.damage;
          spawnParticles(b.x, b.z, 8, '#ff8800', 100);
          if (e.hp <= 0) {
            spawnExplosion(e.x, e.z);
            STATE.score += e.score;
            addScorePopup(e.x, e.z, e.score);
            e.active = false;
          }
          return false;
        }
      }
      // Check boss
      if (boss.active) {
        const dist = Math.hypot(boss.x - b.x, boss.z - b.z);
        if (dist < 80) {
          boss.health -= b.damage;
          spawnParticles(b.x, b.z, 10, '#ff4400', 120);
          if (boss.health <= 0) defeatBoss();
          return false;
        }
      }
    } else if (b.owner === 'enemy') {
      const dist = Math.hypot(kitt.x - b.x, kitt.z - b.z);
      if (dist < 40 && kitt.damageCooldown <= 0 && kitt.invincible <= 0) {
        damageKITT(b.damage, 'bullet');
        spawnParticles(b.x, b.z, 6, '#ff4400', 80);
        return false;
      }
    }

    // Remove out-of-range bullets
    return b.z > kitt.z - 500 && b.z < kitt.z + 3000 && Math.abs(b.x - kitt.x) < 1000;
  });
}

// ── PICKUPS ───────────────────────────────────────────────────────────────────
function updatePickups(dt) {
  pickups.forEach(p => {
    if (p.collected) return;
    const dist = Math.hypot(kitt.x - p.x, kitt.z - p.z);
    if (dist < 45) {
      p.collected = true;
      collectPickup(p);
    }
  });
  pickups = pickups.filter(p => !p.collected && p.z > kitt.z - 200);
}

function collectPickup(p) {
  playSFX('sfx_boost', 0.6);
  switch(p.type) {
    case 'health':     kitt.health = Math.min(KITT_MAX_HP, kitt.health + 60); showVoiceLine('+60 SHIELD ENERGY'); break;
    case 'turbo':      kitt.turbo = TURBO_MAX; showVoiceLine('TURBO RECHARGED'); break;
    case 'laser':      kitt.weapon = { type:'laser', ammo:20 }; showVoiceLine('LASER ACQUIRED'); break;
    case 'machineGun': kitt.weapon = { type:'machineGun', ammo:60 }; showVoiceLine('MACHINE GUN ACQUIRED'); break;
    case 'missile':    kitt.weapon = { type:'missile', ammo:5 }; showVoiceLine('MISSILES ACQUIRED'); break;
    case 'shield':     kitt.invincible = 300; showVoiceLine('SHIELD ACTIVATED'); break;
  }
  STATE.score += 50;
  spawnParticles(p.x, p.z, 12, PICKUP_COLORS[p.type] || '#fff', 80);
}

// ── PARTICLES & EXPLOSIONS ────────────────────────────────────────────────────
function updateParticles(dt) {
  particles = particles.filter(p => {
    p.x += p.vx * dt;
    p.z += p.vz * dt;
    p.life -= p.decay * dt * 60;
    return p.life > 0;
  });
}

function updateExplosions(dt) {
  explosions = explosions.filter(ex => {
    ex.r += 120 * dt;
    ex.life -= ex.decay * dt * 60;
    return ex.life > 0;
  });
}

// ── BOSS ──────────────────────────────────────────────────────────────────────
function updateBoss(dt) {
  if (!boss.active) return;
  if (boss.damageCooldown > 0) boss.damageCooldown -= dt * 60;

  // Boss moves toward KITT
  const dx = kitt.x - boss.x;
  const dz = kitt.z - boss.z;
  const dist = Math.sqrt(dx*dx + dz*dz);
  const spd = 80 + boss.phase * 30;
  if (dist > 80) {
    boss.x += (dx/dist) * spd * dt;
    boss.z += (dz/dist) * spd * dt;
  }

  // Boss fires missiles in phases
  boss.shootTimer = (boss.shootTimer || 120);
  boss.shootTimer -= dt * 60;
  if (boss.shootTimer <= 0) {
    boss.shootTimer = Math.max(40, 120 - boss.phase * 20);
    const angle = Math.atan2(kitt.z - boss.z, kitt.x - boss.x);
    const spread = boss.phase * 0.3;
    for (let i = -1; i <= 1; i++) {
      const a = angle + i * spread;
      bullets.push({ x: boss.x, z: boss.z, vx: Math.cos(a)*500, vz: Math.sin(a)*500, damage:30, owner:'enemy', color:'#ff0000', r:10 });
    }
  }

  // Ram collision
  if (dist < 100 && boss.damageCooldown <= 0 && kitt.invincible <= 0 && kitt.damageCooldown <= 0) {
    damageKITT(20, 'boss');
    boss.damageCooldown = 60;
  }

  // Phase transitions
  const hpPct = boss.health / boss.maxHealth;
  if (hpPct < 0.66 && boss.phase < 1) { boss.phase = 1; showVoiceLine('BOSS PHASE 2!'); }
  if (hpPct < 0.33 && boss.phase < 2) { boss.phase = 2; showVoiceLine('BOSS ENRAGED!'); }
}

function defeatBoss() {
  boss.active = false;
  spawnExplosion(boss.x, boss.z);
  spawnExplosion(boss.x + 50, boss.z + 30);
  spawnExplosion(boss.x - 40, boss.z - 20);
  STATE.score += 2000;
  showVoiceLine('FOUNDATION TRUCK DESTROYED! +2000');
  setTimeout(() => missionComplete(), 3000);
}

// ── SPAWNING ──────────────────────────────────────────────────────────────────
function updateSpawns(dt) {
  enemySpawnTimer -= dt * 60;
  if (enemySpawnTimer <= 0) {
    spawnEnemy();
    enemySpawnTimer = enemySpawnInterval;
  }

  // Spawn pickups
    if (Math.random() < 0.003 * dt * 60) {
    spawnPickup(kitt.z + 500 + Math.random() * 800);
  }

  // Boss spawn at score threshold
  if (!boss.active && STATE.score >= 3000 * STATE.level && !boss.defeated) {
    spawnBoss();
  }
}

function spawnBoss() {
  boss.active = true;
  boss.x = kitt.x;
  boss.z = kitt.z + 500;
  boss.health = boss.maxHealth = 400 + STATE.level * 100;
  boss.phase = 0;
  boss.shootTimer = 120;
  boss.defeated = false;
  playMusic('music_boss');
  showVoiceLine('FOUNDATION TRUCK INCOMING!');
  showDialogue(7);
}

// ── LEVEL PROGRESSION ─────────────────────────────────────────────────────────
function updateLevel(dt) {
  const newLevel = Math.min(4, 1 + Math.floor(STATE.score / 2000));
  if (newLevel > STATE.level) {
    STATE.level = newLevel;
    enemySpawnInterval = Math.max(120, 280 - STATE.level * 30);
    playMusic(LEVEL_MUSIC[STATE.level] || 'music_level1');
    showVoiceLine(`LEVEL ${STATE.level}: ${LEVEL_NAMES[STATE.level] || 'PURSUIT'}`);
    showDialogue(STATE.level * 2);
  }
}

// ── TURBO / SPM ───────────────────────────────────────────────────────────────
function activateTurbo() {
  if (kitt.turbo < 20) return;
  kitt.boosting = true;
  playSFX('sfx_boost', 0.8);
  showVoiceLine('TURBO BOOST!');
}

function toggleSPM() {
  if (kitt.spm < 30) return;
  kitt.spmActive = !kitt.spmActive;
  if (kitt.spmActive) showVoiceLine('SUPER PURSUIT MODE ACTIVATED');
}

// ── MAIN RENDER ───────────────────────────────────────────────────────────────
function render() {
  const W = canvas.width;
  const H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  switch(currentView) {
    case 'street':  drawStreetView(W, H);  break;
    case 'cockpit': drawCockpitView(W, H); break;
    case 'front':   drawFrontView(W, H);   break;
    case 'topdown': drawTopDownView(W, H); break;
  }

  // Screen flash
  if (screenFlash.alpha > 0) {
    ctx.fillStyle = screenFlash.color;
    ctx.globalAlpha = screenFlash.alpha;
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;
    screenFlash.alpha -= screenFlash.decay * 60 / 60;
  }

  // Invincibility flicker
  if (kitt.invincible > 0 && Math.floor(STATE.time * 20) % 2 === 0) {
    ctx.fillStyle = 'rgba(100,200,255,0.08)';
    ctx.fillRect(0, 0, W, H);
  }

  drawHUD(W, H);

  // Voice line
  if (voiceLine.timer > 0) {
    voiceLine.timer -= 1;
    const alpha = Math.min(1, voiceLine.timer / 30);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#00ff44';
    ctx.font = 'bold 18px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(voiceLine.text, W/2, H * 0.12);
    ctx.globalAlpha = 1;
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
//  GAME MANAGEMENT
// ═══════════════════════════════════════════════════════════════════════════════

function startGame() {
  // Reset state
  STATE.running = true;
  STATE.score = 0;
  STATE.time = 0;
  STATE.level = 1;

  // Reset KITT
  kitt.x = FIELD_W / 2;
  kitt.z = 0;
  kitt.speed = 0;
  kitt.angle = 0;
  kitt.steer = 0;
  kitt.health = KITT_MAX_HP;
  kitt.turbo = TURBO_MAX;
  kitt.spm = 0;
  kitt.weapon = null;
  kitt.boosting = false;
  kitt.spmActive = false;
  kitt.damageCooldown = 0;
  kitt.invincible = 240; // 4 seconds spawn protection
  kitt.trail = [];

  // Reset enemies/objects
  enemies = [];
  bullets = [];
  pickups = [];
  particles = [];
  explosions = [];
  scorePopups = [];
  boss.active = false;
  boss.defeated = false;
  dialogueQueue = [];
  dialogue.active = false;

  // Build road
  buildRoad();

  // Spawn initial enemies
  for (let i = 0; i < 2; i++) spawnEnemy();

  // Spawn initial pickups
  for (let i = 0; i < 3; i++) spawnPickup(kitt.z + 300 + i * 400);

  // UI
  document.getElementById('titleScreen').style.display = 'none';
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('viewBar').style.display = 'flex';

  // Music
  playMusic('music_level1');

  // Start loop
  if (animId) cancelAnimationFrame(animId);
  lastTime = performance.now();
  animId = requestAnimationFrame(gameLoop);

  // Opening dialogue
  setTimeout(() => showDialogue(0), 2000);
}

function gameOver() {
  STATE.running = false;
  if (animId) { cancelAnimationFrame(animId); animId = null; }
  stopMusic();
  playMusic('music_main');

  const ov = document.getElementById('overlay');
  ov.className = 'fail';
  ov.style.display = 'flex';
  document.getElementById('overlayTitle').textContent = 'MISSION FAILED';
  document.getElementById('overlayScore').textContent = `Score: ${STATE.score}`;
}

function missionComplete() {
  STATE.running = false;
  if (animId) { cancelAnimationFrame(animId); animId = null; }
  stopMusic();

  const ov = document.getElementById('overlay');
  ov.className = 'win';
  ov.style.display = 'flex';
  document.getElementById('overlayTitle').textContent = 'MISSION COMPLETE';
  document.getElementById('overlayScore').textContent = `Score: ${STATE.score}`;
}

function restartGame() {
  startGame();
}

function goToMenu() {
  STATE.running = false;
  if (animId) { cancelAnimationFrame(animId); animId = null; }
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('viewBar').style.display = 'none';
  document.getElementById('titleScreen').style.display = 'flex';
  stopMusic();
  playMusic('music_main');
}

function setView(v) {
  currentView = v;
  STATE.view = v;
  document.querySelectorAll('.vbtn').forEach(b => b.classList.remove('active'));
  const btnMap = { topdown:'btnTopDown', street:'btnStreet', cockpit:'btnCockpit', front:'btnFront' };
  const btn = document.getElementById(btnMap[v]);
  if (btn) btn.classList.add('active');
}

function cycleView() {
  const idx = VIEWS.indexOf(currentView);
  setView(VIEWS[(idx + 1) % VIEWS.length]);
}

// ── TITLE SCREEN IDLE ANIMATION ───────────────────────────────────────────────
function drawTitleIdle() {
  if (STATE.running) return;
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  // Animated scanner on title
  const t = performance.now() / 1000;
  const scanX = (Math.sin(t * 1.5) + 1) / 2 * W;
  ctx.fillStyle = 'rgba(255,50,0,0.04)';
  ctx.fillRect(scanX - 60, 0, 120, H);
  requestAnimationFrame(drawTitleIdle);
}

// ── BUTTON WIRING ─────────────────────────────────────────────────────────────
document.getElementById('btnStart').addEventListener('click', () => {
  initAudio();
  startGame();
});
document.getElementById('btnControls').addEventListener('click', () => {
  document.getElementById('controlsModal').style.display = 'flex';
});
document.getElementById('btnRestart').addEventListener('click', () => {
  initAudio();
  restartGame();
});
document.getElementById('btnMenu').addEventListener('click', goToMenu);

// Play main theme on first interaction with title screen
document.getElementById('titleScreen').addEventListener('click', () => {
  initAudio();
  if (!currentMusic) playMusic('music_main');
}, { once: true });

// ── INIT ──────────────────────────────────────────────────────────────────────
buildRoad();
drawTitleIdle();
</script>
